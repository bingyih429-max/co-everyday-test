<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Co-Everyday | Public Wall</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    .subtitle {
      font-size: 13px;
      color: #777;
      margin-bottom: 24px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .card img {
      width: 100%;
      display: block;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      background: #ddd;
    }

    .meta {
      padding: 10px 12px 14px;
    }

    .meta .id {
      font-weight: bold;
      font-size: 14px;
    }

    .meta .time {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Co-Everyday</h1>
  <div class="subtitle">Public Fragment Wall</div>

  <div id="gallery"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://paidklixbfridphomkwj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_H8FqLKJCbrHrhAVBViFeWw_hannKThG";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadGallery() {
      const { data, error } = await supabaseClient
        .from("submissions")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        console.error("读取投稿失败：", error);
        alert("读取投稿失败");
        return;
      }

      const gallery = document.getElementById("gallery");

      gallery.innerHTML = data.map(item => {
        const time = item.created_at
          ? new Date(item.created_at).toLocaleString()
          : "";

        return `
          <div class="card">
            <img src="${item.image_url}" alt="Fragment ${item.serial_number}" />
            <div class="meta">
              <div class="id">#Fragment ${String(item.serial_number).padStart(3, "0")}</div>
              <div class="time">${time}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    loadGallery();
  </script>
</body>
</html>
