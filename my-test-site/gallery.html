<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>历历/在幕 | Public Calendar Ring</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #111111;
      --muted: rgba(17,17,17,0.56);
      --line: rgba(17,17,17,0.16);
      --panel: rgba(255,255,255,0.78);
      --panel-solid: #ffffff;
      --shadow: 0 24px 70px rgba(0,0,0,0.16);
      --ease: cubic-bezier(.19, 1, .22, 1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,255,255,1) 0%, rgba(255,255,255,0.92) 42%, rgba(248,248,248,1) 100%),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button {
      font: inherit;
    }

    .museum {
      position: fixed;
      inset: 0;
      overflow: hidden;
      isolation: isolate;
    }

    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .18;
      mix-blend-mode: multiply;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at center, black 0, transparent 76%);
      z-index: 0;
    }

    .hud {
      position: absolute;
      left: 28px;
      top: 34px;
      width: min(360px, calc(100vw - 56px));
      z-index: 20;
      pointer-events: none;
    }

    .site-logo {
      display: block;
      width: min(300px, 23vw);
      height: auto;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }

    .subtitle {
      display: none;
    }

    .status-line {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(17,17,17,.62);
      font-size: 13px;
      letter-spacing: .04em;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #111;
      opacity: .35;
      animation: pulseDot 1.8s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0%, 100% { transform: scale(.8); opacity: .22; }
      50% { transform: scale(1.2); opacity: .65; }
    }

    .ring-shell {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      perspective: 1800px;
      perspective-origin: 50% 48%;
    }

    .orbit-stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      transform-style: preserve-3d;
      transform:
        translate3d(var(--stageX, 0vw), var(--stageY, 0vh), 0)
        scale(var(--stageScale, .62))
        rotateX(var(--tiltX, -8deg))
        rotateY(var(--tiltY, 0deg))
        rotateZ(-2deg);
      transition: transform 900ms var(--ease);
      will-change: transform;
    }

    .date-ghost {
      display: none;
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(58vmin, 620px);
      height: min(58vmin, 620px);
      transform: translate(-50%, -50%) rotateX(70deg) translateZ(-160px);
      border: 1px solid rgba(17,17,17,.12);
      border-radius: 50%;
      pointer-events: none;
      opacity: .22;
      box-shadow:
        inset 0 0 0 18px rgba(255,255,255,.22),
        0 0 120px rgba(255,255,255,.58);
    }

    .date-ghost::before,
    .date-ghost::after {
      content: "";
      position: absolute;
      inset: 8%;
      border-radius: 50%;
      border: 1px dashed rgba(17,17,17,.12);
    }

    .date-ghost::after {
      inset: 23%;
      border-style: solid;
      opacity: .55;
    }

    .ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
      animation: autoSpin var(--spinDuration, 52s) linear infinite;
      will-change: transform;
    }

    .ring.is-paused {
      animation-play-state: paused;
    }

    @keyframes autoSpin {
      0% {
        transform: rotateX(-4deg) rotateZ(-.8deg) rotateY(0deg);
      }
      25% {
        transform: rotateX(1deg) rotateZ(.6deg) rotateY(-90deg);
      }
      50% {
        transform: rotateX(4deg) rotateZ(.9deg) rotateY(-180deg);
      }
      75% {
        transform: rotateX(-1deg) rotateZ(-.6deg) rotateY(-270deg);
      }
      100% {
        transform: rotateX(-4deg) rotateZ(-.8deg) rotateY(-360deg);
      }
    }

    .ring-card {
      position: absolute;
      left: calc(var(--itemW, var(--cardW)) / -2);
      top: calc(var(--itemH, var(--cardH)) / -2);
      width: var(--itemW, var(--cardW));
      height: var(--itemH, auto);
      transform:
        rotateY(var(--angle))
        translateZ(var(--radius))
        rotateY(90deg)
        translateY(var(--lift, 0px));
      transform-style: preserve-3d;
      border: 1px solid rgba(255,255,255,.5);
      background: rgba(255,255,255,.36);
      box-shadow:
        0 10px 26px rgba(0,0,0,.16),
        inset 0 0 0 1px rgba(0,0,0,.08);
      overflow: visible;
      cursor: pointer;
      opacity: .92;
      transition:
        transform 760ms var(--ease),
        opacity 480ms ease,
        filter 480ms ease,
        box-shadow 480ms ease;
      will-change: transform, opacity, filter;
      backface-visibility: visible;
    }

    .ring-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: saturate(.92) contrast(1.03);
      pointer-events: none;
      user-select: none;
    }



    .concept-rings {
      position: absolute;
      left: -690px;
      top: -690px;
      width: 1380px;
      height: 1380px;
      transform-origin: 50% 50%;
      transform: rotateX(58deg) rotateZ(8deg) rotateY(10deg) translateZ(34px);
      pointer-events: none;
      transform-style: preserve-3d;
      animation: conceptPlaneFloat 24s ease-in-out infinite;
      z-index: 12;
    }

    @keyframes conceptPlaneFloat {
      0% {
        transform: rotateX(58deg) rotateZ(8deg) rotateY(10deg) translateZ(34px);
      }
      35% {
        transform: rotateX(62deg) rotateZ(12deg) rotateY(6deg) translateZ(46px);
      }
      70% {
        transform: rotateX(55deg) rotateZ(6deg) rotateY(13deg) translateZ(28px);
      }
      100% {
        transform: rotateX(58deg) rotateZ(8deg) rotateY(10deg) translateZ(34px);
      }
    }

    .black-orbit-ring,
    .black-orbit-ticks,
    .blue-orbit-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      transform-origin: 50% 50%;
    }

    .black-orbit-ring {
      background:
        radial-gradient(circle,
          transparent 49.6%,
          rgba(0,0,0,0) 50.05%,
          rgba(0,0,0,.96) 50.25%,
          rgba(0,0,0,.94) 51.7%,
          rgba(0,0,0,.72) 53.8%,
          rgba(0,0,0,.36) 57.2%,
          rgba(0,0,0,.12) 61.5%,
          rgba(0,0,0,.03) 65.4%,
          transparent 68%);
      filter: drop-shadow(0 14px 18px rgba(0,0,0,.18));
      opacity: .86;
      transform: translateZ(-8px) scale(1.05);
    }

    .black-orbit-ticks {
      background:
        repeating-conic-gradient(
          from -90deg,
          rgba(0,0,0,.36) 0deg,
          rgba(0,0,0,.36) .42deg,
          transparent .42deg,
          transparent 3deg
        );
      mask-image: radial-gradient(circle,
        transparent 49.8%,
        black 50.4%,
        black 52.5%,
        transparent 54.2%);
      -webkit-mask-image: radial-gradient(circle,
        transparent 49.8%,
        black 50.4%,
        black 52.5%,
        transparent 54.2%);
      opacity: .34;
      transform: translateZ(12px) scale(1.05);
    }

    .blue-orbit-ring {
      display: none;
    }

    .concept-text-ring {
      display: none;
    }

    @keyframes textVerticalRingFloat {
      0% {
        transform: rotateX(4deg) rotateZ(-5deg) rotateY(-2deg) translateZ(88px);
      }
      33% {
        transform: rotateX(-6deg) rotateZ(2deg) rotateY(5deg) translateZ(108px);
      }
      66% {
        transform: rotateX(8deg) rotateZ(4deg) rotateY(-4deg) translateZ(78px);
      }
      100% {
        transform: rotateX(4deg) rotateZ(-5deg) rotateY(-2deg) translateZ(88px);
      }
    }

    .concept-word {
      position: absolute;
      left: -120px;
      top: -18px;
      width: 240px;
      color: rgba(255,255,255,.92);
      font-size: 24px;
      font-weight: 780;
      letter-spacing: .02em;
      text-align: center;
      white-space: nowrap;
      mix-blend-mode: difference;
      text-shadow:
        0 1px 9px rgba(255,255,255,.26),
        0 10px 30px rgba(0,0,0,.22);
      transform:
        rotateY(var(--a))
        translateZ(555px)
        rotateY(calc(var(--a) * -1));
      transform-origin: 50% 50%;
      backface-visibility: visible;
    }

    .concept-word.small {
      font-size: 19px;
      font-weight: 720;
      opacity: .82;
    }

    .calendar-dial {
      position: absolute;
      left: -650px;
      top: -650px;
      width: 1300px;
      height: 1300px;
      transform-origin: 50% 50%;
      overflow: visible;
      pointer-events: none;
      opacity: .88;
      filter: drop-shadow(0 14px 40px rgba(0,0,0,.035));
      animation: dialPlaneDrift 31s ease-in-out infinite;
    }

    @keyframes dialPlaneDrift {
      0% {
        transform: rotateX(72deg) rotateZ(0deg) translateZ(-84px);
      }

      25% {
        transform: rotateX(76deg) rotateZ(0deg) translateZ(-110px);
      }

      50% {
        /* 接近照片圆环的水平状态，不再竖起来 */
        transform: rotateX(69deg) rotateZ(0deg) translateZ(-102px);
      }

      75% {
        transform: rotateX(74deg) rotateZ(0deg) translateZ(-126px);
      }

      100% {
        transform: rotateX(72deg) rotateZ(0deg) translateZ(-84px);
      }
    }

    .dial-line {
      stroke: rgba(17,17,17,.20);
      stroke-width: .55;
      vector-effect: non-scaling-stroke;
      shape-rendering: geometricPrecision;
    }

    .dial-line.major {
      stroke: rgba(17,17,17,.42);
      stroke-width: 1.05;
    }

    .dial-line.month {
      stroke: rgba(17,17,17,.58);
      stroke-width: 1.15;
    }

    .dial-ring,
    .dial-ring.strong,
    .dial-ring.faint {
      display: none;
    }

    .dial-text {
      fill: rgba(17,17,17,.72);
      font-size: 17px;
      font-weight: 500;
      letter-spacing: .04em;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .dial-text.month-name {
      font-size: 22px;
      font-weight: 520;
    }

    .dial-text.season-name {
      font-size: 16px;
      fill: rgba(17,17,17,.48);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .dial-text.day-num {
      font-size: 7.6px;
      fill: rgba(17,17,17,.42);
      letter-spacing: .02em;
    }

    .dial-center-year {
      fill: rgba(17,17,17,.82);
      font-size: 58px;
      font-weight: 470;
      letter-spacing: .02em;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .dial-center-sub {
      fill: rgba(17,17,17,.52);
      font-size: 16px;
      letter-spacing: .14em;
      text-anchor: middle;
      dominant-baseline: middle;
      text-transform: uppercase;
    }

    .dial-dot {
      fill: rgba(17,17,17,.74);
    }

    .dial-dot.open {
      fill: none;
      stroke: rgba(17,17,17,.74);
      stroke-width: 1.1;
      vector-effect: non-scaling-stroke;
    }

    .card-date-label {
      position: absolute;
      right: calc(100% + 34px);
      top: 50%;
      width: 112px;
      color: rgba(17,17,17,.78);
      font-size: 10.5px;
      line-height: 1.24;
      letter-spacing: .035em;
      text-align: right;
      pointer-events: none;
      text-shadow: 0 1px 10px rgba(255,255,255,.96);
      transform:
        translateY(-50%)
        translateZ(18px);
      white-space: pre-line;
    }

    .card-date-label::before {
      content: "";
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      width: 26px;
      height: 1px;
      background: rgba(17,17,17,.18);
      transform: translateY(-50%);
    }

    .ring-card::after {
      display: none;
    }

    .ring-card::after {
      content: attr(data-date);
      position: absolute;
      left: 8px;
      bottom: 7px;
      color: rgba(255,255,255,.86);
      font-size: 9px;
      letter-spacing: .08em;
      text-shadow: 0 1px 8px rgba(0,0,0,.48);
      mix-blend-mode: difference;
    }

    .ring-card:hover,
    .ring-card.is-active {
      opacity: 1;
      filter: saturate(1.08) contrast(1.06);
      box-shadow:
        0 18px 48px rgba(0,0,0,.24),
        inset 0 0 0 1px rgba(255,255,255,.55);
      transform:
        rotateY(var(--angle))
        translateZ(calc(var(--radius) + 84px))
        rotateY(90deg)
        translateY(var(--lift, 0px))
        scale(1.08);
      z-index: 10;
    }

    .ring-card.is-entering {
      z-index: 80;
      animation: flyIntoRing 1900ms var(--ease) both;
      box-shadow:
        0 28px 90px rgba(0,0,0,.28),
        0 0 0 1px rgba(255,255,255,.85);
    }

    @keyframes flyIntoRing {
      0% {
        opacity: 1;
        transform:
          translate3d(0, -12vh, 720px)
          rotateY(0deg)
          rotateX(0deg)
          scale(1.52);
        filter: blur(0) saturate(1.12);
      }

      36% {
        opacity: 1;
        transform:
          translate3d(0, -12vh, 720px)
          rotateY(0deg)
          rotateX(0deg)
          scale(1.52);
        filter: blur(0) saturate(1.12);
      }

      100% {
        opacity: .96;
        transform:
          rotateY(var(--angle))
          translateZ(var(--radius))
          rotateY(90deg)
          translateY(var(--lift, 0px))
          scale(1);
        filter: blur(0) saturate(1);
      }
    }

    .focus-preview {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(34vw, 460px);
      min-width: 300px;
      transform: translate(-50%, -50%) scale(.96);
      z-index: 12;
      pointer-events: none;
      text-align: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 360ms ease, visibility 360ms ease, transform 700ms var(--ease);
    }

    .focus-preview.is-visible {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .focus-card {
      position: relative;
      width: 100%;
      min-height: 260px;
      margin: 0 auto;
      background: rgba(255,255,255,.58);
      border: 1px solid rgba(17,17,17,.12);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .focus-card img {
      width: 100%;
      height: auto;
      max-height: 62vh;
      object-fit: contain;
      display: block;
      background: rgba(255,255,255,.56);
    }

    .focus-meta {
      margin-top: 14px;
      padding: 0 16px;
    }

    .focus-fragment {
      font-size: 16px;
      line-height: 1.1;
      letter-spacing: .08em;
      font-weight: 800;
      text-transform: uppercase;
    }

    .focus-desc {
      margin-top: 8px;
      color: rgba(17,17,17,.62);
      font-size: 12px;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .focus-hint {
      margin-top: 12px;
      font-size: 11px;
      color: rgba(17,17,17,.42);
      letter-spacing: .12em;
      text-transform: uppercase;
    }


    .ring-shell {
      cursor: grab;
    }

    .ring-shell.is-dragging {
      cursor: grabbing;
    }

    .focus-meta.is-hidden {
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
    }

    .focus-meta {
      transition: opacity 260ms ease, transform 260ms ease;
    }

    .field {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .falling {
      position: absolute;
      width: var(--s);
      height: var(--s);
      left: var(--x);
      top: -12vh;
      opacity: var(--o);
      background: rgba(255,255,255,.38);
      border: 1px solid rgba(17,17,17,.16);
      border-radius: var(--r);
      box-shadow: 0 10px 26px rgba(0,0,0,.08);
      transform: translate3d(0, 0, 0) rotate(var(--rot));
      animation:
        fall var(--dur) linear infinite,
        drift var(--drift) ease-in-out infinite alternate;
      animation-delay: var(--delay);
      backdrop-filter: blur(2px);
    }

    .falling.strip {
      width: calc(var(--s) * .42);
      height: calc(var(--s) * 2.8);
    }

    .falling.triangle {
      width: 0;
      height: 0;
      background: transparent;
      border-left: calc(var(--s) * .55) solid transparent;
      border-right: calc(var(--s) * .55) solid transparent;
      border-bottom: calc(var(--s) * .95) solid rgba(255,255,255,.44);
      border-radius: 0;
      box-shadow: none;
    }

    @keyframes fall {
      from {
        transform: translate3d(var(--windX, 0px), -18vh, 0) rotate(var(--rot));
      }
      to {
        transform: translate3d(calc(var(--windX, 0px) * 2.2), 124vh, 0) rotate(calc(var(--rot) + 250deg));
      }
    }

    @keyframes drift {
      from { margin-left: -22px; }
      to { margin-left: 26px; }
    }

    .controls {
      position: absolute;
      left: 28px;
      bottom: 26px;
      z-index: 24;
      width: min(360px, calc(100vw - 56px));
      display: grid;
      gap: 10px;
      color: rgba(17,17,17,.7);
    }


    .view-switch {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .mode-btn {
      appearance: none;
      border: 1px solid rgba(17,17,17,.18);
      background: rgba(255,255,255,.62);
      color: rgba(17,17,17,.66);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 750;
      letter-spacing: .06em;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 220ms ease, color 220ms ease, transform 220ms ease;
    }

    .mode-btn:hover {
      background: rgba(255,255,255,.96);
      transform: translateY(-1px);
    }

    .mode-btn.active {
      background: #111;
      border-color: #111;
      color: #fff;
    }

    .control-row {
      display: grid;
      grid-template-columns: 68px 1fr 38px;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .range {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 2px;
      background: rgba(17,17,17,.22);
      outline: none;
    }

    .range::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: #111;
      cursor: pointer;
    }

    .range::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: 0;
      border-radius: 999px;
      background: #111;
      cursor: pointer;
    }

    .toolbar {
      position: absolute;
      right: 32px;
      top: 28px;
      display: flex;
      gap: 10px;
      z-index: 25;
    }

    .toolbar button,
    .drawer-close,
    .admin-delete {
      appearance: none;
      border: 1px solid rgba(17,17,17,.18);
      background: rgba(255,255,255,.62);
      color: #111;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: background 220ms ease, transform 220ms ease;
    }

    .toolbar button:hover,
    .drawer-close:hover,
    .admin-delete:hover {
      background: #fff;
      transform: translateY(-1px);
    }

    .drawer {
      position: absolute;
      top: 0;
      right: 0;
      width: min(440px, 38vw);
      height: 100%;
      z-index: 40;
      background: rgba(255,255,255,.88);
      border-left: 1px solid rgba(17,17,17,.13);
      box-shadow: -28px 0 80px rgba(0,0,0,.16);
      transform: translateX(105%);
      transition: transform 720ms var(--ease);
      backdrop-filter: blur(18px);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .drawer.active {
      transform: translateX(0);
    }

    .drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 24px 24px 14px;
      border-bottom: 1px solid rgba(17,17,17,.1);
    }

    .drawer-title {
      margin: 0;
      font-size: 24px;
      line-height: 1;
      letter-spacing: -.04em;
    }

    .drawer-body {
      overflow: auto;
      padding: 20px 24px 30px;
    }

    .drawer-image {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: contain;
      background: #f6f6f6;
      border: 1px solid rgba(17,17,17,.1);
      display: block;
    }

    .drawer-info {
      margin-top: 18px;
      display: grid;
      gap: 14px;
    }

    .info-block {
      border-top: 1px solid rgba(17,17,17,.12);
      padding-top: 12px;
    }

    .label {
      margin-bottom: 5px;
      font-size: 11px;
      color: rgba(17,17,17,.46);
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .value {
      font-size: 15px;
      line-height: 1.65;
      color: rgba(17,17,17,.86);
      word-break: break-word;
    }

    .admin-delete {
      margin-top: 18px;
      color: #b00020;
      display: none;
    }

    body.admin .admin-delete {
      display: inline-flex;
    }


    .incoming-ghost {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 90;
      width: min(28vw, 420px);
      max-height: 54vh;
      object-fit: contain;
      pointer-events: none;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 28px 70px rgba(0,0,0,.22));
      animation: incomingGhostFly 1800ms var(--ease) both;
    }

    @keyframes incomingGhostFly {
      0% {
        opacity: 0;
        transform: translate(-50%, 64vh) scale(.86);
        filter: blur(12px) drop-shadow(0 24px 60px rgba(0,0,0,.18));
      }

      56% {
        opacity: 1;
        transform: translate(-50%, -62%) scale(1.06);
        filter: blur(0) drop-shadow(0 30px 80px rgba(0,0,0,.24));
      }

      100% {
        opacity: 1;
        transform: translate(-50%, -62%) scale(1.06);
        filter: blur(0) drop-shadow(0 30px 80px rgba(0,0,0,.24));
      }
    }

    .empty {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 30;
      transform: translate(-50%, -50%);
      width: min(520px, calc(100vw - 64px));
      padding: 34px;
      text-align: center;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(17,17,17,.13);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      display: none;
    }

    .empty h2 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -.04em;
    }

    .empty p {
      margin: 12px 0 0;
      color: rgba(17,17,17,.58);
      line-height: 1.6;
      font-size: 14px;
    }

    .toast {
      position: absolute;
      left: 50%;
      top: 24px;
      z-index: 60;
      transform: translate(-50%, -120px);
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(17,17,17,.88);
      color: #fff;
      font-size: 13px;
      letter-spacing: .05em;
      opacity: 0;
      transition: transform 520ms var(--ease), opacity 520ms ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 900px) {
      body::before {
        content: "当前版本优先为电脑端展览屏幕设计。请在电脑端查看完整 3D 圆环效果。";
        position: fixed;
        inset: 0;
        z-index: 999;
        display: grid;
        place-items: center;
        padding: 34px;
        text-align: center;
        background: #f3f0e8;
        color: #111;
        font-size: 18px;
        line-height: 1.7;
      }
    }
  </style>
</head>

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setStatus(text) {
      statusText.textContent = text;
    }

    function getImageUrl(item) {
      return item.image_url || item.generated_image_url || item.public_url || "";
    }

    function getSerial(item) {
      return item.serial_number || item.fragment_number || item.id || "";
    }

    function getRawDate(item) {
      return (
        item.photo_date ||
        item.photo_taken_at ||
        item.taken_at ||
        item.image_date ||
        item.calendar_date ||
        item.date_parts ||
        item.date ||
        item.created_at ||
        ""
      );
    }

    function normalizeDateParts(item) {
      // 兼容三种情况：
      // 1. 数据库里有 year/month/day/hour/minute 独立字段；
      // 2. photo_date / date_parts 是 {"year":"2026","month":"03"...} 这种 JSON 字符串；
      // 3. 普通 ISO 时间字符串。
      const direct = {
        year: item.year || item.photo_year,
        month: item.month || item.photo_month,
        day: item.day || item.photo_day,
        hour: item.hour || item.photo_hour,
        minute: item.minute || item.photo_minute
      };

      if (direct.year && direct.month && direct.day) {
        return {
          year: Number(direct.year),
          month: Number(direct.month),
          day: Number(direct.day),
          hour: Number(direct.hour || 0),
          minute: Number(direct.minute || 0)
        };
      }

      let raw = getRawDate(item);

      if (raw && typeof raw === "object") {
        const p = raw;
        if (p.year && p.month && p.day) {
          return {
            year: Number(p.year),
            month: Number(p.month),
            day: Number(p.day),
            hour: Number(p.hour || 0),
            minute: Number(p.minute || 0)
          };
        }
      }

      if (typeof raw === "string") {
        const trimmed = raw.trim();

        if (trimmed.startsWith("{") && trimmed.endsWith("}")) {
          try {
            const p = JSON.parse(trimmed);
            if (p.year && p.month && p.day) {
              return {
                year: Number(p.year),
                month: Number(p.month),
                day: Number(p.day),
                hour: Number(p.hour || 0),
                minute: Number(p.minute || 0)
              };
            }
          } catch (err) {}
        }

        const d = new Date(trimmed);
        if (!Number.isNaN(d.getTime())) {
          return {
            year: d.getFullYear(),
            month: d.getMonth() + 1,
            day: d.getDate(),
            hour: d.getHours(),
            minute: d.getMinutes()
          };
        }
      }

      const fallback = new Date(item.created_at || 0);
      if (!Number.isNaN(fallback.getTime())) {
        return {
          year: fallback.getFullYear(),
          month: fallback.getMonth() + 1,
          day: fallback.getDate(),
          hour: fallback.getHours(),
          minute: fallback.getMinutes()
        };
      }

      return null;
    }

    function getDateObject(item) {
      const p = normalizeDateParts(item);
      if (!p) return new Date(0);
      const d = new Date(p.year, p.month - 1, p.day, p.hour || 0, p.minute || 0);
      if (Number.isNaN(d.getTime())) return new Date(0);
      return d;
    }

    function formatDate(item) {
      const p = normalizeDateParts(item);
      if (!p) return "未记录日期";
      return `${p.year}年${String(p.month).padStart(2, "0")}月${String(p.day).padStart(2, "0")}日 ${String(p.hour || 0).padStart(2, "0")}:${String(p.minute || 0).padStart(2, "0")}`;
    }

    function formatShortDate(item) {
      const p = normalizeDateParts(item);
      if (!p) return "NO DATE";
      return `${String(p.month).padStart(2, "0")}.${String(p.day).padStart(2, "0")}`;
    }

    function formatFloatingDate(item) {
      const p = normalizeDateParts(item);
      if (!p) return "NO DATE\\n--:--";
      return `${p.year}.${String(p.month).padStart(2, "0")}.${String(p.day).padStart(2, "0")}\\n${String(p.hour || 0).padStart(2, "0")}:${String(p.minute || 0).padStart(2, "0")}`;
    }

    function getTag(item) {
      return tagMap[item.ritual_type] ||
             tagMap[item.daily_tag] ||
             tagMap[item.category] ||
             item.ritual_type ||
             item.daily_tag ||
             item.category ||
             "未分类";
    }

    function getLocation(item) {
      return item.location || item.place || "未填写";
    }

    function getUserText(item) {
      return item.user_text || item.note || item.text || item.description || "未填写";
    }

    function sortByDate(items) {
      return [...items].sort((a, b) => {
        const da = getDateObject(a).getTime();
        const db = getDateObject(b).getTime();
        if (da !== db) return da - db;
        return Number(a.id || 0) - Number(b.id || 0);
      });
    }


    function preloadImageSize(src) {
      return new Promise(resolve => {
        if (!src) {
          resolve({ w: 1, h: 1 });
          return;
        }

        if (imageSizeMap.has(src)) {
          resolve(imageSizeMap.get(src));
          return;
        }

        const img = new Image();
        img.onload = () => {
          const size = {
            w: img.naturalWidth || 1,
            h: img.naturalHeight || 1
          };
          imageSizeMap.set(src, size);
          resolve(size);
        };
        img.onerror = () => {
          const size = { w: 3, h: 4 };
          imageSizeMap.set(src, size);
          resolve(size);
        };
        img.src = src;
      });
    }

    async function preloadAllImageSizes(items) {
      await Promise.all(items.map(item => preloadImageSize(getImageUrl(item))));
    }

    function getDisplaySizeForItem(item, base) {
      const src = getImageUrl(item);
      const size = imageSizeMap.get(src) || { w: 3, h: 4 };
      const ratio = size.w / size.h;

      // 关键：不裁切、不压扁，横图保持横图，竖图保持竖图。
      // 这里用统一的“短边基准”：横图的高度 = base，竖图的宽度 = base。
      // 这样横构图不会被压成很小，竖构图也不会被裁短。
      if (ratio >= 1) {
        return {
          w: Math.round(base * ratio),
          h: Math.round(base)
        };
      }

      return {
        w: Math.round(base),
        h: Math.round(base / ratio)
      };
    }


    function buildMonthAngleMap(items) {
      const monthGroups = new Map();

      items.forEach(item => {
        const p = normalizeDateParts(item);
        const month = p ? p.month : 1;
        if (!monthGroups.has(month)) monthGroups.set(month, []);
        monthGroups.get(month).push(item);
      });

      monthGroups.forEach(group => {
        group.sort((a, b) => getDateObject(a).getTime() - getDateObject(b).getTime());
      });

      const map = new Map();

      monthGroups.forEach((group, month) => {
        const sectorStart = (month - 1) * 30;
        const n = Math.max(group.length, 1);

        group.forEach((item, idx) => {
          // 每个月固定 30 度；月内图片越多越密，越少越疏。
          // 例如 30 张≈1度间距；3张≈10度间距。
          const angle = sectorStart + ((idx + 0.5) * 30 / n);
          map.set(String(item.id), angle);
        });
      });

      return map;
    }

    function updateRingMetrics() {
      const count = Math.max(currentItems.length, 1);
      const zoom = Number(zoomSlider.value);
      zoomVal.textContent = zoom;

      const minSide = Math.min(window.innerWidth, window.innerHeight);

      // zoom 越大，越贴近圆环局部，半径越大、图片越大，视觉上像进入一段切片
      const radius = Math.round(340 + zoom * 6.4);
      // base 是统一短边基准：
      // 横图：高度 = base；竖图：宽度 = base；异形图按自身比例显示。
      const base = Math.round(Math.max(78, Math.min(158, minSide * (0.102 + zoom * 0.00058))));
      const cardW = base;
      const cardH = base;

      document.documentElement.style.setProperty("--radius", radius + "px");
      document.documentElement.style.setProperty("--cardW", cardW + "px");
      document.documentElement.style.setProperty("--cardH", cardH + "px");

      // Speed 控制圆环自动旋转速度：数值越大，转得越快。
      const speed = Number(speedSlider.value);
      speedVal.textContent = speed;
      const duration = viewMode === "slice"
        ? Math.max(18, 112 - speed * 0.92)
        : Math.max(14, 82 - speed * 0.62);
      ring.style.setProperty("--spinDuration", duration + "s");

      const monthAngleMap = buildMonthAngleMap(currentItems);
      const cards = ring.querySelectorAll(".ring-card");

      cards.forEach((card, i) => {
        const item = currentItems.find(x => String(x.id) === String(card.dataset.id));
        const angle = item ? (monthAngleMap.get(String(item.id)) || 0) : 0;

        // 增加轻微上下错落，让行星带不是死板平面。
        const wave = Math.sin(angle * Math.PI / 42) * 24 + Math.sin(i * 0.65) * 10;
        const display = item ? getDisplaySizeForItem(item, base) : { w: base, h: base };

        card.style.setProperty("--angle", angle + "deg");
        card.style.setProperty("--radius", radius + "px");
        card.style.setProperty("--lift", wave + "px");
        card.style.setProperty("--itemW", display.w + "px");
        card.style.setProperty("--itemH", display.h + "px");
      });
    }

    function setActiveItem(item, { fromHover = false, showMeta = false } = {}) {
      if (!item) return;

      activeId = item.id;
      const imageUrl = getImageUrl(item);

      focusImage.src = imageUrl;

      if (showMeta) {
        focusPreview.classList.add("is-visible");
        focusTitle.textContent = `#Fragment ${getSerial(item)}`;
        focusDesc.textContent = `${formatDate(item)} · ${getLocation(item)} · ${getTag(item)}｜${getUserText(item)}`;
        focusMeta.classList.remove("is-hidden");
      } else {
        focusPreview.classList.remove("is-visible");
        focusTitle.textContent = "";
        focusDesc.textContent = "";
        focusMeta.classList.add("is-hidden");
      }

      ring.querySelectorAll(".ring-card").forEach(card => {
        card.classList.toggle("is-active", String(card.dataset.id) === String(item.id));
      });

      if (fromHover) {
        ring.classList.add("is-paused");
      }
    }

    function clearHoverPause() {
      ring.classList.remove("is-paused");
    }

    function openDrawer(item) {
      if (!item) return;

      currentModalId = item.id;
      drawerTitle.textContent = `#Fragment ${getSerial(item)}`;
      drawerImage.src = getImageUrl(item);
      drawerDate.textContent = formatDate(item);
      drawerLocation.textContent = getLocation(item);
      drawerTag.textContent = getTag(item);
      drawerText.textContent = getUserText(item);

      drawer.classList.add("active");
      setActiveItem(item, { showMeta: true });
      ring.classList.add("is-paused");
    }

    function closeDrawer() {
      drawer.classList.remove("active");
      currentModalId = null;
      clearHoverPause();
      focusPreview.classList.remove("is-visible");
      focusMeta.classList.add("is-hidden");
      ring.querySelectorAll(".ring-card").forEach(card => card.classList.remove("is-active"));
    }


    function dayOfYear(parts) {
      if (!parts) return 1;
      const d = new Date(parts.year, parts.month - 1, parts.day);
      const start = new Date(parts.year, 0, 1);
      return Math.floor((d - start) / 86400000) + 1;
    }

    function polar(cx, cy, r, deg) {
      const rad = (deg - 90) * Math.PI / 180;
      return {
        x: cx + Math.cos(rad) * r,
        y: cy + Math.sin(rad) * r
      };
    }

    function lineSvg(r1, r2, deg, cls) {
      const a = polar(500, 500, r1, deg);
      const b = polar(500, 500, r2, deg);
      return `<line class="${cls}" x1="${a.x.toFixed(2)}" y1="${a.y.toFixed(2)}" x2="${b.x.toFixed(2)}" y2="${b.y.toFixed(2)}" />`;
    }

    function textSvg(r, deg, text, cls, rotate = true) {
      const p = polar(500, 500, r, deg);
      const rot = rotate ? ` transform="rotate(${deg.toFixed(2)} ${p.x.toFixed(2)} ${p.y.toFixed(2)})"` : "";
      return `<text class="${cls}" x="${p.x.toFixed(2)}" y="${p.y.toFixed(2)}"${rot}>${escapeHtml(text)}</text>`;
    }

    function renderCalendarDial(items) {
      if (!calendarDial) return;

      const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      const seasons = [
        { name: "Spring", start: 60, end: 151 },
        { name: "Summer", start: 152, end: 243 },
        { name: "Autumn", start: 244, end: 334 },
        { name: "Winter", start: 335, end: 424 }
      ];

      const partsList = items.map(normalizeDateParts).filter(Boolean);
      const years = [...new Set(partsList.map(p => p.year))].sort((a, b) => a - b);
      const centerYear = years.length === 1 ? years[0] : (years.length ? `${years[0]}–${years[years.length - 1]}` : "----");

      let svg = "";

      // 365细刻度：圆形不靠线框，而靠这些竖向刻度和细小数字自然形成。
      for (let i = 1; i <= 365; i++) {
        const deg = (i - 1) / 365 * 360;
        const isWeek = i % 7 === 1;
        const isTen = i % 10 === 1;
        svg += lineSvg(isWeek ? 210 : 252, isTen ? 498 : 486, deg, `dial-line ${isWeek ? "major" : ""}`);
        if (i % 5 === 1) {
          svg += textSvg(512, deg, String(i).padStart(3, "0"), "dial-text day-num");
        }
      }

      // 月份分隔与月份名称
      const monthStarts = [1, 32, 60, 91, 121, 152, 182, 213, 244, 274, 305, 335];
      const monthEnds = [31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334, 365];

      monthStarts.forEach((start, idx) => {
        const deg = (start - 1) / 365 * 360;
        svg += lineSvg(132, 510, deg, "dial-line month");

        const mid = (start + monthEnds[idx]) / 2;
        const midDeg = (mid - 1) / 365 * 360;
        svg += textSvg(214, midDeg, monthNames[idx], "dial-text month-name");
      });

      // 四季文字
      seasons.forEach(season => {
        let mid = (season.start + season.end) / 2;
        if (mid > 365) mid -= 365;
        const deg = (mid - 1) / 365 * 360;
        svg += textSvg(146, deg, season.name, "dial-text season-name");
      });

      // 投稿日期对应的小点，给图片和外圈建立真实联系
      partsList.forEach((p, idx) => {
        const doy = dayOfYear(p);
        const deg = (doy - 1) / 365 * 360;
        const pos = polar(500, 500, 476, deg);
        const open = idx % 2 === 0 ? "" : " open";
        svg += `<circle class="dial-dot${open}" cx="${pos.x.toFixed(2)}" cy="${pos.y.toFixed(2)}" r="4.2" />`;
      });

      // 不绘制中心年份与圆形框线，让圆形完全由刻度、月份、四季文字形成。
      svg += `<text class="dial-center-sub" x="500" y="500"></text>`;

      calendarDial.innerHTML = svg;
    }

    async function renderRing({ incomingId = null } = {}) {
      const items = sortByDate(currentItems);
      currentItems = items;

      if (!items.length) {
        ring.innerHTML = "";
        emptyState.style.display = "block";
        setStatus("当前还没有投稿");
        return;
      }

      emptyState.style.display = "none";

      await preloadAllImageSizes(items);
      renderCalendarDial(items);

      ring.querySelectorAll(".ring-card").forEach(card => card.remove());

      const cardsHtml = items.map((item, i) => {
        const id = escapeHtml(item.id);
        const imageUrl = escapeHtml(getImageUrl(item));
        const serial = escapeHtml(getSerial(item));
        const enteringClass = String(item.id) === String(incomingId) ? " is-entering" : "";

        return `
          <article
            class="ring-card${enteringClass}"
            data-id="${id}"
            data-index="${i}"
            data-date="${escapeHtml(formatShortDate(item))}"
            title="#Fragment ${serial}"
          >
            <img src="${imageUrl}" alt="#Fragment ${serial}" loading="lazy" />
            <span class="card-date-label">${escapeHtml(formatFloatingDate(item))}</span>
          </article>
        `;
      }).join("");

      ring.insertAdjacentHTML("beforeend", cardsHtml);

      updateRingMetrics();

      const active = incomingId
        ? items.find(item => String(item.id) === String(incomingId))
        : items[Math.min(items.length - 1, Math.floor(items.length / 2))];

      focusPreview.classList.remove("is-visible");
      focusMeta.classList.add("is-hidden");
      ring.querySelectorAll(".ring-card").forEach(card => card.classList.remove("is-active"));

      setStatus(`共 ${items.length} 张 Fragment，实时同步已开启`);
    }



    function wait(ms) {
      return new Promise(resolve => window.setTimeout(resolve, ms));
    }

    async function playIncomingSequence(item) {
      if (!item) return;

      const imgUrl = getImageUrl(item);
      if (!imgUrl) {
        await loadGallery({ incomingId: item.id, silent: true });
        return;
      }

      // 第一段：独立图片从页面底部飞到圆环圆心上方，并停留一下。
      const ghost = document.createElement("img");
      ghost.className = "incoming-ghost";
      ghost.src = imgUrl;
      ghost.alt = "新的 Fragment";
      document.body.appendChild(ghost);

      await wait(1780);

      // 第二段：移除中心 ghost，同时让圆环中的真实卡片从圆心上方飞入自己的日期位置。
      ghost.remove();
      await loadGallery({ incomingId: item.id, silent: true });
    }

    async function fetchLatestSubmission() {
      const { data, error } = await supabaseClient
        .from("submissions")
        .select("*")
        .order("id", { ascending: false })
        .limit(1);

      if (error) {
        console.warn("检查新投稿失败：", error);
        return null;
      }

      return data && data[0] ? data[0] : null;
    }

    async function checkForNewSubmissions() {
      if (isLoadingGallery) return;

      const latest = await fetchLatestSubmission();
      if (!latest) return;

      const latestId = String(latest.id);

      if (lastLatestId === null) {
        lastLatestId = latestId;
        return;
      }

      if (latestId !== lastLatestId) {
        lastLatestId = latestId;
        showToast("新的 Fragment 正在飞入公共日历");
        await playIncomingSequence(latest);


      }
    }

    async function loadGallery({ incomingId = null, silent = false } = {}) {
      if (isLoadingGallery) return;
      isLoadingGallery = true;

      if (!silent) setStatus("正在读取公共日历……");

      const { data, error } = await supabaseClient
        .from("submissions")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        console.error("读取投稿失败：", error);
        setStatus("读取失败，请检查 Supabase 或网络");
        isLoadingGallery = false;
        return;
      }

      currentItems = data || [];
      if (currentItems[0]) {
        lastLatestId = String(currentItems[0].id);
      }

      await renderRing({ incomingId });
      lastKnownIds = new Set(currentItems.map(item => String(item.id)));
      isLoadingGallery = false;
    }

    async function deleteItemById(id) {
      const item = currentItems.find(x => String(x.id) === String(id));
      if (!item) return;

      const ok = confirm(`确认删除 #Fragment ${getSerial(item)} 吗？`);
      if (!ok) return;

      try {
        let filePath = "";
        const marker = "/generated-images/";
        const imageUrl = getImageUrl(item);
        const idx = imageUrl.indexOf(marker);

        if (idx !== -1) {
          filePath = decodeURIComponent(imageUrl.slice(idx + marker.length));
        }

        if (filePath) {
          const { error: storageError } = await supabaseClient
            .storage
            .from("generated-images")
            .remove([filePath]);

          if (storageError) {
            console.error("删除 storage 文件失败：", storageError);
          }
        }

        const { error: dbError } = await supabaseClient
          .from("submissions")
          .delete()
          .eq("id", id);

        if (dbError) {
          console.error("删除数据库记录失败：", dbError);
          alert("删除失败");
          return;
        }

        closeDrawer();
        await loadGallery({ silent: true });
      } catch (err) {
        console.error(err);
        alert("删除失败");
      }
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      window.clearTimeout(showToast._timer);
      showToast._timer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 2400);
    }

    function createFallingObjects() {
      return;
      const types = ["circle", "rect", "strip", "triangle"];
      const count = 13;

      fallingField.innerHTML = Array.from({ length: count }).map((_, i) => {
        const type = types[i % types.length];
        const size = 24 + Math.random() * 72;
        const x = Math.random() * 100;
        const opacity = 0.15 + Math.random() * 0.24;
        const radius = type === "circle" ? "999px" : (Math.random() > .5 ? "24px" : "4px");
        const dur = 14 + Math.random() * 18;
        const drift = 4 + Math.random() * 5;
        const delay = -Math.random() * 22;
        const rot = Math.round(Math.random() * 180) + "deg";

        return `<span class="falling ${type}" style="
          --s:${size}px;
          --x:${x}vw;
          --o:${opacity};
          --r:${radius};
          --dur:${dur}s;
          --drift:${drift}s;
          --delay:${delay}s;
          --rot:${rot};
        "></span>`;
      }).join("");
    }

    function updateWindOnly(e) {
      const velocityX = e.clientX - lastMouseX;
      lastMouseX = e.clientX;
      windX = Math.max(-90, Math.min(90, windX * 0.82 + velocityX * 0.9));
      document.documentElement.style.setProperty("--windX", windX.toFixed(1) + "px");
    }

    function applyViewRotation() {
      orbitStage.style.setProperty("--tiltY", viewRotY.toFixed(2) + "deg");
      orbitStage.style.setProperty("--tiltX", viewRotX.toFixed(2) + "deg");

      if (viewMode === "slice") {
        // 局部切片：把圆环中心推出画面右侧，只截取圆环左侧的一段边缘。
        orbitStage.style.setProperty("--stageScale", "1.18");
        orbitStage.style.setProperty("--stageX", "46vw");
        orbitStage.style.setProperty("--stageY", "2vh");
      } else {
        orbitStage.style.setProperty("--stageScale", ".56");
        orbitStage.style.setProperty("--stageX", "0vw");
        orbitStage.style.setProperty("--stageY", "0vh");
      }
    }

    function setViewMode(mode) {
      viewMode = mode;

      if (mode === "slice") {
        document.body.classList.add("slice-mode");
        fullRingBtn.classList.remove("active");
        sliceRingBtn.classList.add("active");
        zoomSlider.value = 88;
        viewRotX = -12;
        viewRotY = -58;
      } else {
        document.body.classList.remove("slice-mode");
        fullRingBtn.classList.add("active");
        sliceRingBtn.classList.remove("active");
        zoomSlider.value = 30;
        viewRotX = -10;
        viewRotY = 0;
      }

      applyViewRotation();
      updateRingMetrics();
    }

    function startViewDrag(e) {
      if (e.target.closest(".ring-card") || e.target.closest(".drawer") || e.target.closest(".toolbar") || e.target.closest(".controls")) return;

      isDraggingView = true;
      ringShell.classList.add("is-dragging");
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      startRotX = viewRotX;
      startRotY = viewRotY;
      ring.classList.add("is-paused");
    }

    function dragView(e) {
      updateWindOnly(e);
      if (!isDraggingView) return;

      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;

      viewRotY = startRotY + dx * 0.16;
      viewRotX = Math.max(-44, Math.min(28, startRotX - dy * 0.12));
      applyViewRotation();
    }

    function endViewDrag() {
      if (!isDraggingView) return;
      isDraggingView = false;
      ringShell.classList.remove("is-dragging");
      if (!drawer.classList.contains("active")) {
        clearHoverPause();
      }
    }

    function fadeWind() {
      windX *= 0.94;
      document.documentElement.style.setProperty("--windX", windX.toFixed(1) + "px");
      requestAnimationFrame(fadeWind);
    }

    ring.addEventListener("mouseover", function(e) {
      const card = e.target.closest(".ring-card");
      if (!card) return;

      const item = currentItems.find(x => String(x.id) === String(card.dataset.id));
      if (item) setActiveItem(item, { fromHover: true, showMeta: true });
    });

    ring.addEventListener("mouseout", function(e) {
      const card = e.target.closest(".ring-card");
      if (!card) return;
      if (!drawer.classList.contains("active")) {
        clearHoverPause();
        focusPreview.classList.remove("is-visible");
        focusMeta.classList.add("is-hidden");
        ring.querySelectorAll(".ring-card").forEach(card => card.classList.remove("is-active"));
      }
    });

    ring.addEventListener("click", function(e) {
      const card = e.target.closest(".ring-card");
      if (!card) return;

      const item = currentItems.find(x => String(x.id) === String(card.dataset.id));
      if (item) openDrawer(item);
    });

    closeDrawerBtn.addEventListener("click", closeDrawer);

    deleteCurrentBtn.addEventListener("click", function() {
      if (!currentModalId) return;
      deleteItemById(currentModalId);
    });

    refreshBtn.addEventListener("click", function() {
      loadGallery();
    });

    fullRingBtn.addEventListener("click", () => setViewMode("full"));
    sliceRingBtn.addEventListener("click", () => setViewMode("slice"));

    zoomSlider.addEventListener("input", updateRingMetrics);
    speedSlider.addEventListener("input", updateRingMetrics);

    window.addEventListener("resize", updateRingMetrics);
    window.addEventListener("mousemove", dragView);
    ringShell.addEventListener("mousedown", startViewDrag);
    window.addEventListener("mouseup", endViewDrag);
    window.addEventListener("mouseleave", endViewDrag);
    applyViewRotation();

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closeDrawer();
    });

    renderConceptTextRing();
    createFallingObjects();
    fadeWind();
    loadGallery();

    const realtimeChannel = supabaseClient
      .channel("public-submissions-calendar-ring-v4")
      .on(
        "postgres_changes",
        { event: "INSERT", schema: "public", table: "submissions" },
        async (payload) => {
          realtimeReady = true;
          const incomingId = payload.new && payload.new.id;
          if (incomingId) {
            lastLatestId = String(incomingId);
            showToast("新的 Fragment 正在飞入公共日历");
            await playIncomingSequence(payload.new);


          }
        }
      )
      .on(
        "postgres_changes",
        { event: "DELETE", schema: "public", table: "submissions" },
        async () => {
          await loadGallery({ silent: true });
        }
      )
      .subscribe((status) => {
        console.log("Supabase realtime status:", status);

        if (status === "SUBSCRIBED") {
          realtimeReady = true;
          setStatus(`共 ${currentItems.length} 张 Fragment，实时同步已开启`);
        }

        if (status === "CHANNEL_ERROR" || status === "TIMED_OUT" || status === "CLOSED") {
          realtimeReady = false;
          setStatus(`共 ${currentItems.length} 张 Fragment，自动检查新投稿中`);
        }
      });

    // 兜底轮询：有些 Supabase 项目没有开启 Realtime publication，
    // 或者浏览器网络会拦截 websocket。这里每 6 秒检查一次最新投稿。
    // 如果发现最新 id 变化，就自动执行同样的飞入动画。
    window.setInterval(checkForNewSubmissions, 6000);
  </script>
</body>
