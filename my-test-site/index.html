        function pad2(n) {
    return String(n).padStart(2, "0");
}

function getDatePartsFromDate(dateObj) {
    return {
        year: String(dateObj.getFullYear()),
        month: pad2(dateObj.getMonth() + 1),
        day: pad2(dateObj.getDate()),
        hour: pad2(dateObj.getHours()),
        minute: pad2(dateObj.getMinutes())
    };
}

async function readPhotoDateParts(file) {
    try {
        const exifData = await exifr.parse(file, [
            "DateTimeOriginal",
            "CreateDate",
            "ModifyDate"
        ]);

        const exifDate =
            exifData?.DateTimeOriginal ||
            exifData?.CreateDate ||
            exifData?.ModifyDate;

        if (exifDate instanceof Date && !isNaN(exifDate)) {
            return getDatePartsFromDate(exifDate);
        }
    } catch (err) {
        console.warn("EXIF 读取失败：", err);
    }

    // 兜底：没有照片日期时用当前时间
    return getDatePartsFromDate(new Date());
}

function formatEnglishDateFromParts(parts) {
    const year = Number(parts.year || new Date().getFullYear());
    const month = Number(parts.month);
    const day = Number(parts.day);

    const monthNames = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
    ];

    return `${monthNames[month - 1] || "January"} ${day}, ${year}`;
}

function formatEnglishTimeFromParts(parts) {
    let hour24 = Number(parts.hour);
    const minute = String(parts.minute).padStart(2, "0");

    const suffix = hour24 >= 12 ? "p.m." : "a.m.";
    let hour12 = hour24 % 12;
    if (hour12 === 0) hour12 = 12;

    return `${String(hour12).padStart(2, "0")}:${minute} ${suffix}`;
}

        function extractColors(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = 64;
            canvas.height = 64;
            ctx.drawImage(img, 0, 0, 64, 64);

            const data = ctx.getImageData(0, 0, 64, 64).data;
            const colors = [];
            for (let i = 0; i < data.length; i += 16) {
                colors.push({ r: data[i], g: data[i + 1], b: data[i + 2] });
            }

            colors.sort((a, b) => (a.r + a.g + a.b) - (b.r + b.g + b.b));

            const dominant = colors[Math.floor(colors.length * 0.75)];
            const secondary = colors[Math.floor(colors.length * 0.25)];
            const neutral = colors[Math.floor(colors.length * 0.5)];

            return {
                dominant: `rgb(${dominant.r},${dominant.g},${dominant.b})`,
                secondary: `rgb(${secondary.r},${secondary.g},${secondary.b})`,
                neutral: `rgb(${neutral.r},${neutral.g},${neutral.b})`
            };
        }

        function extractExtendedPalette(img) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    canvas.width = 80;
    canvas.height = 80;
    ctx.drawImage(img, 0, 0, 80, 80);

    const data = ctx.getImageData(0, 0, 80, 80).data;
    const samples = [];

    for (let i = 0; i < data.length; i += 16) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        const a = data[i + 3];
        if (a < 20) continue;
        samples.push({ r, g, b });
    }

    samples.sort((c1, c2) => {
        const s1 = c1.r + c1.g + c1.b;
        const s2 = c2.r + c2.g + c2.b;
        return s1 - s2;
    });

    function pickAt(t) {
        const c = samples[Math.max(0, Math.min(samples.length - 1, Math.floor(samples.length * t)))];
        return `rgb(${c.r},${c.g},${c.b})`;
    }

    return {
        dominant: pickAt(0.78),
        secondary: pickAt(0.28),
        neutral: pickAt(0.52),
        palette5: [
            pickAt(0.12),
            pickAt(0.28),
            pickAt(0.45),
            pickAt(0.62),
            pickAt(0.82)
        ],
        black: "#000000",
        white: "#ffffff"
    };
}

function rgbStringToObj(str) {
    const m = str.match(/\d+/g);
    if (!m) return { r: 255, g: 255, b: 255 };
    return {
        r: Number(m[0]),
        g: Number(m[1]),
        b: Number(m[2])
    };
}

function pickExtremePaletteColor(palette, prefer = "dark") {
    const candidates = [...(palette.palette5 || []), palette.dominant, palette.secondary, palette.neutral]
        .filter(Boolean)
        .map(c => {
            const rgb = rgbStringToObj(c);
            const lum = 0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b;
            return { color: c, lum };
        });

    if (!candidates.length) {
        return prefer === "dark" ? "#111111" : "#f5f5f5";
    }

    candidates.sort((a, b) => a.lum - b.lum);

    return prefer === "dark"
        ? candidates[0].color
        : candidates[candidates.length - 1].color;
}

function pickMostSaturatedPaletteColor(palette) {
    const candidates = [...(palette.palette5 || []), palette.dominant, palette.secondary, palette.neutral]
        .filter(Boolean)
        .map(c => {
            const rgb = rgbStringToObj(c);
            const max = Math.max(rgb.r, rgb.g, rgb.b);
            const min = Math.min(rgb.r, rgb.g, rgb.b);
            const sat = max === 0 ? 0 : (max - min) / max;
            return { color: c, sat, lum: 0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b };
        });

    if (!candidates.length) return "#3b6cff";

    candidates.sort((a, b) => {
        if (b.sat !== a.sat) return b.sat - a.sat;
        return Math.abs(128 - a.lum) - Math.abs(128 - b.lum);
    });

    return candidates[0].color;
}

function mixRgb(c1, c2, t) {
    return {
        r: Math.round(c1.r * (1 - t) + c2.r * t),
        g: Math.round(c1.g * (1 - t) + c2.g * t),
        b: Math.round(c1.b * (1 - t) + c2.b * t)
    };
}

function rgbObjToCss(rgb) {
    return `rgb(${rgb.r},${rgb.g},${rgb.b})`;
}

function sampleCanvasRegionLuminance(canvas, rect) {
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const x = Math.max(0, Math.floor(rect.x));
    const y = Math.max(0, Math.floor(rect.y));
    const w = Math.max(1, Math.floor(rect.w));
    const h = Math.max(1, Math.floor(rect.h));

    const img = ctx.getImageData(x, y, w, h).data;
    let sum = 0;
    let count = 0;

    for (let i = 0; i < img.length; i += 16) {
        const r = img[i];
        const g = img[i + 1];
        const b = img[i + 2];
        sum += 0.299 * r + 0.587 * g + 0.114 * b;
        count++;
    }

    return count ? sum / count : 128;
}

function getAdaptiveDangerInkColor(palette, baseCanvas, imageRect, textBlockHeightRatio = 0.42) {
    const satColor = pickMostSaturatedPaletteColor(palette);
    const satRgb = rgbStringToObj(satColor);

    // 采样 danger 文字会落的左下区域
    const sampleRect = {
        x: imageRect.x + imageRect.w * 0.03,
        y: imageRect.y + imageRect.h * (1 - textBlockHeightRatio) - imageRect.h * 0.03,
        w: imageRect.w * 0.48,
        h: imageRect.h * textBlockHeightRatio
    };

    const lum = sampleCanvasRegionLuminance(baseCanvas, sampleRect);

    // 偏暗区域 -> 用偏亮版本
    // 偏亮区域 -> 用偏深版本
    let rgb;
    if (lum < 115) {
        rgb = mixRgb(satRgb, { r: 255, g: 255, b: 255 }, 0.68);
    } else if (lum > 155) {
        rgb = mixRgb(satRgb, { r: 0, g: 0, b: 0 }, 0.72);
    } else {
        rgb = mixRgb(satRgb, lum < 135 ? { r: 255, g: 255, b: 255 } : { r: 0, g: 0, b: 0 }, 0.52);
    }

    return {
        color: rgbObjToCss(rgb),
        rgb,
        luminance: lum,
        sampleRect
    };
}

function dilateAlphaMask(alpha, w, h, radius = 2) {
    const out = new Uint8ClampedArray(alpha.length);
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            let maxA = 0;
            for (let oy = -radius; oy <= radius; oy++) {
                for (let ox = -radius; ox <= radius; ox++) {
                    const nx = x + ox;
                    const ny = y + oy;
                    if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
                    const a = alpha[ny * w + nx];
                    if (a > maxA) maxA = a;
                }
            }
            out[y * w + x] = maxA;
        }
    }
    return out;
}

function erodeAlphaMask(alpha, w, h, radius = 2) {
    const out = new Uint8ClampedArray(alpha.length);
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            let minA = 255;
            for (let oy = -radius; oy <= radius; oy++) {
                for (let ox = -radius; ox <= radius; ox++) {
                    const nx = x + ox;
                    const ny = y + oy;
                    if (nx < 0 || ny < 0 || nx >= w || ny >= h) {
                        minA = 0;
                        continue;
                    }
                    const a = alpha[ny * w + nx];
                    if (a < minA) minA = a;
                }
            }
            out[y * w + x] = minA;
        }
    }
    return out;
}

function thresholdAlphaMask(alpha, threshold) {
    const out = new Uint8ClampedArray(alpha.length);
    for (let i = 0; i < alpha.length; i++) {
        out[i] = alpha[i] >= threshold ? 255 : 0;
    }
    return out;
}

function buildRingFromMasks(outerMask, innerMask, w, h, rgb) {
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const img = ctx.createImageData(w, h);

    for (let i = 0; i < w * h; i++) {
        const a = Math.max(0, outerMask[i] - innerMask[i]);
        const p = i * 4;
        img.data[p] = rgb.r;
        img.data[p + 1] = rgb.g;
        img.data[p + 2] = rgb.b;
        img.data[p + 3] = a;
    }

    ctx.putImageData(img, 0, 0);
    return canvas;
}

function layoutOutlinedTextBlock(text, maxWidth, maxHeight, fontStack) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    const cleanText = (text || "").trim();
    if (!cleanText) {
        return { fontSize: 40, lines: [] };
    }

    for (let fontSize = 120; fontSize >= 20; fontSize -= 2) {
        ctx.font = `700 ${fontSize}px ${fontStack}`;

        const chars = cleanText.split("");
        const lines = [];
        let line = "";

        for (let i = 0; i < chars.length; i++) {
            const testLine = line + chars[i];
            const w = ctx.measureText(testLine).width;

            if (w > maxWidth && line !== "") {
                lines.push(line);
                line = chars[i];
            } else {
                line = testLine;
            }
        }
        if (line) lines.push(line);

        const lineHeight = fontSize * 0.94;
        const totalHeight = lines.length * lineHeight;

        if (totalHeight <= maxHeight) {
            return { fontSize, lines };
        }
    }

    return { fontSize: 20, lines: [cleanText] };
}

function getResolvedTypeMode() {
    return FX.typeSystem.autoModeMap[selectedCategory] || "string";
}

function offsetPathPoints(pts, offsetAmount = 0) {
    return pts.map((pt, i) => {
        const dir = getPathDirection(pts, i);
        const nx = -dir.y;
        const ny = dir.x;
        return {
            x: pt.x + nx * offsetAmount,
            y: pt.y + ny * offsetAmount
        };
    });
}

function cloneCanvas(sourceCanvas) {
    const canvas = document.createElement('canvas');
    canvas.width = sourceCanvas.width;
    canvas.height = sourceCanvas.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(sourceCanvas, 0, 0);
    return canvas;
}

async function drawGeneratedTypeLayer(ctx, rect, palette, userText) {
    const text = (typeTextInput.value || userText || "").trim();
    if (!text) return;

    const mode = getResolvedTypeMode();

    ctx.save();
    ctx.beginPath();
    ctx.rect(rect.x, rect.y, rect.w, rect.h);
    ctx.clip();

    if (mode === "string") {
    await drawStringTypeLayer(ctx, rect, palette, text);
} else if (mode === "danger") {
    drawDangerTypeLayer(ctx, rect, palette, text);
} else if (mode === "morisawa") {
    drawMorisawaTypeLayer(ctx, rect, palette, text);
} else if (mode === "pow") {
    drawShineTypeLayer(ctx, rect, palette, text);
} else {
        // 其他模式先保留一个轻量占位
        ctx.globalAlpha = 0.14;
        ctx.fillStyle = palette.white || "#ffffff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `500 72px ${TYPE_FONT_STACK}`;
        ctx.fillText(text.slice(0, 8), rect.x + rect.w / 2, rect.y + rect.h / 2);
    }

    ctx.restore();
}

function drawDangerTypeLayer(ctx, rect, palette, text) {
    const size = Number(typeSliderA.value);        // 尺寸
    const complexity = Number(typeSliderB.value);  // 油墨强度
    const columns = Number(typeSliderC.value);     // 颗粒密度

    const ink = getAdaptiveDangerInkColor(
    palette,
    currentBaseCanvas,
    rect,
    0.42
);
const rgb = ink.rgb;
const strokeColor = ink.color;

    const usableWidth = rect.w * 1.02;
    const usableHeight = rect.h * 0.42;

    // 先自动排版
    const autoLayout = layoutOutlinedTextBlock(text, usableWidth, usableHeight, TYPE_FONT_STACK);
    const sizeScale = 0.72 + (size / 100) * 0.92;
    const fontSize = Math.max(18, autoLayout.fontSize * sizeScale);

    const finalLayout = layoutOutlinedTextBlock(text, usableWidth, usableHeight, TYPE_FONT_STACK);
    const lines = finalLayout.lines.length ? finalLayout.lines : ["TEXT"];

    // ========= 1. 用“实心字”画底稿，而不是描边字 =========
    const textCanvas = document.createElement('canvas');
    textCanvas.width = rect.w;
    textCanvas.height = rect.h;
    const tctx = textCanvas.getContext('2d', { willReadFrequently: true });

    tctx.clearRect(0, 0, textCanvas.width, textCanvas.height);
    tctx.textAlign = "left";
    tctx.textBaseline = "top";
    tctx.font = `700 ${fontSize}px ${TYPE_FONT_STACK}`;
    tctx.fillStyle = "#ffffff";

    const lineHeight = fontSize * 0.92;
    const totalHeight = lines.length * lineHeight;

    // 左对齐、下对齐
    const bleedX = rect.w * 0.03; // 控制出血量
    const anchorX = rect.w * -0.03;
    const bleed = rect.h * 0.06;
    const startY = rect.h - totalHeight - rect.h * 0.05 + bleed;

    for (let i = 0; i < lines.length; i++) {
        tctx.fillText(lines[i], anchorX, startY + i * lineHeight);
    }

    // ========= 2. 对“实心字”做更大的模糊 =========
    const blurCanvas = document.createElement('canvas');
    blurCanvas.width = rect.w;
    blurCanvas.height = rect.h;
    const bctx = blurCanvas.getContext('2d', { willReadFrequently: true });

    const blurPx = 1.6 + (size / 100) * 2.2;
    bctx.clearRect(0, 0, blurCanvas.width, blurCanvas.height);
    bctx.filter = `blur(${blurPx}px)`;
    bctx.drawImage(textCanvas, 0, 0);
    bctx.filter = "none";

    const blurData = bctx.getImageData(0, 0, blurCanvas.width, blurCanvas.height).data;
    const w = blurCanvas.width;
    const h = blurCanvas.height;

    const alpha = new Uint8ClampedArray(w * h);
    for (let i = 0; i < w * h; i++) {
        alpha[i] = blurData[i * 4 + 3];
    }

    // ========= 3. 从模糊字里提“外轮廓”和“内轮廓” =========
    const solidMask = thresholdAlphaMask(alpha, 96);
const innerSolid = erodeAlphaMask(solidMask, w, h, 1);
const outerSolid = dilateAlphaMask(solidMask, w, h, 1);

const outerLineCanvas = buildRingFromMasks(outerSolid, solidMask, w, h, rgb);
const innerLineCanvas = buildRingFromMasks(solidMask, innerSolid, w, h, rgb);

    // ========= 4. 只画轮廓线，不画模糊文字本体 =========
    ctx.save();
    ctx.globalAlpha = 0.98;
    ctx.drawImage(outerLineCanvas, rect.x, rect.y);

    ctx.globalAlpha = 0.78;
    ctx.drawImage(innerLineCanvas, rect.x, rect.y);
    ctx.restore();

    // ========= 5. 油墨溢出颗粒：围绕轮廓线撒点 =========
    const outerLineData = outerLineCanvas.getContext('2d', { willReadFrequently: true })
        .getImageData(0, 0, w, h).data;
    const innerLineData = innerLineCanvas.getContext('2d', { willReadFrequently: true })
        .getImageData(0, 0, w, h).data;

    const grainCanvas = document.createElement('canvas');
    grainCanvas.width = w;
    grainCanvas.height = h;
    const gctx = grainCanvas.getContext('2d', { willReadFrequently: true });

    const density = 0.065 + (columns / 100) * 0.15;
    const spread = 1.8 + (complexity / 100) * 4.6;

    for (let y = 0; y < h; y += 1) {
        for (let x = 0; x < w; x += 1) {
            const p = (y * w + x) * 4;
            const ringAlpha = Math.max(
                outerLineData[p + 3],
                innerLineData[p + 3]
            );

            if (ringAlpha > 8 && Math.random() < density) {
                const jitterX = (Math.random() - 0.5) * spread * 2.6;
                const jitterY = (Math.random() - 0.5) * spread * 2.6;

                const sRand = Math.random();
                const s = sRand < 0.72 ? 1 : (sRand < 0.93 ? 1.5 : 2.2);
                const a = 0.18 + Math.random() * 0.55;

                gctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${a})`;
                gctx.fillRect(x + jitterX, y + jitterY, s, s);
            }
        }
    }

    // 再给轮廓补一点非常轻的染边
    gctx.globalAlpha = 0.08 + (complexity / 100) * 0.14;
    gctx.drawImage(outerLineCanvas, 0, 0);
    gctx.globalAlpha = 0.05 + (complexity / 100) * 0.10;
    gctx.drawImage(innerLineCanvas, 0, 0);

    ctx.save();
    ctx.globalAlpha = 1;
    ctx.drawImage(grainCanvas, rect.x, rect.y);
    ctx.restore();
}

function getAdaptiveMorisawaTextColor(palette, baseCanvas, rect) {
    const satColor = pickMostSaturatedPaletteColor(palette);
    const satRgb = rgbStringToObj(satColor);

    const sampleRect = {
        x: rect.x + rect.w * 0.18,
        y: rect.y + rect.h * 0.18,
        w: rect.w * 0.64,
        h: rect.h * 0.64
    };

    const lum = sampleCanvasRegionLuminance(baseCanvas, sampleRect);

    let rgb;
    if (lum < 105) {
        // 背景暗：提亮
        rgb = mixRgb(satRgb, { r: 255, g: 255, b: 255 }, 0.72);
    } else if (lum > 165) {
        // 背景亮：压深
        rgb = mixRgb(satRgb, { r: 0, g: 0, b: 0 }, 0.68);
    } else {
        // 中间亮度：轻微往亮或往暗推
        rgb = mixRgb(
            satRgb,
            lum < 135 ? { r: 255, g: 255, b: 255 } : { r: 0, g: 0, b: 0 },
            0.38
        );
    }

    return {
        color: rgbObjToCss(rgb),
        rgb,
        luminance: lum
    };
}

function drawFilledMorisawaWord(ctx, text, x, y, fontSize, scaleX, color, alpha = 1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scaleX, 1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.font = `300 ${fontSize}px ${TYPE_FONT_STACK}`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, 0, 0);
    ctx.restore();
}

function drawMorisawaTypeLayer(ctx, rect, palette, text) {
    const layerCount = 3 + Math.floor((Number(typeSliderA.value) / 100) * 3);
    const perspective = Number(typeSliderB.value) / 100;
    const decayControl = Number(typeSliderC.value) / 100;

    const colorData = getAdaptiveMorisawaTextColor(palette, currentBaseCanvas, rect);
    const textColor = colorData.color;

    const cleanText = (text || "").trim() || "SPACE";

    const baseFont = rect.h * 0.19;
    const minFont = rect.h * 0.052;
    const decay = 0.88 - decayControl * 0.10;

    const centerX = rect.x + rect.w * 0.5;
    const topY = rect.y + rect.h * 0.16;
    const bottomY = rect.y + rect.h * 0.82;

    ctx.save();

    for (let i = 0; i < layerCount; i++) {
        const t = i / Math.max(1, layerCount - 1);

        const fontSize = Math.max(minFont, baseFont * Math.pow(decay, i));
        const y = topY + (bottomY - topY) * t;

        // 上大下小，但不要压得太夸张
        const scaleX = 1.02 + perspective * 0.55 - t * 0.10;

        // 很轻微的横向漂移，避免太死
        const driftX = (t - 0.5) * rect.w * 0.05 * perspective;

        drawFilledMorisawaWord(
            ctx,
            cleanText,
            centerX + driftX,
            y,
            fontSize,
            scaleX,
            textColor,
            0.88 - t * 0.12
        );
    }

    ctx.restore();
}

async function drawStringTypeLayer(ctx, rect, palette, text) {
    const sliderA = Number(typeSliderA.value); // Layer Mode
    const sliderB = Number(typeSliderB.value); // Size
    const sliderC = Number(typeSliderC.value); // Offset

    let layerMode = "all";
    if (sliderA < 25) layerMode = "text";
    else if (sliderA < 50) layerMode = "gradient";
    else if (sliderA < 75) layerMode = "stripes";
    else layerMode = "all";

    // 自动选左 / 右轮廓后的缓存路径
    let basePath = currentPersonCompositePath;
    if (!basePath || basePath.length < 2) {
        basePath = await preparePersonCompositePathCache();
    }
    if (!basePath || basePath.length < 2) return;

    const fontSize = 22 + (sliderB / 100) * 34;
    const ribbonWidth = 30 + (sliderB / 100) * 52;
    const contourOffsetBoost = (sliderC / 100) * 32;

    // 整体离边缘再外扩一点
    const path = offsetPathPoints(basePath, contourOffsetBoost);

    let pathText = text.trim();
    if (pathText.length < 10) {
        pathText = (pathText + " ").repeat(5).trim();
    } else if (pathText.length > 24) {
        pathText = pathText.slice(0, 24);
    }

    const pink = (palette.palette5 && palette.palette5[1]) || "#f0b6b6";
    const white = palette.white || "#ffffff";
    const black = palette.black || "#000000";

    if (layerMode === "text") {
        drawRibbonStrokePath(ctx, path, {
            width: ribbonWidth,
            fill: black,
            outline: white,
            outlineWidth: 2,
            alpha: 1
        });

        drawTextAlongPolyline(ctx, pathText, path, {
            fontSize,
            color: white,
            letterSpacing: fontSize * 0.08,
            startOffset: 0,
            textAlign: "start"
        });
        return;
    }

    if (layerMode === "gradient") {
        drawRibbonGradientTube(ctx, path, {
            ribbonWidth: ribbonWidth,
            alpha: 1
        });
        return;
    }

    if (layerMode === "stripes") {
        drawRibbonStripes(ctx, path, {
            ribbonWidth: ribbonWidth,
            baseColor: white,
            stripeColor: pink,
            stripeCount: 5,
            stripeWidth: Math.max(2, ribbonWidth * 0.05),
            alpha: 1
        });
        return;
    }

    // all：三条并排轨迹
    const trackGap = ribbonWidth * 1.05;

    const pathTop = offsetPathPoints(path, trackGap);
    const pathMid = path;
    const pathBottom = offsetPathPoints(path, -trackGap);

    drawRibbonStripes(ctx, pathTop, {
        ribbonWidth: ribbonWidth * 0.96,
        baseColor: white,
        stripeColor: pink,
        stripeCount: 5,
        stripeWidth: Math.max(2, ribbonWidth * 0.045),
        alpha: 0.95
    });

    drawRibbonGradientTube(ctx, pathMid, {
        ribbonWidth: ribbonWidth * 0.92,
        alpha: 0.96
    });

    drawRibbonStrokePath(ctx, pathBottom, {
        width: ribbonWidth * 0.88,
        fill: black,
        outline: white,
        outlineWidth: 1.5,
        alpha: 1
    });

    drawTextAlongPolyline(ctx, pathText, pathBottom, {
        fontSize,
        color: white,
        letterSpacing: fontSize * 0.08,
        startOffset: 0,
        textAlign: "start"
    });
}

async function rerenderPosterWithTypeLayer(userText) {

async function buildPersonCompositeGroupCanvas(sourceCanvas) {
    const aw = sourceCanvas.width;
    const ah = sourceCanvas.height;

    const p = FX.person;

    const { personCanvas } = await segmentPersonCutout(sourceCanvas);

    const refinedPersonCanvas = createSmoothInsetCutout(personCanvas, 4, 5, 1.6);

    const solidPersonCanvas = document.createElement('canvas');
    const solidPersonCtx = solidPersonCanvas.getContext('2d', { willReadFrequently: true });
    solidPersonCanvas.width = aw;
    solidPersonCanvas.height = ah;
    solidPersonCtx.drawImage(refinedPersonCanvas, 0, 0);
    tintCanvasDark(solidPersonCtx, aw, ah, 0.10);

    const groupCanvas = document.createElement('canvas');
    const groupCtx = groupCanvas.getContext('2d', { willReadFrequently: true });
    groupCanvas.width = aw;
    groupCanvas.height = ah;

    const anchorX = aw * 0.52;
    const anchorY = ah * 0.96;

    const pathType = pickPathType();
    const pts = buildCopyPathPoints(pathType, anchorX, anchorY, p.stepBase, p.copiesPerTrail);

    // 后景复制层
    for (let i = pts.length - 1; i >= Math.ceil(pts.length * 0.55); i--) {
        const pt = pts[i];
        drawAnchoredPerson(groupCtx, solidPersonCanvas, pt.x, pt.y, 1);
    }

    // 主体
    drawAnchoredPerson(groupCtx, refinedPersonCanvas, anchorX, anchorY, 1);

    // 前景复制层
    for (let i = Math.ceil(pts.length * 0.55) - 1; i >= 0; i--) {
        const pt = pts[i];
        drawAnchoredPerson(groupCtx, solidPersonCanvas, pt.x, pt.y, 1);
    }

    return {
        groupCanvas,
        refinedPersonCanvas,
        solidPersonCanvas,
        anchorX,
        anchorY,
        pts
    };
}

function splitTextForStack(text) {
    const clean = (text || "").trim();
    if (!clean) return ["SPACE"];

    if (clean.includes(" ")) {
        return clean.split(/\s+/).filter(Boolean).slice(0, 4);
    }

    if (clean.length > 8) {
        const mid = Math.ceil(clean.length / 2);
        return [clean.slice(0, mid), clean.slice(mid)];
    }

    return [clean];
}

        function drawHalftoneRegion(ctx, workingCanvas, region, drawX, drawY, mapX, mapY, analysisW, analysisH, inkColor, p) {
    const rx = drawX + region.minX * mapX;
    const ry = drawY + region.minY * mapY;
    const rw = Math.max(8, (region.maxX - region.minX + 1) * mapX);
    const rh = Math.max(8, (region.maxY - region.minY + 1) * mapY);

    // 1. 白底
    ctx.save();
    ctx.beginPath();
    ctx.rect(rx, ry, rw, rh);
    ctx.clip();

    ctx.globalAlpha = p.whiteBaseAlpha;
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(rx, ry, rw, rh);

    // 2. 建一个区域采样小图，专门做半调
    const sampleW = Math.max(40, Math.floor(rw / 1.8));
    const sampleH = Math.max(40, Math.floor(rh / 1.8));

    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
    tempCanvas.width = sampleW;
    tempCanvas.height = sampleH;

    const srcX = (region.minX / analysisW) * workingCanvas.width;
    const srcY = (region.minY / analysisH) * workingCanvas.height;
    const srcW = ((region.maxX - region.minX + 1) / analysisW) * workingCanvas.width;
    const srcH = ((region.maxY - region.minY + 1) / analysisH) * workingCanvas.height;

    tempCtx.drawImage(
        workingCanvas,
        srcX, srcY, srcW, srcH,
        0, 0, sampleW, sampleH
    );

    const imgData = tempCtx.getImageData(0, 0, sampleW, sampleH);
    const data = imgData.data;

    // 3. 半调点阵：越暗点越大，越亮点越小
    const strongInk = blendColor(inkColor, { r: 0, g: 0, b: 0 }, 0.18);
    ctx.fillStyle = `rgb(${strongInk.r},${strongInk.g},${strongInk.b})`;

    for (let y = 0; y < sampleH; y += p.halftoneStep) {
        for (let x = 0; x < sampleW; x += p.halftoneStep) {
            const idx = (y * sampleW + x) * 4;
            const r = data[idx];
            const g = data[idx + 1];
            const b = data[idx + 2];

            const lum = 0.299 * r + 0.587 * g + 0.114 * b;

            // 提高对比，让暗部点明显更大，亮部更小
            const darkness = Math.pow(1 - lum / 255, 0.72);

            const radius =
                p.halftoneMinRadius +
                darkness * (p.halftoneMaxRadius - p.halftoneMinRadius);

            const dx = rx + (x / sampleW) * rw;
            const dy = ry + (y / sampleH) * rh;

            if (radius > 0.15) {
                ctx.beginPath();
                ctx.arc(dx, dy, radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // 4. 轻微噪点，避免太机械
    const dots = Math.floor(region.pixels * p.noiseAmount * 0.08);
    ctx.fillStyle = `rgba(${inkColor.r},${inkColor.g},${inkColor.b},0.35)`;
    for (let i = 0; i < dots; i++) {
        const nx = rx + Math.random() * rw;
        const ny = ry + Math.random() * rh;
        const ns = Math.random() < 0.8 ? 1 : 1.4;
        ctx.fillRect(nx, ny, ns, ns);
    }

    ctx.restore();
}

        function findConnectedRegions(mask, width, height, minArea) {
            const visited = new Uint8Array(width * height);
            const regions = [];
            const dirs = [[1,0],[-1,0],[0,1],[0,-1]];

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const start = y * width + x;
                    if (!mask[start] || visited[start]) continue;

                    const queue = [[x, y]];
                    visited[start] = 1;

                    let minX = x, maxX = x, minY = y, maxY = y;
                    let pixels = 0;
                    const pixelsList = [];

                    while (queue.length) {
                        const [cx, cy] = queue.pop();
                        const flat = cy * width + cx;

                        pixels++;
                        pixelsList.push([cx, cy]);
                        minX = Math.min(minX, cx);
                        maxX = Math.max(maxX, cx);
                        minY = Math.min(minY, cy);
                        maxY = Math.max(maxY, cy);

                        for (const [dx, dy] of dirs) {
                            const nx = cx + dx;
                            const ny = cy + dy;
                            if (nx < 0 || ny < 0 || nx >= width || ny >= height) continue;

                            const nFlat = ny * width + nx;
                            if (!mask[nFlat] || visited[nFlat]) continue;

                           visited[nFlat] = 1;
                            queue.push([nx, ny]);
                        }
                    }

                    if (pixels >= minArea) {
                        regions.push({
                            minX, maxX, minY, maxY, pixels, pixelsList
                        });
                    }
                }
            }

            return regions;
        }

        async function segmentPersonCutout(sourceCanvas) {
    await imageSegmenterReady;

    const result = imageSegmenter.segment(sourceCanvas);

    if (!result) {
        throw new Error("分割失败：没有返回结果");
    }

    const width = sourceCanvas.width;
    const height = sourceCanvas.height;

    const srcCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const srcImage = srcCtx.getImageData(0, 0, width, height);

    const personCanvas = document.createElement('canvas');
    const personCtx = personCanvas.getContext('2d', { willReadFrequently: true });
    personCanvas.width = width;
    personCanvas.height = height;

    const personImage = personCtx.createImageData(width, height);

    // 额外做一个调试画布：把识别到的人物涂成红色
    const debugCanvas = document.createElement('canvas');
    const debugCtx = debugCanvas.getContext('2d', { willReadFrequently: true });
    debugCanvas.width = width;
    debugCanvas.height = height;
    const debugImage = debugCtx.createImageData(width, height);

    let personMask = null;

    // ---------- 优先走 confidenceMasks，并且自动判断哪张才是“人” ----------
    if (result.confidenceMasks && result.confidenceMasks.length > 0) {
        const masks = result.confidenceMasks.map(m => m.getAsFloat32Array());

        // 如果有两张 mask，就选“平均覆盖面积更小”的那张作为人物
        // 因为背景一般占更大面积，人物一般占更小面积
        if (masks.length >= 2) {
            const avg0 = masks[0].reduce((a, b) => a + b, 0) / masks[0].length;
            const avg1 = masks[1].reduce((a, b) => a + b, 0) / masks[1].length;
            personMask = avg0 < avg1 ? masks[0] : masks[1];
            console.log("confidence avg0:", avg0, "avg1:", avg1, "=> 选中较小覆盖率的 mask 作为人物");
        } else {
            personMask = masks[0];
            console.log("只有一张 confidence mask，直接使用");
        }
    }

    // ---------- 如果 confidenceMasks 不可用，再退回 categoryMask ----------
    if (!personMask && result.categoryMask) {
        const catMask = result.categoryMask.getAsUint8Array();

        // 统计每个类别像素数，选“非最大类”作为人物
        const countMap = new Map();
        for (let i = 0; i < catMask.length; i++) {
            const v = catMask[i];
            countMap.set(v, (countMap.get(v) || 0) + 1);
        }

        let majorityClass = null;
        let majorityCount = -1;
        for (const [cls, count] of countMap.entries()) {
            if (count > majorityCount) {
                majorityCount = count;
                majorityClass = cls;
            }
        }

        console.log("categoryMask classes:", [...countMap.entries()], "majorityClass:", majorityClass);

        // 把非最大类当作人物
        personMask = new Float32Array(catMask.length);
        for (let i = 0; i < catMask.length; i++) {
            personMask[i] = catMask[i] === majorityClass ? 0 : 1;
        }
    }

    if (!personMask) {
        throw new Error("分割失败：没有拿到可用的 person mask");
    }

    const threshold = 0.22;
    const feather = 0.12;

    let keptPixels = 0;

    for (let i = 0; i < personMask.length; i++) {
        const conf = personMask[i];
        const p = i * 4;

        let alpha = 0;
        if (conf > threshold) {
            alpha = Math.round(
                Math.max(0, Math.min(1, (conf - threshold) / feather)) * 255
            );
        }

        if (alpha > 8) keptPixels++;

        // 正常人物抠图
        personImage.data[p] = srcImage.data[p];
        personImage.data[p + 1] = srcImage.data[p + 1];
        personImage.data[p + 2] = srcImage.data[p + 2];
        personImage.data[p + 3] = alpha;

        // 红色调试图
        debugImage.data[p] = 255;
        debugImage.data[p + 1] = 0;
        debugImage.data[p + 2] = 0;
        debugImage.data[p + 3] = alpha;
    }

    personCtx.putImageData(personImage, 0, 0);
    debugCtx.putImageData(debugImage, 0, 0);

    const coverage = keptPixels / personMask.length;
    console.log("person coverage:", coverage);

    return { personCanvas, debugCanvas, coverage };
}

function addFilmGrainToCanvas(targetCtx, width, height, amount) {

function createSmoothInsetCutout(sourceCanvas, shrinkPx = 4, blurPx = 5, finalSoftness = 1.6) {
    const w = sourceCanvas.width;
    const h = sourceCanvas.height;

    const srcCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const srcImage = srcCtx.getImageData(0, 0, w, h);
    const srcData = srcImage.data;

    // 1) 提取原始 alpha 做成灰度 mask
    const maskCanvas = document.createElement('canvas');
    maskCanvas.width = w;
    maskCanvas.height = h;
    const maskCtx = maskCanvas.getContext('2d', { willReadFrequently: true });

    const maskImage = maskCtx.createImageData(w, h);
    const maskData = maskImage.data;

    for (let i = 0; i < w * h; i++) {
        const a = srcData[i * 4 + 3];
        const p = i * 4;
        maskData[p] = 255;
        maskData[p + 1] = 255;
        maskData[p + 2] = 255;
        maskData[p + 3] = a;
    }
    maskCtx.putImageData(maskImage, 0, 0);

    // 2) 缩小再放大，让边界先整体顺一遍
    const smallScale = 0.32;
    const sw = Math.max(1, Math.round(w * smallScale));
    const sh = Math.max(1, Math.round(h * smallScale));

    const smallCanvas = document.createElement('canvas');
    smallCanvas.width = sw;
    smallCanvas.height = sh;
    const smallCtx = smallCanvas.getContext('2d');

    smallCtx.clearRect(0, 0, sw, sh);
    smallCtx.imageSmoothingEnabled = true;
    smallCtx.drawImage(maskCanvas, 0, 0, sw, sh);

    const smoothMaskCanvas = document.createElement('canvas');
    smoothMaskCanvas.width = w;
    smoothMaskCanvas.height = h;
    const smoothMaskCtx = smoothMaskCanvas.getContext('2d', { willReadFrequently: true });

    smoothMaskCtx.clearRect(0, 0, w, h);
    smoothMaskCtx.imageSmoothingEnabled = true;
    smoothMaskCtx.drawImage(smallCanvas, 0, 0, sw, sh, 0, 0, w, h);

    // 3) 再做一次较强 blur，让边缘更圆顺
    const blurCanvas = document.createElement('canvas');
    blurCanvas.width = w;
    blurCanvas.height = h;
    const blurCtx = blurCanvas.getContext('2d', { willReadFrequently: true });

    blurCtx.clearRect(0, 0, w, h);
    blurCtx.filter = `blur(${blurPx}px)`;
    blurCtx.drawImage(smoothMaskCanvas, 0, 0);
    blurCtx.filter = 'none';

    const blurImage = blurCtx.getImageData(0, 0, w, h);
    const blurData = blurImage.data;

    // 4) 向内收：做 alpha 腐蚀
    const erodedAlpha = new Uint8ClampedArray(w * h);

    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            let minA = 255;

            for (let oy = -shrinkPx; oy <= shrinkPx; oy++) {
                for (let ox = -shrinkPx; ox <= shrinkPx; ox++) {
                    const nx = x + ox;
                    const ny = y + oy;

                    if (nx < 0 || ny < 0 || nx >= w || ny >= h) {
                        minA = 0;
                        continue;
                    }

                    const a = blurData[(ny * w + nx) * 4 + 3];
                    if (a < minA) minA = a;
                }
            }

            erodedAlpha[y * w + x] = minA;
        }
    }

    // 5) 再轻微 blur 一次，让边缘不要硬切
    const alphaCanvas = document.createElement('canvas');
    alphaCanvas.width = w;
    alphaCanvas.height = h;
    const alphaCtx = alphaCanvas.getContext('2d', { willReadFrequently: true });

    const alphaImage = alphaCtx.createImageData(w, h);
    const alphaData = alphaImage.data;

    for (let i = 0; i < w * h; i++) {
        const a = erodedAlpha[i];
        const p = i * 4;
        alphaData[p] = 255;
        alphaData[p + 1] = 255;
        alphaData[p + 2] = 255;
        alphaData[p + 3] = a;
    }
    alphaCtx.putImageData(alphaImage, 0, 0);

    const finalMaskCanvas = document.createElement('canvas');
    finalMaskCanvas.width = w;
    finalMaskCanvas.height = h;
    const finalMaskCtx = finalMaskCanvas.getContext('2d', { willReadFrequently: true });

    finalMaskCtx.clearRect(0, 0, w, h);
    finalMaskCtx.filter = `blur(${finalSoftness}px)`;
    finalMaskCtx.drawImage(alphaCanvas, 0, 0);
    finalMaskCtx.filter = 'none';

    // 6) 用最终 mask 裁切原始清晰人物
    const outCanvas = document.createElement('canvas');
    outCanvas.width = w;
    outCanvas.height = h;
    const outCtx = outCanvas.getContext('2d', { willReadFrequently: true });

    outCtx.clearRect(0, 0, w, h);
    outCtx.drawImage(sourceCanvas, 0, 0);
    outCtx.globalCompositeOperation = 'destination-in';
    outCtx.drawImage(finalMaskCanvas, 0, 0);
    outCtx.globalCompositeOperation = 'source-over';

    return outCanvas;
}

function createBlockyCutoutFromAlpha(sourceCanvas, blockSize = 6, coverageThreshold = 0.18) {
    const w = sourceCanvas.width;
    const h = sourceCanvas.height;

    const srcCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const srcImage = srcCtx.getImageData(0, 0, w, h);
    const srcData = srcImage.data;

    const outCanvas = document.createElement('canvas');
    const outCtx = outCanvas.getContext('2d', { willReadFrequently: true });
    outCanvas.width = w;
    outCanvas.height = h;

    // 先清空
    outCtx.clearRect(0, 0, w, h);

    for (let by = 0; by < h; by += blockSize) {
        for (let bx = 0; bx < w; bx += blockSize) {
            const bw = Math.min(blockSize, w - bx);
            const bh = Math.min(blockSize, h - by);

            let solidCount = 0;
            const total = bw * bh;

            // 统计这个小方块里有多少像素属于人物
            for (let y = by; y < by + bh; y++) {
                for (let x = bx; x < bx + bw; x++) {
                    const idx = (y * w + x) * 4;
                    const alpha = srcData[idx + 3];
                    if (alpha > 20) solidCount++;
                }
            }

            const coverage = solidCount / total;

            // 如果这个方块里“人物占比”达到阈值，就把整个方块保留
            if (coverage >= coverageThreshold) {
                outCtx.drawImage(
                    sourceCanvas,
                    bx, by, bw, bh,
                    bx, by, bw, bh
                );
            }
        }
    }

    return outCanvas;
}

function buildCopyPathPoints(pathType, startX, startY, stepBase, count) {
    const pts = [];

    if (pathType === 'polyline') {
        // 明显折线：三段大折线，但步距控制得更近一些
        let x = startX;
        let y = startY;

        const seg1 = Math.floor(count * 0.34);
        const seg2 = Math.floor(count * 0.33);
        const seg3 = count - seg1 - seg2;

        for (let i = 0; i < seg1; i++) {
            pts.push({ x, y });
            x -= stepBase * 0.95;
            y -= stepBase * 0.12;
        }
        for (let i = 0; i < seg2; i++) {
            pts.push({ x, y });
            x += stepBase * 0.72;
            y += stepBase * 0.58;
        }
        for (let i = 0; i < seg3; i++) {
            pts.push({ x, y });
            x -= stepBase * 0.92;
            y += stepBase * 0.10;
        }

        return pts;
    }

    // 曲线：用二次贝塞尔采样
    const p0 = { x: startX - stepBase * 2.8, y: startY - stepBase * 0.8 };
    const p1 = { x: startX + stepBase * 2.4, y: startY + stepBase * 2.0 };
    const p2 = { x: startX - stepBase * 3.2, y: startY + stepBase * 3.0 };

    for (let i = 0; i < count; i++) {
        const t = i / Math.max(1, count - 1);
        const omt = 1 - t;

        const x =
            omt * omt * p0.x +
            2 * omt * t * p1.x +
            t * t * p2.x;

        const y =
            omt * omt * p0.y +
            2 * omt * t * p1.y +
            t * t * p2.y;

        pts.push({ x, y });
    }

    return pts;
}

function pickPathType() {
    return Math.random() > 0.5 ? 'polyline' : 'curve';

function getPathDirection(pts, i) {
    const prev = pts[Math.max(0, i - 1)];
    const next = pts[Math.min(pts.length - 1, i + 1)];

    let dx = next.x - prev.x;
    let dy = next.y - prev.y;

    const len = Math.hypot(dx, dy) || 1;
    return {
        x: dx / len,
        y: dy / len
    };
}

function drawMotionBlurFigure(ctx, img, anchorX, anchorY, dir, p, scale = 1) {
    ctx.save();
    ctx.filter = `blur(${p.motionBlurBlurPx}px)`;

    for (let s = p.motionBlurSamples; s >= 1; s--) {
        const t = s / p.motionBlurSamples;

        const offsetX = dir.x * p.motionBlurStep * s;
        const offsetY = dir.y * p.motionBlurStep * s;

        const blurScale = scale * (1 - p.motionBlurScaleDecay * s);

        ctx.globalAlpha = p.motionBlurAlpha * (0.45 + t * 0.9);
        drawAnchoredPerson(
            ctx,
            img,
            anchorX - offsetX,
            anchorY - offsetY,
            blurScale
        );
    }

    ctx.filter = 'none';
    ctx.restore();
}

        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            
            const chars = text.split('');
            let line = '';
            let cursorY = y;

            for (let i = 0; i < chars.length; i++) {
                const testLine = line + chars[i];
                const metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && line !== '') {
                    ctx.fillText(line, x, cursorY);
                    line = chars[i];
                    cursorY += lineHeight;
                } else {
                    line = testLine;
                }
            }

            if (line) ctx.fillText(line, x, cursorY);
        }

        function getImageFitRectInRegion(sourceCanvas, rect) {
    const { x, y, w, h } = rect;

    const imgRatio = sourceCanvas.width / sourceCanvas.height;
    const rectRatio = w / h;
    let drawW, drawH, drawX, drawY;

    if (imgRatio > rectRatio) {
        drawH = h;
        drawW = h * imgRatio;
        drawX = x + (w - drawW) / 2;
        drawY = y;
    } else {
        drawW = w;
        drawH = w / imgRatio;
        drawX = x;
        drawY = y + (h - drawH) / 2;
    }

    return { drawX, drawY, drawW, drawH };
}

async function buildCompositePersonContourPathPoints(sourceCanvas, rect, side = "left") {
    const { groupCanvas } = await buildPersonCompositeGroupCanvas(sourceCanvas);

    const w = groupCanvas.width;
    const h = groupCanvas.height;
    const gCtx = groupCanvas.getContext('2d', { willReadFrequently: true });
    const imgData = gCtx.getImageData(0, 0, w, h).data;

    const { drawX, drawY, drawW, drawH } = getImageFitRectInRegion(sourceCanvas, rect);

    // ===== 关键：算出“真正显示在 rect 里的 source 范围” =====
    const visibleSrcX = Math.max(0, Math.round(((rect.x - drawX) / drawW) * w));
    const visibleSrcY = Math.max(0, Math.round(((rect.y - drawY) / drawH) * h));
    const visibleSrcW = Math.min(w - visibleSrcX, Math.round((rect.w / drawW) * w));
    const visibleSrcH = Math.min(h - visibleSrcY, Math.round((rect.h / drawH) * h));

    const srcXMin = visibleSrcX;
    const srcXMax = visibleSrcX + visibleSrcW - 1;
    const srcYMin = visibleSrcY;
    const srcYMax = visibleSrcY + visibleSrcH - 1;

    const pts = [];
    const yStep = Math.max(2, Math.floor(h / 150));

    for (let y = srcYMin; y <= srcYMax; y += yStep) {
        let foundX = -1;

        if (side === "left") {
            for (let x = srcXMin; x <= srcXMax; x++) {
                const alpha = imgData[(y * w + x) * 4 + 3];
                if (alpha > 20) {
                    foundX = x;
                    break;
                }
            }
        } else {
            for (let x = srcXMax; x >= srcXMin; x--) {
                const alpha = imgData[(y * w + x) * 4 + 3];
                if (alpha > 20) {
                    foundX = x;
                    break;
                }
            }
        }

        if (foundX !== -1) {
            // 映射回最终海报坐标
            const px = drawX + (foundX / w) * drawW;
            const py = drawY + (y / h) * drawH;

            // 再确保点真的落在 rect 内部
            if (
                px >= rect.x + 4 &&
                px <= rect.x + rect.w - 4 &&
                py >= rect.y + 4 &&
                py <= rect.y + rect.h - 4
            ) {
                pts.push({ x: px, y: py });
            }
        }
    }

    if (pts.length < 2) return pts;

    // 平滑
    const smoothPts = pts.map((pt, i) => {
        let sumX = 0;
        let sumY = 0;
        let count = 0;

        for (let k = -4; k <= 4; k++) {
            const idx = i + k;
            if (idx >= 0 && idx < pts.length) {
                sumX += pts[idx].x;
                sumY += pts[idx].y;
                count++;
            }
        }

        return {
            x: sumX / count,
            y: sumY / count
        };
    });

    // 向外偏移一点，避免压在主体边缘上
    const offset = Math.max(16, Math.min(30, rect.w * 0.025));

    const offsetPts = smoothPts.map((pt, i) => {
        const dir = getPathDirection(smoothPts, i);
        const nx = side === "left" ? -dir.y : dir.y;
        const ny = side === "left" ? dir.x : -dir.x;

        return {
            x: pt.x + nx * offset,
            y: pt.y + ny * offset
        };
    });

    return offsetPts;
}

async function buildPersonSideContourPathPoints(sourceCanvas, rect, side = "left") {
    const { personCanvas } = await segmentPersonCutout(sourceCanvas);

    const w = personCanvas.width;
    const h = personCanvas.height;
    const pCtx = personCanvas.getContext('2d', { willReadFrequently: true });
    const imgData = pCtx.getImageData(0, 0, w, h).data;

    const { drawX, drawY, drawW, drawH } = getImageFitRectInRegion(sourceCanvas, rect);

    const pts = [];
    const yStart = Math.floor(h * 0.10);
    const yEnd = Math.floor(h * 0.90);
    const yStep = Math.max(2, Math.floor(h / 140));

    for (let y = yStart; y <= yEnd; y += yStep) {
        let foundX = -1;

        if (side === "left") {
            for (let x = 0; x < w; x++) {
                const alpha = imgData[(y * w + x) * 4 + 3];
                if (alpha > 20) {
                    foundX = x;
                    break;
                }
            }
        } else {
            for (let x = w - 1; x >= 0; x--) {
                const alpha = imgData[(y * w + x) * 4 + 3];
                if (alpha > 20) {
                    foundX = x;
                    break;
                }
            }
        }

        if (foundX !== -1) {
            const px = drawX + (foundX / w) * drawW;
            const py = drawY + (y / h) * drawH;
            pts.push({ x: px, y: py });
        }
    }

    // 平滑
    const smoothPts = pts.map((pt, i) => {
        let sumX = 0;
        let sumY = 0;
        let count = 0;

        for (let k = -3; k <= 3; k++) {
            const idx = i + k;
            if (idx >= 0 && idx < pts.length) {
                sumX += pts[idx].x;
                sumY += pts[idx].y;
                count++;
            }
        }

        return {
            x: sumX / count,
            y: sumY / count
        };
    });

    // 向外偏移一点，避免压在人物边缘上
    const offset = Math.max(14, Math.min(28, drawW * 0.025));

    const offsetPts = smoothPts.map((pt, i) => {
        const dir = getPathDirection(smoothPts, i);

        // 左轮廓往左外扩；右轮廓往右外扩
        const nx = side === "left" ? -dir.y : dir.y;
        const ny = side === "left" ? dir.x : -dir.x;

        return {
            x: pt.x + nx * offset,
            y: pt.y + ny * offset
        };
    });

    return offsetPts;
}

function getPolylineLength(pts) {
    if (!pts || pts.length < 2) return 0;
    let total = 0;
    for (let i = 0; i < pts.length - 1; i++) {
        total += Math.hypot(pts[i + 1].x - pts[i].x, pts[i + 1].y - pts[i].y);
    }
    return total;
}

async function buildAutoCompositePersonContourPathPoints(sourceCanvas, rect) {
    const leftPath = await buildCompositePersonContourPathPoints(sourceCanvas, rect, "left");
    const rightPath = await buildCompositePersonContourPathPoints(sourceCanvas, rect, "right");

    const leftLen = getPolylineLength(leftPath);
    const rightLen = getPolylineLength(rightPath);

    // 优先选更长、更完整的那一侧
    if (rightLen > leftLen * 1.08) {
        return rightPath;
    }

    return leftPath;
}

function drawTextAlongPolyline(ctx, text, pts, options = {}) {
    if (!text || !pts || pts.length < 2) return;

    const {
        fontSize = 40,
        color = "#000000",
        letterSpacing = 2,
        startOffset = 0,
        textAlign = "start"
    } = options;

    ctx.save();
    ctx.fillStyle = color;
    ctx.textBaseline = "middle";
    ctx.textAlign = "center";
    ctx.font = `500 ${fontSize}px ${TYPE_FONT_STACK}`;

    // 计算折线路径总长
    const segs = [];
    let totalLen = 0;

    for (let i = 0; i < pts.length - 1; i++) {
        const dx = pts[i + 1].x - pts[i].x;
        const dy = pts[i + 1].y - pts[i].y;
        const len = Math.hypot(dx, dy);
        segs.push({ i, len });
        totalLen += len;
    }

    if (totalLen < 10) {
        ctx.restore();
        return;
    }

    const chars = text.split("");

    const charWidths = chars.map(ch => ctx.measureText(ch).width + letterSpacing);
    const textLen = charWidths.reduce((a, b) => a + b, 0);

    let cursor = startOffset;

    if (textAlign === "center") {
        cursor = Math.max(0, (totalLen - textLen) / 2);
    } else if (textAlign === "end") {
        cursor = Math.max(0, totalLen - textLen - startOffset);
    }

    function getPointAtLength(targetLen) {
        let acc = 0;

        for (const seg of segs) {
            if (acc + seg.len >= targetLen) {
                const t = (targetLen - acc) / seg.len;
                const p0 = pts[seg.i];
                const p1 = pts[seg.i + 1];
                return {
                    x: p0.x + (p1.x - p0.x) * t,
                    y: p0.y + (p1.y - p0.y) * t,
                    angle: Math.atan2(p1.y - p0.y, p1.x - p0.x)
                };
            }
            acc += seg.len;
        }

        const last = pts[pts.length - 1];
        const prev = pts[pts.length - 2];
        return {
            x: last.x,
            y: last.y,
            angle: Math.atan2(last.y - prev.y, last.x - prev.x)
        };
    }

    for (let c = 0; c < chars.length; c++) {
        const ch = chars[c];
        const w = charWidths[c];

        const midLen = cursor + w * 0.5;
        if (midLen > totalLen) break;

        const pos = getPointAtLength(midLen);

        ctx.save();
        ctx.translate(pos.x, pos.y);
        ctx.rotate(pos.angle);
        ctx.fillText(ch, 0, 0);
        ctx.restore();

        cursor += w;
    }

    ctx.restore();
}

function drawRibbonStrokePath(ctx, pts, options = {}) {
    if (!pts || pts.length < 2) return;

    const {
        width = 60,
        fill = "#ffffff",
        outline = null,
        outlineWidth = 0,
        alpha = 1
    } = options;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineCap = "butt";     // 端点变成方形
//ctx.lineJoin = "miter";   // 转角变锐角
ctx.miterLimit = 2;
    ctx.lineJoin = "round";

    if (outline && outlineWidth > 0) {
        ctx.strokeStyle = outline;
        ctx.lineWidth = width + outlineWidth * 2;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) {
            ctx.lineTo(pts[i].x, pts[i].y);
        }
        ctx.stroke();
    }

    ctx.strokeStyle = fill;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
        ctx.lineTo(pts[i].x, pts[i].y);
    }
    ctx.stroke();

    ctx.restore();
}

function drawRibbonStripes(ctx, pts, options = {}) {
    if (!pts || pts.length < 2) return;

    const {
        ribbonWidth = 64,
        baseColor = "#ffffff",
        stripeColor = "#f2b3b3",
        stripeCount = 5,
        stripeWidth = 3,
        alpha = 1
    } = options;

    // 先画白色宽带底子
    drawRibbonStrokePath(ctx, pts, {
        width: ribbonWidth,
        fill: baseColor,
        outline: null,
        outlineWidth: 0,
        alpha
    });

    // 再画内部平行条纹
    const innerSpan = ribbonWidth * 0.72;
    const gap = stripeCount > 1 ? innerSpan / (stripeCount - 1) : 0;
    const start = -innerSpan / 2;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineCap = "butt";
//ctx.lineJoin = "miter";
ctx.miterLimit = 2;
    ctx.lineJoin = "round";
    ctx.strokeStyle = stripeColor;
    ctx.lineWidth = stripeWidth;

    for (let s = 0; s < stripeCount; s++) {
        const offset = start + s * gap;

        const stripePath = pts.map((pt, i) => {
            const dir = getPathDirection(pts, i);
            const nx = -dir.y;
            const ny = dir.x;
            return {
                x: pt.x + nx * offset,
                y: pt.y + ny * offset
            };
        });

        ctx.beginPath();
        ctx.moveTo(stripePath[0].x, stripePath[0].y);
        for (let i = 1; i < stripePath.length; i++) {
            ctx.lineTo(stripePath[i].x, stripePath[i].y);
        }
        ctx.stroke();
    }

    ctx.restore();
}

function drawRibbonGradientTube(ctx, pts, options = {}) {
    if (!pts || pts.length < 2) return;

    const {
        ribbonWidth = 72,
        alpha = 1
    } = options;

    ctx.save();
    ctx.globalAlpha = alpha;

    // 最外白描边
    drawRibbonStrokePath(ctx, pts, {
        width: ribbonWidth + 6,
        fill: "#ffffff",
        outline: null,
        outlineWidth: 0,
        alpha: 1
    });

    // 主体浅灰
    drawRibbonStrokePath(ctx, pts, {
        width: ribbonWidth,
        fill: "#cfcfcf",
        outline: null,
        outlineWidth: 0,
        alpha: 1
    });

    // 中层灰
    drawRibbonStrokePath(ctx, pts, {
        width: ribbonWidth * 0.82,
        fill: "#9c9c9c",
        outline: null,
        outlineWidth: 0,
        alpha: 1
    });

    // 深色中心
    drawRibbonStrokePath(ctx, pts, {
        width: ribbonWidth * 0.60,
        fill: "#2f2f2f",
        outline: null,
        outlineWidth: 0,
        alpha: 1
    });

    // 高光层
    drawRibbonStrokePath(ctx, pts, {
        width: ribbonWidth * 0.34,
        fill: "#a9a9a9",
        outline: null,
        outlineWidth: 0,
        alpha: 1
    });

    // 中央细高光
    drawRibbonStrokePath(ctx, pts, {
        width: ribbonWidth * 0.12,
        fill: "#e7e7e7",
        outline: null,
        outlineWidth: 0,
        alpha: 1
    });

    ctx.restore();
}

        async function processImage(ctx, workingCanvas, rect, type, palette) {
            const { x, y, w, h } = rect;

            ctx.save();
            ctx.beginPath();
            ctx.rect(x, y, w, h);
            ctx.clip();

            const imgRatio = workingCanvas.width / workingCanvas.height;
            const rectRatio = w / h;
            let drawW, drawH, drawX, drawY;

            if (imgRatio > rectRatio) {
                drawH = h;
                drawW = h * imgRatio;
                drawX = x + (w - drawW) / 2;
                drawY = y;
            } else {
                drawW = w;
                drawH = w / imgRatio;
                drawX = x;
                drawY = y + (h - drawH) / 2;
            }

            if (type === 'space') {
                const p = FX.space;

                function subdivide(r, depth) {
                    if (depth <= 0 || r.w < p.minBlockSize || r.h < p.minBlockSize) return [r];
                    let res = [];

                    if (r.w > r.h * 1.25 || (Math.random() > 0.5 && r.w > 100)) {
                        let split = 0.42 + Math.random() * 0.16;
                        let w1 = r.w * split, w2 = r.w - w1;
                        res = res.concat(subdivide({ x: r.x, y: r.y, w: w1, h: r.h }, depth - 1));
                        res = res.concat(subdivide({ x: r.x + w1, y: r.y, w: w2, h: r.h }, depth - 1));
                    } else {
                        let split = 0.42 + Math.random() * 0.16;
                        let h1 = r.h * split, h2 = r.h - h1;
                        res = res.concat(subdivide({ x: r.x, y: r.y, w: r.w, h: h1 }, depth - 1));
                        res = res.concat(subdivide({ x: r.x, y: r.y + h1, w: r.w, h: h2 }, depth - 1));
                    }
                    return res;
                }

                const blocks = subdivide({ x: drawX, y: drawY, w: drawW, h: drawH }, p.splitDepth);
                const scaleX = workingCanvas.width / drawW;
                const scaleY = workingCanvas.height / drawH;

                blocks.sort(() => Math.random() - 0.5);

                blocks.forEach(b => {
                    const isColorBlock = Math.random() < p.colorBlockRatio;

                    if (isColorBlock) {
                        let rand = Math.random();
                        if (rand < 0.55) ctx.fillStyle = palette.dominant;
                        else if (rand < 0.9) ctx.fillStyle = palette.secondary;
                        else ctx.fillStyle = palette.neutral;

                        ctx.fillRect(b.x, b.y, b.w + 1, b.h + 1);
                    } else {
                        let srcX = (b.x - drawX) * scaleX;
                        let srcY = (b.y - drawY) * scaleY;
                        let srcW = b.w * scaleX;
                        let srcH = b.h * scaleY;

                        let offsetX = (Math.random() - 0.5) * p.offsetStrength * scaleX;
                        let offsetY = (Math.random() - 0.5) * p.offsetStrength * 0.65 * scaleY;

                        let finalSrcX = Math.max(0, Math.min(workingCanvas.width - srcW, srcX + offsetX));
                        let finalSrcY = Math.max(0, Math.min(workingCanvas.height - srcH, srcY + offsetY));

                        ctx.drawImage(
                            workingCanvas,
                            finalSrcX, finalSrcY, srcW, srcH,
                            b.x, b.y, b.w + 1, b.h + 1
                        );
                    }
                });

                for (let i = 0; i < p.accentBarCount; i++) {
                    if (Math.random() > 0.5) {
                        let sh = 8 + Math.random() * 14;
                        let sy = drawY + Math.random() * (drawH - sh);

);

    // 4. 亮度区域：只画框

            } else if (type === 'moment') {

                candidates.sort(() => Math.random() - 0.5);

                        dy,

                ctx.globalAlpha = 1.0;
