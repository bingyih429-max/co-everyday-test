}

function drawCheckerboardBackground(ctx, rect, size = 18, sampleCanvas = null) {
    let avgLum = 180;

    if (sampleCanvas) {
        const topSample = {
            x: 0,
            y: 0,
            w: sampleCanvas.width,
            h: Math.max(1, rect.y)
        };

        const bottomSample = {
            x: 0,
            y: rect.y + rect.h,
            w: sampleCanvas.width,
            h: Math.max(1, sampleCanvas.height - (rect.y + rect.h))
        };

        const topLum = sampleCanvasRegionLuminance(sampleCanvas, topSample);
        const bottomLum = sampleCanvasRegionLuminance(sampleCanvas, bottomSample);
        avgLum = (topLum + bottomLum) / 2;
    }

    let colorA, colorB;

    if (avgLum < 95) {
        colorA = '#3a3a3a';
        colorB = '#565656';
    } else if (avgLum < 145) {
        colorA = '#727272';
        colorB = '#8f8f8f';
    } else {
        colorA = '#eeeeee';
        colorB = '#cfcfcf';
    }

    ctx.save();
    ctx.beginPath();
    ctx.rect(rect.x, rect.y, rect.w, rect.h);
    ctx.clip();

    for (let y = rect.y; y < rect.y + rect.h; y += size) {
        for (let x = rect.x; x < rect.x + rect.w; x += size) {
            const ix = Math.floor((x - rect.x) / size);
            const iy = Math.floor((y - rect.y) / size);
            ctx.fillStyle = (ix + iy) % 2 === 0 ? colorA : colorB;
            ctx.fillRect(x, y, size, size);
        }
    }

    ctx.restore();
}

function colorDistanceSq(r1, g1, b1, r2, g2, b2) {
    const dr = r1 - r2;
    const dg = g1 - g2;
    const db = b1 - b2;
    return dr * dr + dg * dg + db * db;
}

function createMagicWandMaskFromEdges(sourceCanvas, tolerance = 42) {
    const w = sourceCanvas.width;
    const h = sourceCanvas.height;
    const ctx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const img = ctx.getImageData(0, 0, w, h);
    const data = img.data;

    const bg = new Uint8Array(w * h);
    const visited = new Uint8Array(w * h);
    const queue = [];

    function push(x, y, br, bgc, bb) {
        if (x < 0 || y < 0 || x >= w || y >= h) return;
        const id = y * w + x;
        if (visited[id]) return;

        const p = id * 4;
        const r = data[p];
        const g = data[p + 1];
        const b = data[p + 2];

        const dist = colorDistanceSq(r, g, b, br, bgc, bb);
        if (dist > tolerance * tolerance) return;

        visited[id] = 1;
        bg[id] = 1;
        queue.push([x, y, br, bgc, bb]);
    }

    // 从四边启动，相当于“点选背景”
    for (let x = 0; x < w; x += 4) {
        let p1 = x * 4;
        push(x, 0, data[p1], data[p1 + 1], data[p1 + 2]);

        let p2 = ((h - 1) * w + x) * 4;
        push(x, h - 1, data[p2], data[p2 + 1], data[p2 + 2]);
    }

    for (let y = 0; y < h; y += 4) {
        let p1 = (y * w) * 4;
        push(0, y, data[p1], data[p1 + 1], data[p1 + 2]);

        let p2 = (y * w + (w - 1)) * 4;
        push(w - 1, y, data[p2], data[p2 + 1], data[p2 + 2]);
    }

    let qi = 0;
    while (qi < queue.length) {
        const [x, y, br, bgc, bb] = queue[qi++];

        push(x + 1, y, br, bgc, bb);
        push(x - 1, y, br, bgc, bb);
        push(x, y + 1, br, bgc, bb);
        push(x, y - 1, br, bgc, bb);
    }

    // 返回主体 mask：不是背景的地方保留
    const mask = new Uint8Array(w * h);
    for (let i = 0; i < mask.length; i++) {
        mask[i] = bg[i] ? 0 : 1;
    }

    return mask;
}

function getMaskBounds(mask, w, h) {
    let minX = w, minY = h, maxX = 0, maxY = 0;
    let count = 0;

    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const id = y * w + x;
            if (!mask[id]) continue;

            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);
            count++;
        }
    }

    if (!count) return null;

    return {
        x: minX,
        y: minY,
        w: maxX - minX + 1,
        h: maxY - minY + 1,
        count
    };
}

function cleanDailyObjectMask(mask, w, h, minArea = 80, erodeIterations = 2) {
    // 1. 先做轻微腐蚀：去掉毛刺和细碎边
    let current = mask;

    for (let iter = 0; iter < erodeIterations; iter++) {
        const next = new Uint8Array(w * h);

        for (let y = 1; y < h - 1; y++) {
            for (let x = 1; x < w - 1; x++) {
                const id = y * w + x;
                if (!current[id]) continue;

                const neighbors =
                    current[id - 1] +
                    current[id + 1] +
                    current[id - w] +
                    current[id + w] +
                    current[id - w - 1] +
                    current[id - w + 1] +
                    current[id + w - 1] +
                    current[id + w + 1];

                // 周围像素太少，就认为是孤立噪点/毛边
                if (neighbors >= 5) {
                    next[id] = 1;
                }
            }
        }

        current = next;
    }

    // 2. 删除小连通区域
    const visited = new Uint8Array(w * h);
    const cleaned = new Uint8Array(w * h);

    const dirs = [
        [1, 0], [-1, 0], [0, 1], [0, -1]
    ];

    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const start = y * w + x;
            if (!current[start] || visited[start]) continue;

            const queue = [[x, y]];
            const pixels = [];
            visited[start] = 1;

            let qi = 0;
            while (qi < queue.length) {
                const [cx, cy] = queue[qi++];
                const id = cy * w + cx;
                pixels.push(id);

                for (const [dx, dy] of dirs) {
                    const nx = cx + dx;
                    const ny = cy + dy;
                    if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;

                    const nid = ny * w + nx;
                    if (visited[nid] || !current[nid]) continue;

                    visited[nid] = 1;
                    queue.push([nx, ny]);
                }
            }

            if (pixels.length >= minArea) {
                pixels.forEach(id => cleaned[id] = 1);
            }
        }
    }

    // 3. 再轻微膨胀回来，避免主体被腐蚀得太瘦
    const dilated = new Uint8Array(w * h);

    for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
            const id = y * w + x;
            if (!cleaned[id]) continue;

            dilated[id] = 1;
            dilated[id - 1] = 1;
            dilated[id + 1] = 1;
            dilated[id - w] = 1;
            dilated[id + w] = 1;
        }
    }

    return dilated;
}

function buildCutoutCanvas(sourceCanvas, mask) {
    const w = sourceCanvas.width;
    const h = sourceCanvas.height;
    const sctx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const img = sctx.getImageData(0, 0, w, h);
    const data = img.data;

    for (let i = 0; i < w * h; i++) {
        if (!mask[i]) {
            data[i * 4 + 3] = 0;
        }
    }

    const out = document.createElement('canvas');
    out.width = w;
    out.height = h;
    const octx = out.getContext('2d');
    octx.putImageData(img, 0, 0);
    return out;
}

function drawDailyObjectDotDecoration(ctx, rect, seedValue = 0.5) {
const dotR = 5.8;      // 圆圈半径
const gap = 15.5;      // 圆圈间距
const strokeW = 3.8;   // 描边粗细

    ctx.save();
    ctx.beginPath();
    ctx.rect(rect.x, rect.y, rect.w, rect.h);
    ctx.clip();

    const baseColor = sampleAverageColorFromCanvas(ctx.canvas, {
        x: 0,
        y: 0,
        w: ctx.canvas.width,
        h: Math.max(1, rect.y)
    });

    const rgb = rgbStringToObj(baseColor);
    const decorColor = `rgb(
        ${Math.min(255, rgb.r + 35)},
        ${Math.min(255, rgb.g + 35)},
        ${Math.min(255, rgb.b + 35)}
    )`;

    ctx.strokeStyle = decorColor;
    ctx.lineWidth = strokeW;

    function drawBlobInBox(box, mode = 'top') {
    const cols = Math.floor(box.w / gap);
    const rows = Math.floor(box.h / gap);

    //装饰圆圈规整
    const shapeAmount = 0.45 + seedValue * 0.35;

    for (let y = 0; y < rows; y++) {
        const t = y / Math.max(1, rows - 1);

        let center;
        let width;

        if (mode === 'top') {
            center = cols * (0.58 + Math.sin(t * Math.PI * 2.1 + seedValue * 7) * 0.08);
            width = cols * (
                0.48 +
                Math.sin(t * Math.PI) * 0.22 +
                Math.sin(t * Math.PI * 3.4 + seedValue * 6) * 0.08
            ) * shapeAmount;
        } else {
            center = cols * (0.34 + Math.sin(t * Math.PI * 2.4 + seedValue * 8) * 0.09);
            width = cols * (
                0.42 +
                Math.sin(t * Math.PI * 1.15) * 0.24 +
                Math.sin(t * Math.PI * 3.7 + seedValue * 5) * 0.08
            ) * shapeAmount;
        }

        const edgeWaveL =
            Math.sin(t * Math.PI * 4.2 + seedValue * 11) * 3.5 +
            Math.sin(t * Math.PI * 8.1 + seedValue * 4) * 1.6;

        const edgeWaveR =
            Math.sin(t * Math.PI * 3.8 + seedValue * 9) * 3.5 +
            Math.sin(t * Math.PI * 7.6 + seedValue * 6) * 1.6;

        let left = Math.round(center - width / 2 + edgeWaveL);
        let right = Math.round(center + width / 2 + edgeWaveR);

        left = Math.max(0, left);
        right = Math.min(cols - 1, right);

        // 保证每一行都有一定宽度，避免断开
        if (right - left < 5) {
            const mid = Math.round((left + right) / 2);
            left = Math.max(0, mid - 3);
            right = Math.min(cols - 1, mid + 3);
        }

        for (let x = left; x <= right; x++) {
            const px = box.x + x * gap + gap * 0.5;
            const py = box.y + y * gap + gap * 0.5;

            ctx.beginPath();
            ctx.arc(px, py, dotR, 0, Math.PI * 2);
            ctx.stroke();
        }
    }
}

    // 上方红框区域：避开左侧日期大字和右上农历，位于图像上部偏右
    const topBox = {
        x: rect.x + rect.w * 0.26,
        y: rect.y + rect.h * 0.09,
        w: rect.w * 0.68,
        h: rect.h * 0.15
    };

    // 下方红框区域：位于图像下部偏左，避开右下角月历
    const bottomBox = {
        x: rect.x + rect.w * 0.02,
        y: rect.y + rect.h * 0.82,
        w: rect.w * 0.82,
        h: rect.h * 0.15
    };

    drawBlobInBox(topBox, 'top');
    drawBlobInBox(bottomBox, 'bottom');

    ctx.restore();
}

function lightenRgbColor(color, amount = 35) {
    const nums = String(color).match(/\d+/g);
    if (!nums || nums.length < 3) return color;

    const r = Math.min(255, Number(nums[0]) + amount);
    const g = Math.min(255, Number(nums[1]) + amount);
    const b = Math.min(255, Number(nums[2]) + amount);

    return `rgb(${r}, ${g}, ${b})`;
}

function drawTextAsDotMatrix(ctx, text, x, y, options = {}) {
    const {
        font = '900 160px "FZ CuHei Traditional", sans-serif',
        color = '#ffffff',
        dotR = 3.8,
        gap = 7,
        lineHeight = 170,
        maxWidth = 720,
        strokeWidth = 2.8,
        textStrokeWidth = 64
    } = options;

    const lines = String(text || '').split('\n').filter(Boolean);
    if (!lines.length) return;

    const pad = 80;
    const temp = document.createElement('canvas');
    temp.width = Math.ceil(maxWidth + pad * 2);
    temp.height = Math.ceil(lines.length * lineHeight + pad * 2);

    const tctx = temp.getContext('2d', { willReadFrequently: true });
    tctx.clearRect(0, 0, temp.width, temp.height);

    tctx.fillStyle = '#000';
    tctx.strokeStyle = '#000';
    tctx.lineWidth = textStrokeWidth;
    tctx.lineJoin = 'round';
    tctx.miterLimit = 2;
    tctx.font = font;
    tctx.textAlign = 'left';
    tctx.textBaseline = 'top';

    lines.forEach((line, idx) => {
        const ty = pad + idx * lineHeight;
        tctx.strokeText(line, pad, ty);
        tctx.fillText(line, pad, ty);
    });

    const img = tctx.getImageData(0, 0, temp.width, temp.height);
    const data = img.data;

    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = strokeWidth;

    for (let py = 0; py < temp.height; py += gap) {
        for (let px = 0; px < temp.width; px += gap) {
            const id = (py * temp.width + px) * 4;
            if (data[id + 3] > 70) {
                ctx.beginPath();
                ctx.arc(x + px - pad, y + py - pad, dotR, 0, Math.PI * 2);
                ctx.stroke();
            }
        }
    }

    ctx.restore();
}

function extractDailyObjectBackgroundColor(sourceCanvas) {
    const ctx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const w = sourceCanvas.width;
    const h = sourceCanvas.height;

    const sampleSize = 80;
    const temp = document.createElement('canvas');
    temp.width = sampleSize;
    temp.height = sampleSize;

    const tctx = temp.getContext('2d', { willReadFrequently: true });
    tctx.drawImage(sourceCanvas, 0, 0, sampleSize, sampleSize);

    const data = tctx.getImageData(0, 0, sampleSize, sampleSize).data;

    let r = 0, g = 0, b = 0, count = 0;

    // 只采样边缘区域，避免取到主体中心颜色
    for (let y = 0; y < sampleSize; y++) {
        for (let x = 0; x < sampleSize; x++) {
            const edge =
                x < 12 ||
                x > sampleSize - 13 ||
                y < 12 ||
                y > sampleSize - 13;

            if (!edge) continue;

            const p = (y * sampleSize + x) * 4;

            r += data[p];
            g += data[p + 1];
            b += data[p + 2];
            count++;
        }
    }

    if (!count) return '#d8d8d8';

    r = Math.round(r / count);
    g = Math.round(g / count);
    b = Math.round(b / count);

    // 轻微去饱和，避免背景太花
    const gray = Math.round((r + g + b) / 3);
    r = Math.round(r * 0.65 + gray * 0.35);
    g = Math.round(g * 0.65 + gray * 0.35);
    b = Math.round(b * 0.65 + gray * 0.35);

    // 轻微提亮，和主体拉开
    r = Math.min(255, r + 18);
    g = Math.min(255, g + 18);
    b = Math.min(255, b + 18);

    return `rgb(${r}, ${g}, ${b})`;
}

function processDailyObjectImage(ctx, sourceCanvas, imageRect) {
    const tolerance = 8 + Number(typeSliderA.value) * 0.6;  //抠图容差
    const decorationSeed = Number(typeSliderB.value) / 100;
    const sizeSlider = Number(typeSliderC.value) / 100;

    const objectBgColor = extractDailyObjectBackgroundColor(sourceCanvas);

ctx.save();
ctx.fillStyle = objectBgColor;
ctx.fillRect(imageRect.x, imageRect.y, imageRect.w, imageRect.h);
ctx.restore();

    const analysisCanvas = document.createElement('canvas');
    const maxSide = 520;
    const ratio = Math.min(maxSide / sourceCanvas.width, maxSide / sourceCanvas.height, 1);

    analysisCanvas.width = Math.round(sourceCanvas.width * ratio);
    analysisCanvas.height = Math.round(sourceCanvas.height * ratio);

    const actx = analysisCanvas.getContext('2d');
    actx.drawImage(sourceCanvas, 0, 0, analysisCanvas.width, analysisCanvas.height);

    let mask = createMagicWandMaskFromEdges(analysisCanvas, tolerance);

// 清理非主体边缘碎像素
mask = cleanDailyObjectMask(
    mask,
    analysisCanvas.width,
    analysisCanvas.height,
    80,   // 小碎片最小面积，越大删得越干净
    2     // 边缘收缩次数，越大边缘越干净但主体损失越多
);

const bounds = getMaskBounds(mask, analysisCanvas.width, analysisCanvas.height);

    if (!bounds) {
        ctx.drawImage(sourceCanvas, imageRect.x, imageRect.y, imageRect.w, imageRect.h);
        return;
    }

    const cutout = buildCutoutCanvas(analysisCanvas, mask);

    const subjectRatio = bounds.w / bounds.h;
    // 主体初始就放大：最小约占图片区 90%，最大允许到 130%
const targetAreaScale = 0.90 + sizeSlider * 0.40;
    const targetWByArea = imageRect.w * targetAreaScale;
    const targetHByArea = imageRect.h * targetAreaScale;

    let drawW, drawH;

// 以主体 bbox 为依据，而不是以原图为依据
const fitScale = Math.min(
    imageRect.w / bounds.w,
    imageRect.h / bounds.h
);

// 初始放大系数：保证主体明显占据画面中心
const objectScale = fitScale * targetAreaScale;

drawW = bounds.w * objectScale;
drawH = bounds.h * objectScale;

    

    const sx = bounds.x;
    const sy = bounds.y;
    const sw = bounds.w;
    const sh = bounds.h;

    const dx = imageRect.x + imageRect.w / 2 - drawW / 2;
    const dy = imageRect.y + imageRect.h / 2 - drawH / 2;

    ctx.save();
    ctx.beginPath();
    ctx.rect(imageRect.x, imageRect.y, imageRect.w, imageRect.h);
    ctx.clip();

    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(
        cutout,
        sx,
        sy,
        sw,
        sh,
        dx,
        dy,
        drawW,
        drawH
    );

    drawDailyObjectDotDecoration(ctx, imageRect, decorationSeed);

    ctx.restore();
}

function drawLightTimeContourLayer(ctx, sourceCanvas, imageRect) {
    const w = Math.floor(imageRect.w);
    const h = Math.floor(imageRect.h);

    const temp = document.createElement('canvas');
    temp.width = w;
    temp.height = h;
    const tctx = temp.getContext('2d', { willReadFrequently: true });

    tctx.drawImage(
        sourceCanvas,
        imageRect.x,
        imageRect.y,
        imageRect.w,
        imageRect.h,
        0,
        0,
        w,
        h
    );

    const img = tctx.getImageData(0, 0, w, h);
    const data = img.data;

    const out = tctx.createImageData(w, h);
    const od = out.data;

    function grayAt(x, y) {
        const i = (y * w + x) * 4;
        return 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
    }

    for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
            const gx =
                -grayAt(x - 1, y - 1) + grayAt(x + 1, y - 1) +
                -2 * grayAt(x - 1, y) + 2 * grayAt(x + 1, y) +
                -grayAt(x - 1, y + 1) + grayAt(x + 1, y + 1);

            const gy =
                -grayAt(x - 1, y - 1) - 2 * grayAt(x, y - 1) - grayAt(x + 1, y - 1) +
                grayAt(x - 1, y + 1) + 2 * grayAt(x, y + 1) + grayAt(x + 1, y + 1);

            const edge = Math.sqrt(gx * gx + gy * gy);
            const i = (y * w + x) * 4;

            if (edge > 72) {
                od[i] = 245;
                od[i + 1] = 245;
                od[i + 2] = 235;
                od[i + 3] = Math.min(210, edge);
            }
        }
    }

    tctx.putImageData(out, 0, 0);

    ctx.save();
ctx.globalAlpha = 0.9;

// 原位置淡一点
ctx.drawImage(temp, imageRect.x, imageRect.y, imageRect.w, imageRect.h);

// 偏移位置更明显一点
ctx.globalAlpha = 0.78;
ctx.drawImage(
    temp,
    imageRect.x + 8,
    imageRect.y + 6,
    imageRect.w,
    imageRect.h
);

ctx.restore();
}

function drawDangerTypeLayer(ctx, rect, palette, text, category) {
    // light_time 跳过图片区文字叠加
    if (category === 'light_time' || category === 'light_time_moment') {
        return;
    }

    const size = Number(typeSliderA.value);        // 尺寸
    const complexity = Number(typeSliderB.value);  // 油墨强度
    const columns = Number(typeSliderC.value);     // 颗粒密度

    const ink = getAdaptiveDangerInkColor(
    palette,
    currentBaseCanvas,
    rect,
    0.42
);
const rgb = ink.rgb;
const strokeColor = ink.color;

    const usableWidth = rect.w * 1.02;
    const usableHeight = rect.h * 0.42;

    // 先自动排版
    const autoLayout = layoutOutlinedTextBlock(text, usableWidth, usableHeight, TYPE_FONT_STACK);
    const sizeScale = 0.72 + (size / 100) * 0.92;
    const fontSize = Math.max(18, autoLayout.fontSize * sizeScale);

    const finalLayout = layoutOutlinedTextBlock(text, usableWidth, usableHeight, TYPE_FONT_STACK);
    const lines = finalLayout.lines.length ? finalLayout.lines : ["TEXT"];

    // ========= 1. 用“实心字”画底稿，而不是描边字 =========
    const textCanvas = document.createElement('canvas');
    textCanvas.width = rect.w;
    textCanvas.height = rect.h;
    const tctx = textCanvas.getContext('2d', { willReadFrequently: true });

    tctx.clearRect(0, 0, textCanvas.width, textCanvas.height);
    tctx.textAlign = "left";
    tctx.textBaseline = "top";
    tctx.font = `700 ${fontSize}px ${TYPE_FONT_STACK}`;
    tctx.fillStyle = "#ffffff";

    const lineHeight = fontSize * 0.92;
    const totalHeight = lines.length * lineHeight;

    // 左对齐、下对齐
    const bleedX = rect.w * 0.03; // 控制出血量
    const anchorX = rect.w * -0.03;
    const bleed = rect.h * 0.06;
    const startY = rect.h - totalHeight - rect.h * 0.05 + bleed;

    for (let i = 0; i < lines.length; i++) {
        tctx.fillText(lines[i], anchorX, startY + i * lineHeight);
    }

    // ========= 2. 对“实心字”做更大的模糊 =========
    const blurCanvas = document.createElement('canvas');
    blurCanvas.width = rect.w;
    blurCanvas.height = rect.h;
    const bctx = blurCanvas.getContext('2d', { willReadFrequently: true });

    const blurPx = 1.6 + (size / 100) * 2.2;
    bctx.clearRect(0, 0, blurCanvas.width, blurCanvas.height);
    bctx.filter = `blur(${blurPx}px)`;
    bctx.drawImage(textCanvas, 0, 0);
    bctx.filter = "none";

    const blurData = bctx.getImageData(0, 0, blurCanvas.width, blurCanvas.height).data;
    const w = blurCanvas.width;
    const h = blurCanvas.height;

    const alpha = new Uint8ClampedArray(w * h);
    for (let i = 0; i < w * h; i++) {
        alpha[i] = blurData[i * 4 + 3];
    }

    // ========= 3. 从模糊字里提“外轮廓”和“内轮廓” =========
    const solidMask = thresholdAlphaMask(alpha, 96);
const innerSolid = erodeAlphaMask(solidMask, w, h, 1);
const outerSolid = dilateAlphaMask(solidMask, w, h, 1);

const outerLineCanvas = buildRingFromMasks(outerSolid, solidMask, w, h, rgb);
const innerLineCanvas = buildRingFromMasks(solidMask, innerSolid, w, h, rgb);

    // ========= 4. 只画轮廓线，不画模糊文字本体 =========
    ctx.save();
    ctx.globalAlpha = 0.98;
    ctx.drawImage(outerLineCanvas, rect.x, rect.y);

    ctx.globalAlpha = 0.78;
    ctx.drawImage(innerLineCanvas, rect.x, rect.y);
    ctx.restore();

    // ========= 5. 油墨溢出颗粒：围绕轮廓线撒点 =========
    const outerLineData = outerLineCanvas.getContext('2d', { willReadFrequently: true })
        .getImageData(0, 0, w, h).data;
    const innerLineData = innerLineCanvas.getContext('2d', { willReadFrequently: true })
        .getImageData(0, 0, w, h).data;

    const grainCanvas = document.createElement('canvas');
    grainCanvas.width = w;
    grainCanvas.height = h;
    const gctx = grainCanvas.getContext('2d', { willReadFrequently: true });

    const density = 0.065 + (columns / 100) * 0.15;
    const spread = 1.8 + (complexity / 100) * 4.6;

    for (let y = 0; y < h; y += 1) {
        for (let x = 0; x < w; x += 1) {
            const p = (y * w + x) * 4;
            const ringAlpha = Math.max(
                outerLineData[p + 3],
                innerLineData[p + 3]
            );

            if (ringAlpha > 8 && Math.random() < density) {
                const jitterX = (Math.random() - 0.5) * spread * 2.6;
                const jitterY = (Math.random() - 0.5) * spread * 2.6;

                const sRand = Math.random();
                const s = sRand < 0.72 ? 1 : (sRand < 0.93 ? 1.5 : 2.2);
                const a = 0.18 + Math.random() * 0.55;

                gctx.fillStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${a})`;
                gctx.fillRect(x + jitterX, y + jitterY, s, s);
            }
        }
    }

    // 再给轮廓补一点非常轻的染边
    gctx.globalAlpha = 0.08 + (complexity / 100) * 0.14;
    gctx.drawImage(outerLineCanvas, 0, 0);
    gctx.globalAlpha = 0.05 + (complexity / 100) * 0.10;
    gctx.drawImage(innerLineCanvas, 0, 0);

    ctx.save();
    ctx.globalAlpha = 1;
    ctx.drawImage(grainCanvas, rect.x, rect.y);
    ctx.restore();
}

function getAdaptiveMorisawaTextColor(palette, baseCanvas, rect) {
    const satColor = pickMostSaturatedPaletteColor(palette);
    const satRgb = rgbStringToObj(satColor);

    const sampleRect = {
        x: rect.x + rect.w * 0.18,
        y: rect.y + rect.h * 0.18,
        w: rect.w * 0.64,
        h: rect.h * 0.64
    };

    const lum = sampleCanvasRegionLuminance(baseCanvas, sampleRect);

    let rgb;
    if (lum < 105) {
        // 背景暗：提亮
        rgb = mixRgb(satRgb, { r: 255, g: 255, b: 255 }, 0.72);
    } else if (lum > 165) {
        // 背景亮：压深
        rgb = mixRgb(satRgb, { r: 0, g: 0, b: 0 }, 0.68);
    } else {
        // 中间亮度：轻微往亮或往暗推
        rgb = mixRgb(
            satRgb,
            lum < 135 ? { r: 255, g: 255, b: 255 } : { r: 0, g: 0, b: 0 },
            0.38
        );
    }

    return {
    color: `rgb(${clamp255(rgb.r)}, ${clamp255(rgb.g)}, ${clamp255(rgb.b)})`,
    rgb,
    luminance: lum
};
}

function drawFilledMorisawaWord(ctx, text, x, y, fontSize, scaleX, color, alpha = 1) {
    ctx.save();

    ctx.textAlign = "center";

    ctx.fillText(text, 0, 0);
    ctx.restore();
}

function drawMorisawaTypeLayer(ctx, rect, palette, text) {
    const layerCount = 3 + Math.floor((Number(typeSliderA.value) / 100) * 3);
    const perspective = Number(typeSliderB.value) / 100;
    const decayControl = Number(typeSliderC.value) / 100;

    const colorData = getAdaptiveMorisawaTextColor(palette, currentBaseCanvas, rect);
    const textColor = colorData.color;

    const cleanText = (text || "").trim() || "SPACE";

    const baseFont = rect.h * 0.19;
    const minFont = rect.h * 0.052;
    const decay = 0.88 - decayControl * 0.10;

    const centerX = rect.x + rect.w * 0.5;
    const topY = rect.y + rect.h * 0.16;
    const bottomY = rect.y + rect.h * 0.82;

    ctx.save();

    for (let i = 0; i < layerCount; i++) {
        const t = i / Math.max(1, layerCount - 1);

        const fontSize = Math.max(minFont, baseFont * Math.pow(decay, i));
        const y = topY + (bottomY - topY) * t;

        // 上大下小，但不要压得太夸张
        const scaleX = 1.02 + perspective * 0.55 - t * 0.10;

        // 很轻微的横向漂移，避免太死
        const driftX = (t - 0.5) * rect.w * 0.05 * perspective;

        drawFilledMorisawaWord(
            ctx,
            cleanText,
            centerX + driftX,
            y,
            fontSize,
            scaleX,
            textColor,
            0.88 - t * 0.12
        );
    }

    ctx.restore();
}

function drawShineTypeLayer(ctx, rect, palette, text) {
    const p = FX.moment;

    // 滑杆映射
    const strength = Number(typeSliderA.value) / 100; // 强度：影响抽样数量与透明度
    const detail = Number(typeSliderB.value) / 100;   // 细节：影响条带厚度与采样步长
    const scale = Number(typeSliderC.value) / 100;    // 比例：影响拉伸长度

    // 用当前底图做采样，确保只来自图像本身
    if (!currentWorkingCanvas) return;

    const srcCanvas = currentWorkingCanvas;
    const srcCtx = srcCanvas.getContext('2d', { willReadFrequently: true });

    // 图像区域在 currentWorkingCanvas 里的位置
    const sx = Math.max(0, Math.floor(rect.x));
    const sy = Math.max(0, Math.floor(rect.y));
    const sw = Math.max(1, Math.floor(rect.w));
    const sh = Math.max(1, Math.floor(rect.h));

    const imgData = srcCtx.getImageData(sx, sy, sw, sh);
    const data = imgData.data;

    // 把“时刻”效果理解成：从图中提取若干亮度合适的横向片段，再向左右拉伸
    const densityControl = Number(typeSliderB.value) / 100;
const sampleCount = Math.round(25 + densityControl * 160);  // 最低条带数量和最高增加数量
    const sampleStep = Math.max(2, Math.round(p.sampleStep - detail * 1.2));

    const stripHeightMin = Math.round(
        p.stripHeightMin * (0.85 - detail * 0.2)
    );
    const stripHeightMax = Math.round(
        p.stripHeightMax * (0.92 - detail * 0.18)
    );

    const stretchMin = Math.round(
        p.stretchLengthMin * (0.82 + scale * 0.45)
    );
    const stretchMax = Math.round(
        p.stretchLengthMax * (0.9 + scale * 0.5)
    );

    const strips = [];

    for (let i = 0; i < sampleCount; i++) {
        const randomOffset = FX.moment.randomOffset ?? 0.5;

const randomControl = Number(typeSliderC.value) / 100;

// X 仍然随机
const px = Math.floor(Math.random() * (sw - 2));

// Y 根据滑杆控制重心：0偏上，1偏下
const centerY = randomControl * sh;
const spreadY = sh * 0.55;

const py = Math.max(
    0,
    Math.min(
        sh - 2,
        Math.floor(centerY + (Math.random() - 0.5) * spreadY)
    )
);

        const idx = (py * sw + px) * 4;
        const r = data[idx];
        const g = data[idx + 1];
        const b = data[idx + 2];
        const a = data[idx + 3];

        if (a < 20) continue;

        const lum = 0.299 * r + 0.587 * g + 0.114 * b;

        if (lum < p.luminanceMin || lum > p.luminanceMax) continue;

        const stripH = Math.max(
            2,
            Math.round(stripHeightMin + Math.random() * (stripHeightMax - stripHeightMin))
        );

        const stretchControl = Number(typeSliderA.value) / 100;

// 拉伸强度：越小条带越短，越大条带越长
const stretchMinLive = rect.w * (0.10 + stretchControl * 0.35);
const stretchMaxLive = rect.w * (0.18 + stretchControl * 0.82);

const stretchLen = Math.round(
    stretchMinLive + Math.random() * (stretchMaxLive - stretchMinLive)
);

        // 条带起点尽量和采样点靠近，但允许一点漂移
        const localY = Math.max(0, Math.min(sh - stripH, py - Math.floor(stripH / 2)));
        const localX = Math.max(0, Math.min(sw - sampleStep, px));

        strips.push({
            srcX: localX,
            srcY: localY,
            srcW: Math.max(2, sampleStep),
            srcH: stripH,
            dstX: rect.x + localX,
            dstY: rect.y + localY,
            dstW: stretchLen,
            dstH: stripH,
            alpha: 0.16 + strength * 0.16
        });
    }

    // 先画原图采样拉伸条带
    ctx.save();
    ctx.beginPath();
    ctx.rect(rect.x, rect.y, rect.w, rect.h);
    ctx.clip();

    strips.forEach(strip => {
        ctx.globalAlpha = strip.alpha;
        ctx.drawImage(
            srcCanvas,
            sx + strip.srcX, sy + strip.srcY, strip.srcW, strip.srcH,
            strip.dstX, strip.dstY, strip.dstW, strip.dstH
        );
    });

    ctx.restore();

    // 再叠一层更淡的白色雾条，让效果更柔和，但不变成“光影圆斑”
    ctx.save();
    ctx.beginPath();
    ctx.rect(rect.x, rect.y, rect.w, rect.h);
    ctx.clip();

    const fogCount = Math.round(8 + strength * 8);
    for (let i = 0; i < fogCount; i++) {
        const y = rect.y + rect.h * (0.08 + Math.random() * 0.8);
        const h = rect.h * (0.006 + Math.random() * 0.015);
        const w = rect.w * (0.18 + Math.random() * 0.42);
        const x = rect.x + Math.random() * (rect.w - w);

        ctx.fillStyle = `rgba(255,255,255,${0.035 + strength * 0.03})`;
        ctx.fillRect(x, y, w, h);
    }

    ctx.restore();
}

async function drawStringTypeLayer(ctx, rect, palette, text) {
    const sliderA = Number(typeSliderA.value); // Layer Mode
    const sliderB = Number(typeSliderB.value); // Size
    const sliderC = Number(typeSliderC.value); // Offset

    let layerMode = "all";
    if (sliderA < 25) layerMode = "text";
    else if (sliderA < 50) layerMode = "gradient";
    else if (sliderA < 75) layerMode = "stripes";
    else layerMode = "all";

    // 自动选左 / 右轮廓后的缓存路径
    
    if (!basePath || basePath.length < 2) return;

    const fontSize = 22 + (sliderB / 100) * 34;
    const ribbonWidth = 30 + (sliderB / 100) * 52;
    const contourOffsetBoost = (sliderC / 100) * 32;

    // 整体离边缘再外扩一点
    const path = offsetPathPoints(basePath, contourOffsetBoost);

    // 路径文字：保留完整诗句，不再截成 24 字
    let pathText = String(text || "").replace(/\n+/g, "　").trim();
    const hasPathText = !!pathText;

    if (hasPathText && pathText.length < 10) {
        pathText = (pathText + "　").repeat(4).trim();
    }

    const pink = (palette.palette5 && palette.palette5[1]) || "#f0b6b6";
    const white = palette.white || "#ffffff";
    const black = palette.black || "#000000";

    if (layerMode === "text") {
        drawRibbonStrokePath(ctx, path, {
            width: ribbonWidth,
            fill: black,
            outline: white,
            outlineWidth: 2,
            alpha: 1
        });

        if (hasPathText) {
            drawTextAlongPolyline(ctx, pathText, path, {
                fontSize: fontSize * 0.88,
                color: white,
                letterSpacing: fontSize * 0.18,
                startOffset: fontSize * 0.4,
                textAlign: "start"
            });
        }
        return;
    }

    if (layerMode === "gradient") {
        drawRibbonGradientTube(ctx, path, {
            ribbonWidth: ribbonWidth,
            alpha: 1
        });
        return;
    }

    if (layerMode === "stripes") {
        drawRibbonStripes(ctx, path, {
            ribbonWidth: ribbonWidth,
            baseColor: white,
            stripeColor: pink,
            stripeCount: 5,
            stripeWidth: Math.max(2, ribbonWidth * 0.05),
            alpha: 1
        });
        return;
    }

    // all：三条并排轨迹
    const trackGap = ribbonWidth * 1.05;

    const pathTop = offsetPathPoints(path, trackGap);
    const pathMid = path;
    const pathBottom = offsetPathPoints(path, -trackGap);

    drawRibbonStripes(ctx, pathTop, {
        ribbonWidth: ribbonWidth * 0.96,
        baseColor: white,
        stripeColor: pink,
        stripeCount: 5,
        stripeWidth: Math.max(2, ribbonWidth * 0.045),
        alpha: 0.95
    });

    drawRibbonGradientTube(ctx, pathMid, {
        ribbonWidth: ribbonWidth * 0.92,
        alpha: 0.96
    });

    drawRibbonStrokePath(ctx, pathBottom, {
        width: ribbonWidth * 0.88,
        fill: black,
        outline: white,
        outlineWidth: 1.5,
        alpha: 1
    });

    if (hasPathText) {
        drawTextAlongPolyline(ctx, pathText, pathBottom, {
            fontSize: fontSize * 0.88,
            color: white,
            letterSpacing: fontSize * 0.18,
            startOffset: fontSize * 0.4,
            textAlign: "start"
        });
    }
}

function splitTextForStack(text) {
    const clean = (text || "").trim();
    if (!clean) return ["SPACE"];

    if (clean.includes(" ")) {
        return clean.split(/\s+/).filter(Boolean).slice(0, 4);
    }

    if (clean.length > 8) {

        return [clean.slice(0, mid), clean.slice(mid)];

        function blendColor(c1, c2, t) {

        function drawHalftoneRegion(ctx, workingCanvas, region, drawX, drawY, mapX, mapY, analysisW, analysisH, inkColor, p) {
    const rx = drawX + region.minX * mapX;
    const ry = drawY + region.minY * mapY;
    const rw = Math.max(8, (region.maxX - region.minX + 1) * mapX);
    const rh = Math.max(8, (region.maxY - region.minY + 1) * mapY);

    // 1. 白底
    ctx.save();
    ctx.beginPath();
    ctx.rect(rx, ry, rw, rh);
    ctx.clip();

    ctx.globalAlpha = p.whiteBaseAlpha;
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(rx, ry, rw, rh);

    // 2. 建一个区域采样小图，专门做半调
    const sampleW = Math.max(40, Math.floor(rw / 1.8));
    const sampleH = Math.max(40, Math.floor(rh / 1.8));

    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
    tempCanvas.width = sampleW;
    tempCanvas.height = sampleH;

    const srcX = (region.minX / analysisW) * workingCanvas.width;
    const srcY = (region.minY / analysisH) * workingCanvas.height;
    const srcW = ((region.maxX - region.minX + 1) / analysisW) * workingCanvas.width;
    const srcH = ((region.maxY - region.minY + 1) / analysisH) * workingCanvas.height;

    tempCtx.drawImage(
        workingCanvas,
        srcX, srcY, srcW, srcH,
        0, 0, sampleW, sampleH
    );

    const imgData = tempCtx.getImageData(0, 0, sampleW, sampleH);
    const data = imgData.data;

    // 3. 半调点阵：越暗点越大，越亮点越小
    const strongInk = blendColor(inkColor, { r: 0, g: 0, b: 0 }, 0.18);
    ctx.fillStyle = `rgb(${strongInk.r},${strongInk.g},${strongInk.b})`;

    for (let y = 0; y < sampleH; y += p.halftoneStep) {
        for (let x = 0; x < sampleW; x += p.halftoneStep) {
            const idx = (y * sampleW + x) * 4;
            const r = data[idx];
            const g = data[idx + 1];
            const b = data[idx + 2];

            const lum = 0.299 * r + 0.587 * g + 0.114 * b;

            // 提高对比，让暗部点明显更大，亮部更小
            const darkness = Math.pow(1 - lum / 255, 0.72);

            const radius =
                p.halftoneMinRadius +
                darkness * (p.halftoneMaxRadius - p.halftoneMinRadius);

            const dx = rx + (x / sampleW) * rw;
            const dy = ry + (y / sampleH) * rh;

            if (radius > 0.15) {
                ctx.beginPath();
                ctx.arc(dx, dy, radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // 4. 轻微噪点，避免太机械
    const dots = Math.floor(region.pixels * p.noiseAmount * 0.08);
    ctx.fillStyle = `rgba(${inkColor.r},${inkColor.g},${inkColor.b},0.35)`;
    for (let i = 0; i < dots; i++) {
        const nx = rx + Math.random() * rw;
        const ny = ry + Math.random() * rh;
        const ns = Math.random() < 0.8 ? 1 : 1.4;
        ctx.fillRect(nx, ny, ns, ns);
    }

    ctx.restore();
}

        function findConnectedRegions(mask, width, height, minArea) {
            const visited = new Uint8Array(width * height);
            const regions = [];
            const dirs = [[1,0],[-1,0],[0,1],[0,-1]];

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const start = y * width + x;
                    if (!mask[start] || visited[start]) continue;

                    const queue = [[x, y]];
                    visited[start] = 1;

                    let minX = x, maxX = x, minY = y, maxY = y;
                    let pixels = 0;
                    const pixelsList = [];

                    while (queue.length) {
                        const [cx, cy] = queue.pop();
                        const flat = cy * width + cx;

                        pixels++;
                        pixelsList.push([cx, cy]);
                        minX = Math.min(minX, cx);
                        maxX = Math.max(maxX, cx);
                        minY = Math.min(minY, cy);
                        maxY = Math.max(maxY, cy);

                        for (const [dx, dy] of dirs) {
                            const nx = cx + dx;
                            const ny = cy + dy;
                            if (nx < 0 || ny < 0 || nx >= width || ny >= height) continue;

                            const nFlat = ny * width + nx;
                            if (!mask[nFlat] || visited[nFlat]) continue;

                           visited[nFlat] = 1;
                            queue.push([nx, ny]);
                        }
                    }

                    if (pixels >= minArea) {
                        regions.push({
                            minX, maxX, minY, maxY, pixels, pixelsList
                        });
                    }
                }
            }

            return regions;
        }

        

function addFilmGrainToCanvas(targetCtx, width, height, amount) {
    const imgData = targetCtx.getImageData(0, 0, width, height);
    const data = imgData.data;

    for (let i = 0; i < data.length; i += 4) {
        const noise = (Math.random() - 0.5) * 255 * amount;

        data[i] = clamp(data[i] + noise, 0, 255);
        data[i + 1] = clamp(data[i + 1] + noise, 0, 255);

}

function createSmoothInsetCutout(sourceCanvas, shrinkPx = 4, blurPx = 5, finalSoftness = 1.6) {
    const w = sourceCanvas.width;
    const h = sourceCanvas.height;

    const srcCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const srcImage = srcCtx.getImageData(0, 0, w, h);
    const srcData = srcImage.data;

    // 1) 提取原始 alpha 做成灰度 mask
    const maskCanvas = document.createElement('canvas');
    maskCanvas.width = w;
    maskCanvas.height = h;
    const maskCtx = maskCanvas.getContext('2d', { willReadFrequently: true });

    const maskImage = maskCtx.createImageData(w, h);
    const maskData = maskImage.data;

    for (let i = 0; i < w * h; i++) {
        const a = srcData[i * 4 + 3];
        const p = i * 4;
        maskData[p] = 255;
        maskData[p + 1] = 255;
        maskData[p + 2] = 255;
        maskData[p + 3] = a;
    }
    maskCtx.putImageData(maskImage, 0, 0);

    // 2) 缩小再放大，让边界先整体顺一遍
    const smallScale = 0.32;
    const sw = Math.max(1, Math.round(w * smallScale));
    const sh = Math.max(1, Math.round(h * smallScale));

    const smallCanvas = document.createElement('canvas');
    smallCanvas.width = sw;
    smallCanvas.height = sh;
    const smallCtx = smallCanvas.getContext('2d');

    smallCtx.clearRect(0, 0, sw, sh);
    smallCtx.imageSmoothingEnabled = true;
    smallCtx.drawImage(maskCanvas, 0, 0, sw, sh);

    const smoothMaskCanvas = document.createElement('canvas');
    smoothMaskCanvas.width = w;
    smoothMaskCanvas.height = h;
    const smoothMaskCtx = smoothMaskCanvas.getContext('2d', { willReadFrequently: true });

    smoothMaskCtx.clearRect(0, 0, w, h);
    smoothMaskCtx.imageSmoothingEnabled = true;
    smoothMaskCtx.drawImage(smallCanvas, 0, 0, sw, sh, 0, 0, w, h);

    // 3) 再做一次较强 blur，让边缘更圆顺
    const blurCanvas = document.createElement('canvas');
    blurCanvas.width = w;
    blurCanvas.height = h;
    const blurCtx = blurCanvas.getContext('2d', { willReadFrequently: true });

    blurCtx.clearRect(0, 0, w, h);
    blurCtx.filter = `blur(${blurPx}px)`;
    blurCtx.drawImage(smoothMaskCanvas, 0, 0);
    blurCtx.filter = 'none';

    const blurImage = blurCtx.getImageData(0, 0, w, h);
    const blurData = blurImage.data;

    // 4) 向内收：做 alpha 腐蚀
    const erodedAlpha = new Uint8ClampedArray(w * h);

    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            let minA = 255;

            for (let oy = -shrinkPx; oy <= shrinkPx; oy++) {
                for (let ox = -shrinkPx; ox <= shrinkPx; ox++) {
                    const nx = x + ox;
                    const ny = y + oy;

                    if (nx < 0 || ny < 0 || nx >= w || ny >= h) {
                        minA = 0;
                        continue;
                    }

                    const a = blurData[(ny * w + nx) * 4 + 3];
                    if (a < minA) minA = a;
                }
            }

            erodedAlpha[y * w + x] = minA;
        }
    }

    // 5) 再轻微 blur 一次，让边缘不要硬切
    const alphaCanvas = document.createElement('canvas');
    alphaCanvas.width = w;
    alphaCanvas.height = h;
    const alphaCtx = alphaCanvas.getContext('2d', { willReadFrequently: true });

    const alphaImage = alphaCtx.createImageData(w, h);
    const alphaData = alphaImage.data;

    for (let i = 0; i < w * h; i++) {
        const a = erodedAlpha[i];
        const p = i * 4;
        alphaData[p] = 255;
        alphaData[p + 1] = 255;
        alphaData[p + 2] = 255;
        alphaData[p + 3] = a;
    }
    alphaCtx.putImageData(alphaImage, 0, 0);

    const finalMaskCanvas = document.createElement('canvas');
    finalMaskCanvas.width = w;
    finalMaskCanvas.height = h;
    const finalMaskCtx = finalMaskCanvas.getContext('2d', { willReadFrequently: true });

    finalMaskCtx.clearRect(0, 0, w, h);
    finalMaskCtx.filter = `blur(${finalSoftness}px)`;
    finalMaskCtx.drawImage(alphaCanvas, 0, 0);
    finalMaskCtx.filter = 'none';

    // 6) 用最终 mask 裁切原始清晰人物
    const outCanvas = document.createElement('canvas');
    outCanvas.width = w;
    outCanvas.height = h;
    const outCtx = outCanvas.getContext('2d', { willReadFrequently: true });

    outCtx.clearRect(0, 0, w, h);
    outCtx.drawImage(sourceCanvas, 0, 0);
    outCtx.globalCompositeOperation = 'destination-in';
    outCtx.drawImage(finalMaskCanvas, 0, 0);
    outCtx.globalCompositeOperation = 'source-over';

    return outCanvas;
}

function createBlockyCutoutFromAlpha(sourceCanvas, blockSize = 6, coverageThreshold = 0.18) {
    const w = sourceCanvas.width;
    const h = sourceCanvas.height;

    const srcCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const srcImage = srcCtx.getImageData(0, 0, w, h);
    const srcData = srcImage.data;

    const outCanvas = document.createElement('canvas');
    const outCtx = outCanvas.getContext('2d', { willReadFrequently: true });
    outCanvas.width = w;
    outCanvas.height = h;

    // 先清空
    outCtx.clearRect(0, 0, w, h);

    for (let by = 0; by < h; by += blockSize) {
        for (let bx = 0; bx < w; bx += blockSize) {
            const bw = Math.min(blockSize, w - bx);
            const bh = Math.min(blockSize, h - by);

            let solidCount = 0;
            const total = bw * bh;

            // 统计这个小方块里有多少像素属于人物
            for (let y = by; y < by + bh; y++) {
                for (let x = bx; x < bx + bw; x++) {
                    const idx = (y * w + x) * 4;
                    const alpha = srcData[idx + 3];
                    if (alpha > 20) solidCount++;
                }
            }

            const coverage = solidCount / total;

            // 如果这个方块里“人物占比”达到阈值，就把整个方块保留
            if (coverage >= coverageThreshold) {
                outCtx.drawImage(
                    sourceCanvas,
                    bx, by, bw, bh,
                    bx, by, bw, bh
                );
            }
        }
    }

    return outCanvas;
}

function buildCopyPathPoints(pathType, startX, startY, stepBase, count) {
    const pts = [];

    if (pathType === 'polyline') {
        // 明显折线：三段大折线，但步距控制得更近一些
        let x = startX;
        let y = startY;

        const seg1 = Math.floor(count * 0.34);
        const seg2 = Math.floor(count * 0.33);
        const seg3 = count - seg1 - seg2;

        for (let i = 0; i < seg1; i++) {
            pts.push({ x, y });
            x -= stepBase * 0.95;
            y -= stepBase * 0.12;
        }
        for (let i = 0; i < seg2; i++) {
            pts.push({ x, y });
            x += stepBase * 0.72;
            y += stepBase * 0.58;
        }
        for (let i = 0; i < seg3; i++) {
            pts.push({ x, y });
            x -= stepBase * 0.92;
            y += stepBase * 0.10;
        }

        return pts;
    }

    // 曲线：用二次贝塞尔采样
    const p0 = { x: startX - stepBase * 2.8, y: startY - stepBase * 0.8 };
    const p1 = { x: startX + stepBase * 2.4, y: startY + stepBase * 2.0 };
    const p2 = { x: startX - stepBase * 3.2, y: startY + stepBase * 3.0 };

    for (let i = 0; i < count; i++) {
        const t = i / Math.max(1, count - 1);
        const omt = 1 - t;

        const x =
            omt * omt * p0.x +
            2 * omt * t * p1.x +
            t * t * p2.x;

        const y =
            omt * omt * p0.y +
            2 * omt * t * p1.y +
            t * t * p2.y;

        pts.push({ x, y });
    }

    return pts;
}

function getPathDirection(pts, i) {
    const prev = pts[Math.max(0, i - 1)];
    const next = pts[Math.min(pts.length - 1, i + 1)];

    let dx = next.x - prev.x;
    let dy = next.y - prev.y;

    const len = Math.hypot(dx, dy) || 1;
    return {
        x: dx / len,
        y: dy / len
    };
}

function drawMotionBlurFigure(ctx, img, anchorX, anchorY, dir, p, scale = 1) {
    ctx.save();
    ctx.filter = `blur(${p.motionBlurBlurPx}px)`;

    for (let s = p.motionBlurSamples; s >= 1; s--) {
        const t = s / p.motionBlurSamples;

        const offsetX = dir.x * p.motionBlurStep * s;
        const offsetY = dir.y * p.motionBlurStep * s;

        const blurScale = scale * (1 - p.motionBlurScaleDecay * s);

        ctx.globalAlpha = p.motionBlurAlpha * (0.45 + t * 0.9);
        drawAnchoredPerson(
            ctx,
            img,
            anchorX - offsetX,
            anchorY - offsetY,
            blurScale
        );
    }

    ctx.filter = 'none';
    ctx.restore();
}

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const safeText = String(text ?? "");
    const chars = safeText.split('');
    let line = '';
    let cursorY = y;

    // 禁止出现在行首的标点
    const forbiddenStart = "，。！？；：、,.!?;:)]）】》〉」』’”";

    for (let i = 0; i < chars.length; i++) {
        const char = chars[i];
        const testLine = line + char;
        const metrics = ctx.measureText(testLine);

        if ((metrics.width > maxWidth || testLine.length > 7) && line !== "") {

            // 如果当前字符是标点，不换到下一行，而是接在上一行末尾
            if (forbiddenStart.includes(char)) {
                line += char;
                continue;
            }

            ctx.fillText(line, x, cursorY);
            line = char;
            cursorY += lineHeight;

        } else {
            line = testLine;
        }
    }

    if (line) ctx.fillText(line, x, cursorY);
}

function drawMiniCalendar(ctx, x, y, w, h, parts, scale = 1, blendMode = 'source-over') {
    ctx.save();
ctx.globalCompositeOperation = blendMode;

const highlightColor = getCalendarHighlightColor(ctx.canvas, {
    x,
    y,
    w,
    h
});

    if (!parts) return;

    const year = Number(parts.year);
    const month = Number(parts.month);
    const day = Number(parts.day);

    const firstDay = new Date(year, month - 1, 1);
    const jsWeekday = firstDay.getDay();
    const startWeekday = (jsWeekday + 6) % 7;
    const daysInMonth = new Date(year, month, 0).getDate();

    const labels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const cellW = w / 7;
    const cellH = h / 7;

    const calendarRect = { x, y, w, h };

const finalHighlightColor = highlightColor || getCalendarHighlightColor(ctx.canvas, calendarRect);

    const off = document.createElement('canvas');
    off.width = Math.ceil(x + w + 30);
    off.height = Math.ceil(y + h + 30);
    const octx = off.getContext('2d');

    octx.clearRect(0, 0, off.width, off.height);
    octx.fillStyle = '#ffffff';
    octx.strokeStyle = finalHighlightColor;
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';

    // 星期字号
    octx.font = '600 24px "ABC Favorit Expanded", sans-serif';
    for (let i = 0; i < 7; i++) {
        octx.fillText(labels[i], x + i * cellW + cellW * 0.5, y + cellH * 0.48);
    }

    // 日期字号
    octx.font = `500 ${14 * scale}px "ABC Favorit Expanded", sans-serif`;

    let current = 1;
    for (let row = 1; row < 7; row++) {
        for (let col = 0; col < 7; col++) {
            const cellIndex = (row - 1) * 7 + col;
            const num = cellIndex >= startWeekday && current <= daysInMonth ? current++ : null;
            if (!num) continue;

            const cx = x + col * cellW + cellW * 0.5;
            const cy = y + row * cellH + cellH * 0.56;

            octx.fillText(String(num).padStart(2, '0'), cx, cy);

            if (num === day) {
                octx.save();
                octx.strokeStyle = finalHighlightColor;
                octx.lineWidth = 4.8;

                for (let i = 0; i < 2; i++) {
                    octx.beginPath();
                    octx.ellipse(
                        cx + (Math.random() - 0.5) * 8,
                        cy + (Math.random() - 0.5) * 6 - 2,
                        cellW * (0.55 + Math.random() * 0.08),
                        cellH * (0.40 + Math.random() * 0.07),
                        -0.18 + (Math.random() - 0.5) * 0.18,
                        0,
                        Math.PI * 2
                    );
                    octx.stroke();
                }

                octx.restore();
            }
        }
    }

    ctx.save();
if (ctx.globalCompositeOperation === 'source-over') {
    ctx.globalCompositeOperation = 'source-over';
}
ctx.drawImage(off, 0, 0);
ctx.restore();
}

function drawUnifiedVerticalMiniCalendar(ctx, imageRect) {
    // 光与时刻日常之物月历统一调这里
    const calendarW = imageRect.w * 0.6;  //大小
    const calendarRatio = 0.52;  //高宽比例
    const calendarH = calendarW * calendarRatio;

    const calendarRightGap = 18;  //左右位置
    const calendarBottomGap = 4;  //上下

    const calendarX = imageRect.x + imageRect.w - calendarW - calendarRightGap;
    const calendarY = imageRect.y + imageRect.h - calendarH - calendarBottomGap;

    ctx.save();
    ctx.globalCompositeOperation = 'difference';
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#ffffff';

    drawMiniCalendar(
        ctx,
        calendarX,
        calendarY,
        calendarW,
        calendarH,
        currentPhotoDateParts,
        1.22
    );

    ctx.restore();
}

    return arr[Math.floor(Math.random() * arr.length)];

function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}



function cleanPoemText(text = "") {
    return String(text || "")
        .replace(/[，。！？；：、“”"'‘’（）()\[\]【】<>《》,.!?;:]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
}

function splitChinesePhrases(text = "") {
    const cleaned = cleanPoemText(text);
    if (!cleaned) return [];

    // 抓连续中文片段
    const chunks = cleaned.match(/[\u4e00-\u9fa5]{1,20}/g) || [];
    const phrases = [];

    chunks.forEach(chunk => {
        // 从每个连续片段里切出 2~6 字短词
        for (let len = 2; len <= 6; len++) {
            for (let i = 0; i <= chunk.length - len; i++) {
                phrases.push(chunk.slice(i, i + len));
            }
        }
    });

    return phrases;
}

const POEM_STOPWORDS = new Set([
    "今天","现在","刚刚","然后","就是","感觉","真的","有点","那个","这个","因为","所以",
    "而且","不是","但是","如果","已经","还有","一下","一直","一个","一种","一些","一点",
    "这里","那里","自己","我们","你们","他们","她们","时候","东西","照片","图片","一下子",
    "可以","没有","不是很","然后就","我觉得","就是很","有时候","这个时候","那个时候",
    "我的","你的","他的","她的","它的","一个人","我们都","然后又","还是会","真的很"
]);

function isValidPoemFragment(word) {
    if (!word) return false;
    const w = String(word).trim();

    if (w.length < 2 || w.length > 6) return false;
    if (POEM_STOPWORDS.has(w)) return false;
    if (/^[的了着呢吗啊呀哦嗯哇吧啦哈]+$/.test(w)) return false;
    if (/^(就是|然后|真的|有点|一下|一直|一个|一些|没有|不是|因为|所以)$/.test(w)) return false;

    // 避免很像语气残片
    const badStart = ["的","了","着","很","又","还","就","也","把","被","让","给","向","往"];
    const badEnd = ["的","了","着","呢","吗","啊","呀","哦","吧","嘛"];
    if (badStart.includes(w[0])) return false;
    if (badEnd.includes(w[w.length - 1])) return false;

    return true;
}


function getTimeWord(parts) {
    const hour = Number(parts?.hour || 12);

    if (hour >= 5 && hour < 8) return "清晨";
    if (hour >= 8 && hour < 11) return "上午";
    if (hour >= 11 && hour < 14) return "中午";
    if (hour >= 14 && hour < 17) return "午后";
    if (hour >= 17 && hour < 19) return "傍晚";
    if (hour >= 19 && hour < 23) return "夜晚";
    return "深夜";
}

function keepShortMaterial(s, maxLen = 4) {
    const text = String(s || "").replace(/[，。！？；：、“”‘’\s]/g, "").trim();
    if (!text) return "";
    return text.slice(0, maxLen);
}

function shortenPoemMaterials(materials, maxLen = 4) {
    return uniqueArray(
        (materials || [])
            .map(item => keepShortMaterial(item, maxLen))
            .filter(Boolean)
            .filter(item => item.length >= 1 && item.length <= maxLen)
    );
}

function limitPoemTotalChars(lines, maxTotal = 36) {
    const out = [];
    let total = 0;

    for (const rawLine of lines) {
        let line = String(rawLine || "").trim();
        if (!line) continue;

        if (total + line.length <= maxTotal) {
            out.push(line);
            total += line.length;
            continue;
        }

        const remain = maxTotal - total;
        if (remain <= 0) break;

        if (remain >= 4) {
            out.push(line.slice(0, remain));
        }
        break;
    }

    return out;
}

function pickMaterial(materials, fallback = "") {

function pickDifferentMaterial(materials, used = [], fallback = "") {
    const pool = (materials || []).filter(x => x && !used.includes(x));
    if (!pool.length) return pickMaterial(materials, fallback);
    return pickRandom(pool);
}

function scorePoemFragment(word) {
    const w = String(word || "").trim();
    if (!w) return -999;

    let score = 0;

    // 长度偏好：2~4字最佳
    if (w.length === 2) score += 5;
    else if (w.length === 3) score += 6;
    else if (w.length === 4) score += 4;
    else score -= 8;

    // 偏意象、偏感知的词加分
    if (/[光影风雨云窗灯路街夜晨暮春夏秋冬车站角落桌杯门树叶水声气味温度颜色轮廓倒影空隙微风晚霞余温亮意]/.test(w)) score += 4;

    // 偏口语叙述、功能词减分
    if (/[的了着过呢吗啊呀吧哦哈]/.test(w)) score -= 6;
    if (/^(今天|刚刚|真的|就是|感觉|看到|一个|这个|那个|然后|因为|所以|但是|如果|我们|你们|他们)$/.test(w)) score -= 8;

    // 英文数字直接减分
    if (/[A-Za-z0-9]/.test(w)) score -= 10;

    return score;
}

function extractPoemFragments(text = "") {
    const raw = splitChinesePhrases(text)
        .map(s => String(s || "").trim())
        .map(s => s.replace(/[，。！？；：、“”‘’（）()《》〈〉【】\-\—…,.!?:;'"“”‘’♡♥]/g, ""))
        .map(s => s.replace(/\s+/g, ""))
        .filter(Boolean);

    const unique = uniqueArray(raw);

    return unique
        .filter(w => w.length >= 2 && w.length <= 4)
        .filter(w => !/[A-Za-z0-9]/.test(w))
        .map(w => ({ w, score: scorePoemFragment(w) }))
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score || a.w.length - b.w.length)
        .map(item => item.w)
        .slice(0, 6);
}

function buildPoemFromMaterials(userText, category, dateParts) {
    const materials = extractPoemFragments(userText);
    const banks = getCategoryPoemBanks(category, getTimeWord(dateParts));

    const materialTemplates = [
        (m) => `${m}停住`,
        (m) => `${m}出现`,
        (m) => `${m}还在`,
        (m) => `${m}没动`,
        (m) => `${m}浮起来`,
        (m) => `${m}散开`
    ];

    const buildCandidate = () => {
        const lines = [];

        // 随机选择句式结构: 两行式、三行式、四行式
        const structureType = Math.random();

        if (structureType < 0.3) {
            // 两行式: 起句 + 收束
            if (materials.length && Math.random() < 0.7) {
                const m = pickRandom(materials);
                lines.push(pickRandom(materialTemplates)(m));
            } else {
                lines.push(`${pickRandom(banks.startSubject)}${pickRandom(banks.startAction)}`);
            }

            const endTone = pickRandom(banks.endTone);
            if (endTone) {
                lines.push(`${endTone}${pickRandom(banks.endResult)}`);
            } else {
                lines.push(pickRandom(banks.endResult));
            }

        } else if (structureType < 0.65) {
            // 三行式: 起句 + 中段 + 收束
            if (materials.length && Math.random() < 0.7) {
                const m = pickRandom(materials);
                lines.push(pickRandom(materialTemplates)(m));
            } else {
                lines.push(`${pickRandom(banks.startSubject)}${pickRandom(banks.startAction)}`);
            }

            lines.push(pickRandom(banks.middleState));

            const endTone = pickRandom(banks.endTone);
            if (endTone) {
                lines.push(`${endTone}${pickRandom(banks.endResult)}`);
            } else {
                lines.push(pickRandom(banks.endResult));
            }

        } else {
            // 四行式: 起句 + 中段1 + 中段2 + 收束
            if (materials.length && Math.random() < 0.7) {
                const m = pickRandom(materials);
                lines.push(pickRandom(materialTemplates)(m));
            } else {
                lines.push(`${pickRandom(banks.startSubject)}${pickRandom(banks.startAction)}`);
            }

            lines.push(pickRandom(banks.middleState));
            lines.push(pickRandom(banks.middleState));

            lines.push(pickRandom(banks.endResult));
        }

        // 每句最多 10 字,允许不等长
        const trimmed = uniqueArray(
            lines.map(line => String(line || "").trim().slice(0, 10)).filter(Boolean)
        );

        // 总长控制在 20-28 字之间
        let total = 0;
        const limited = [];
        for (const line of trimmed) {
            if (total + line.length <= 28) {
                limited.push(line);
                total += line.length;
            }
        }

        return limited.length >= 2 ? limited : null;
    };

    // 最多尝试 12 次，尽量避开近期重复
    let bestLines = null;

    for (let i = 0; i < 12; i++) {
        const candidate = buildCandidate();
        const sig = makePoemSignature(candidate);

        if (!recentPoemSignatures.includes(sig)) {
            rememberPoemSignature(sig);
            return candidate.join("\n");
        }

        if (!bestLines) bestLines = candidate;
    }

    // 实在撞了，就返回最后一个候选，但也记入缓存
    const fallback = bestLines || ["这一刻被看见", "平常也值得记住", "像生活的小回应"];
    rememberPoemSignature(makePoemSignature(fallback));
    return fallback.join("\n");
}

/* =====================================================
   工具函数
===================================================== */

function randomPick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function poemCharCount(text) {
  return String(text || "").replace(/\s|\n|，|。|、|；|：|！|？/g, "").length;
}

function uniqueArray(arr) {
  return [...new Set(arr)].filter(Boolean);
}

function cleanUserText(text) {
  return String(text || "")
    .replace(/[^\u4e00-\u9fa5a-zA-Z0-9，。！？、,.!?；;：:\s]/g, "")
    .replace(/\s+/g, "")
    .trim();
}


/* =====================================================
   关键词提取：只匹配完整词，不随机截字
===================================================== */

function extractWordsByDict(userText) {
  const text = cleanUserText(userText);

  const result = {
    time: [],
    place: [],
    object: [],
    body: [],
    action: [],
    adjective: [],
    emotion: []
  };

  if (!text) return result;

  // 1. 精确匹配词库里的完整词
  Object.keys(ritualPoemEngine.dict).forEach(type => {
    ritualPoemEngine.dict[type].forEach(word => {
      if (text.includes(word)) {
        result[type].push(word);
      }
    });
  });

  // 2. 模糊匹配：用户说法 → 归一成标准词
  const aliasDict = ritualPoemEngine.aliasDict || {};

  Object.keys(aliasDict).forEach(type => {
    Object.keys(aliasDict[type]).forEach(standardWord => {
      const aliases = aliasDict[type][standardWord];

      aliases.forEach(alias => {
        if (text.includes(alias)) {
          result[type].push(standardWord);
        }
      });
    });
  });

  // 3. 去重、长词优先
  Object.keys(result).forEach(type => {
    result[type] = uniqueArray(result[type])
      .sort((a, b) => b.length - a.length)
      .slice(0, 8);
  });

  return result;
}


/* =====================================================
   情绪方向判断
===================================================== */

function detectMood(userText, extracted) {
  const text = cleanUserText(userText);
  const scores = {};

  Object.keys(ritualPoemEngine.moodMap).forEach(mood => {
    scores[mood] = 0;
    ritualPoemEngine.moodMap[mood].forEach(word => {
      if (text.includes(word)) scores[mood] += 1;
    });
  });

  if (extracted.emotion.length > 0) {
    scores.tender += 1;
    scores.calm += 1;
  }

  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  return sorted[0][1] > 0 ? sorted[0][0] : "ordinary";
}


/* =====================================================
   构建词池：用户词优先 + 歌词精选词 + 日常低指向词
===================================================== */

function buildWordPool(userText) {
  const extracted = extractWordsByDict(userText);
  const mood = detectMood(userText, extracted);
  const pool = {};

  Object.keys(ritualPoemEngine.fallback).forEach(type => {
    pool[type] = uniqueArray([
      ...extracted[type],
      ...ritualPoemEngine.fallback[type]
    ]);
  });

  if (mood === "joy") {
    pool.emotion.push("喜悦", "明亮", "轻盈", "满足");
    pool.adjective.push("明亮", "热闹", "可爱", "暖和");
    pool.object.push("灯光", "笑声", "花", "烟火");
  }

  if (mood === "calm") {
    pool.emotion.push("安静", "松弛", "平静", "释然");
    pool.adjective.push("安静", "缓慢", "柔软", "干净");
    pool.action.push("慢下来", "停一下", "松开");
  }

  if (mood === "memory") {
    pool.emotion.push("怀念", "温柔", "舍不得", "难忘");
    pool.time.push("后来", "从前", "很久后");
    pool.object.push("旧梦", "回声", "背影", "余温");
  }

  if (mood === "restart") {
    pool.emotion.push("期待", "清醒", "释然");
    pool.time.push("清晨", "明天", "天亮后");
    pool.action.push("重新开始", "打开", "醒来", "出门");
  }

  if (mood === "tender") {
    pool.emotion.push("温柔", "柔软", "释然", "安心");
    pool.object.push("光", "风", "月光", "晚风", "灯影");
    pool.adjective.push("温柔", "暖和", "柔软");
  }

  Object.keys(pool).forEach(type => {
    pool[type] = uniqueArray(pool[type]);
  });

  return { pool, extracted, mood };
}


/* =====================================================
   填充短语
===================================================== */

function fillPhrase(phrase, pool) {
  const p = ritualPoemEngine.phraseParts;

  return phrase
    .replaceAll("{time}", randomPick(pool.time))
    .replaceAll("{place}", randomPick(pool.place))
    .replaceAll("{object}", randomPick(pool.object))
    .replaceAll("{body}", randomPick(pool.body))
    .replaceAll("{action}", randomPick(pool.action))
    .replaceAll("{adjective}", randomPick(pool.adjective))
    .replaceAll("{emotion}", randomPick(pool.emotion))
    .replaceAll("{subject}", randomPick([
      ...p.subject,
      ...pool.body,
      ...pool.object
    ]))
    .replaceAll("{verb}", randomPick([
      ...p.verb,
      ...pool.action
    ]))
    .replaceAll("{manner}", randomPick(p.manner))
    .replaceAll("{relation}", randomPick(p.relation))
    .replaceAll("{ending}", randomPick([
      ...p.ending,
      ...pool.place,
      ...pool.time
    ]))
    .replaceAll("{measure}", randomPick(p.measure));
}


/* =====================================================
   生成单行
===================================================== */

function makeLine(type, pool) {
  const structures = ritualPoemEngine.phraseStructures[type] || ritualPoemEngine.phraseStructures.short;
  return fillPhrase(randomPick(structures), pool);
}


/* =====================================================
   多模式生成
   不同长度、不同结构随机切换
===================================================== */

function generateFlexiblePoem(pool) {
  const mode = Math.random();

  // 1. 极短诗：8–14字，约15%
  if (mode < 0.15) {
    return makeLine("short", pool);
  }

  // 2. 两行短诗：14–20字，约30%
  if (mode < 0.45) {
    return [
      makeLine(randomPick(["imageLine", "short", "relationLine"]), pool),
      makeLine(randomPick(["feelingLine", "short"]), pool)
    ].join("\n");
  }

  // 3. 两行标准诗：18–24字，约35%
  if (mode < 0.80) {
    return [
      makeLine(randomPick(["imageLine", "longLine", "relationLine"]), pool),
      makeLine(randomPick(["feelingLine", "relationLine", "longLine"]), pool)
    ].join("\n");
  }

  // 4. 三行微诗：20–30字，约15%
  if (mode < 0.95) {
    return [
      makeLine(randomPick(["short", "imageLine"]), pool),
      makeLine(randomPick(["feelingLine", "relationLine"]), pool),
      makeLine(randomPick(["short", "feelingLine"]), pool)
    ].join("\n");
  }

  // 5. 断裂式短诗：12–24字，约5%
  return [
    makeLine("short", pool),
    makeLine("short", pool),
    makeLine("short", pool)
  ].join("\n");
}


/* =====================================================
   长度控制
===================================================== */

function isGoodLength(count) {
  // 主要控制在16–24字
  if (count >= 16 && count <= 24) return Math.random() < 0.95;

  // 少量极短诗
  if (count >= 8 && count < 16) return Math.random() < 0.25;

  // 少量接近30字的长诗
  if (count > 24 && count <= 30) return Math.random() < 0.55;

  return false;
}


/* =====================================================
   重复检测
===================================================== */

function similarity(a, b) {
  const aa = new Set(String(a).replace(/\n/g, "").split(""));
  const bb = new Set(String(b).replace(/\n/g, "").split(""));
  const same = [...aa].filter(x => bb.has(x)).length;
  return same / Math.max(aa.size, bb.size);
}

function isTooSimilar(poem) {
  return ritualPoemEngine.history.some(old => similarity(old, poem) > 0.52);
}

function rememberPoem(poem) {
  ritualPoemEngine.history.push(poem);
  if (ritualPoemEngine.history.length > ritualPoemEngine.maxHistory) {
    ritualPoemEngine.history.shift();
  }
}


/* =====================================================
   不自然组合过滤
   避免明显机械、不通顺的句子
===================================================== */

function hasBadPattern(poem) {
  const badPatterns = [
    /自己.*自己.*自己/,
    /今天.*今天.*今天/,
    /生活.*生活.*生活/,
    /一点.*一点.*一点/,
    /很很/,
    /慢慢.*慢慢.*慢慢/,
    /轻轻.*轻轻.*轻轻/,
    /安静.*安静.*安静/,
    /温柔.*温柔.*温柔/
  ];

  return badPatterns.some(reg => reg.test(poem));
}


/* =====================================================
   对外主函数：生成一首诗
===================================================== */

function generatePoemFromText(userText = "") {
  const { pool } = buildWordPool(userText);

  for (let i = 0; i < 200; i++) {
    const poem = generateFlexiblePoem(pool);
    const count = poemCharCount(poem);

    if (
      count >= 8 &&
      count <= 30 &&
      isGoodLength(count) &&
      !isTooSimilar(poem) &&
      !hasBadPattern(poem)
    ) {
      rememberPoem(poem);
      return poem;
    }
  }

  // 兜底诗，只有在200次都失败时出现
  const fallback = "这一刻被轻轻放下\n风从心里经过";
  rememberPoem(fallback);
  return fallback;
}


/* =====================================================
   一次生成三首候选
===================================================== */

function generatePoemOptionsFromText(userText = "") {
  return [
    generatePoemFromText(userText),
    generatePoemFromText(userText),
    generatePoemFromText(userText)
  ];
}

function breakPoemBySentenceAndWidth(ctx, text, maxWidth, lineHeight) {

    const sentenceParts = raw
        .split(/(?<=[，。！？；、,.!?;])|\n+/)
        .map(s => s.trim())
        .filter(Boolean);

    const finalLines = [];

    sentenceParts.forEach(part => {

        finalLines.push(...lines);
    });

    return finalLines;

function breakPoemBySentenceAndCharCount(text, maxChars = 7) {
    const raw = String(text || '').trim();

    const sentenceParts = raw
        .split(/(?<=[，。！？；、,.!?;])|\n+/)
        .map(s => s.trim())
        .filter(Boolean);

    const lines = [];

    sentenceParts.forEach(part => {
        let current = '';

        for (const ch of part) {
            current += ch;
            if (current.length >= maxChars) {
                lines.push(current);
                current = '';
            }
        }

        if (current) lines.push(current);
    });

    return avoidLineStartPunctuation(lines);
}

function breakTextIntoLines(ctx, text, maxWidth, lineHeight) {
    const chars = String(text || '').replace(/\n/g, '').split('');
    const lines = [];
    let line = '';

    for (const ch of chars) {
        const testLine = line + ch;
        if (ctx.measureText(testLine).width > maxWidth && line !== '') {
            lines.push(line);
            line = ch;
        } else {
            line = testLine;
        }
    }

    if (line) lines.push(line);
    return lines;
}

const FORBIDDEN_LINE_START =
'，。、！？：；）】》〉」』〕”’,.!?;:)]}>';

function avoidLineStartPunctuation(lines) {

    for (let i = 1; i < lines.length; i++) {

        while (
            lines[i] &&
            FORBIDDEN_LINE_START.includes(lines[i][0])
        ) {

            const moveChar = lines[i][0];

            lines[i - 1] += moveChar;

            lines[i] = lines[i].slice(1);
        }
    }

    return lines;
}

        const prev = linePoints[Math.max(0, lineIndex - 1)];
        const next = linePoints[Math.min(linePoints.length - 1, lineIndex + 1)];

        const dx = next.x - prev.x;
        const dy = next.y - prev.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;

        const nx = -dy / len;
        const ny = dx / len;

        return {
            ...p,
            x: p.x + nx * offset,
            y: p.y + ny * offset
        };
    });
}

function fitCalendarPointsToImageRect(points, rect, padding = 34) {
    if (!points || !points.length) return points;

    let minX = Infinity;
    let maxX = -Infinity;
    let minY = Infinity;
    let maxY = -Infinity;

    points.forEach(p => {
        minX = Math.min(minX, p.x);
        maxX = Math.max(maxX, p.x);
        minY = Math.min(minY, p.y);
        maxY = Math.max(maxY, p.y);
    });

    const boxW = maxX - minX;
    const boxH = maxY - minY;

    const limitW = rect.w - padding * 2;
    const limitH = rect.h - padding * 2;

    const ratio = rect.w / rect.h;

    // 竖图放大；方图略放；横图不放
    const idealScale = ratio < 0.8 ? 1.35 : ratio < 1.15 ? 1.15 : 1;

    const scale = Math.min(
        idealScale,
        limitW / Math.max(1, boxW),
        limitH / Math.max(1, boxH)
    );

    const cx = (minX + maxX) / 2;
    const cy = (minY + maxY) / 2;

    const targetCx = rect.x + rect.w / 2;
    const targetCy = rect.y + rect.h / 2;

    return points.map(p => ({
        ...p,
        x: targetCx + (p.x - cx) * scale,
        y: targetCy + (p.y - cy) * scale
    }));
}

function buildCalendarDatePoints(style, count, rect, seed = 0.5) {
    const minGap = CALENDAR_PATH_CONFIG.minGap;

    let rawPath = buildCalendarRawPath(style, rect, seed);

    for (let i = 0; i < 6; i++) {
        const len = getPathLength(rawPath);
        const required = count * minGap;

        if (len >= required) break;

        seed = randSeed(seed, i + 100);
        rawPath = buildCalendarRawPath(style, rect, seed);
    }

    let sampled;

    if (style === "space_helix") {
        sampled = samplePerspectiveAlongPath(
            rawPath,
            count,
            CALENDAR_PATH_CONFIG.perspectiveSpacingPower
        );
    } else {
        sampled = sampleEvenlyAlongPath(rawPath, count);
    }

    sampled = enforceMinimumGapAlongOrder(
        sampled,
        style === "border_wrap" ? 30 : 38
    );

    // 关键：最后统一根据图像区域放大 / 收缩
    sampled = fitCalendarPointsToImageRect(
        sampled,

}

function enforceMinimumGapAlongOrder(points, minGap = 42) {
    if (!points || points.length < 2) return points;

    const result = points.map(p => ({ ...p }));

    for (let i = 1; i < result.length; i++) {
        const prev = result[i - 1];
        const cur = result[i];

        const dx = cur.x - prev.x;
        const dy = cur.y - prev.y;
        const dist = Math.hypot(dx, dy);

        if (dist > 0 && dist < minGap) {
            const push = minGap - dist;
            cur.x += (dx / dist) * push;
            cur.y += (dy / dist) * push;
        }
    }

    return result;
}

function buildCalendarRawPath(style, rect, seed = 0.5) {
    if (style === "space_helix") {

        return buildTiltedOrbitRawPath(rect, seed);

    if (style === "border_wrap") {
        return buildBorderWrapRawPath(rect, seed);
    }

    if (style === "multi_loop") {
        return buildMultiLoopRawPath(rect, seed);

    return buildFlatSpiralRawPath(rect, seed);

function buildFlatSpiralRawPath(rect, seed = 0.5) {
    const raw = [];
    const n = CALENDAR_PATH_CONFIG.rawPointCount;

    const cx = rect.x + rect.w * (0.46 + randSeed(seed, 1) * 0.18);
    const cy = rect.y + rect.h * (0.45 + randSeed(seed, 2) * 0.18);

    const w = rect.w * (0.72 + randSeed(seed, 3) * 0.18);
    const h = rect.h * (0.50 + randSeed(seed, 4) * 0.16);

    const rotate = degToRad(-28 + randSeed(seed, 5) * 56);
    const turns = 2.2 + randSeed(seed, 6) * 1.25;
    const startAngle = Math.PI * (0.4 + randSeed(seed, 7) * 1.8);
    const endAngle = startAngle + Math.PI * 2 * turns;

    for (let i = 0; i < n; i++) {
        const t = n === 1 ? 0 : i / (n - 1);
        const angle = startAngle + (endAngle - startAngle) * t;

        const radiusX = w * (0.08 + 0.42 * t);
        const radiusY = h * (0.06 + 0.38 * t);

        const wobble = Math.sin(t * Math.PI * 5.5 + seed * 10) * 0.11;

        let x = Math.cos(angle) * radiusX * (1 + wobble);
        let y = Math.sin(angle) * radiusY * (1 - wobble * 0.4);

        const p = rotatePoint(x, y, rotate);

        raw.push({
            x: cx + p.x,
            y: cy + p.y,
            depth: t
        });
    }

    return raw;
}

function buildSpaceHelixRawPath(rect, seed = 0.5) {
    const raw = [];
    const n = CALENDAR_PATH_CONFIG.rawPointCount;

    const safe = getCalendarSafeRect(rect, 58);

    const cx = safe.x + safe.w * (0.48 + randSeed(seed, 1) * 0.08);
    const cy = safe.y + safe.h * (0.50 + randSeed(seed, 2) * 0.08);

    const rotate = degToRad(-22 + randSeed(seed, 3) * 44);

    // 半径由 safeRect 决定，保证不会超出
    const radiusX = safe.w * 0.26;
    const radiusY = safe.h * 0.16;

    // 垂直推进也限制在 safeRect 内
    const verticalStep = safe.h * 0.52;

    // 圈数进一步减少
    const turns = 1.35 + randSeed(seed, 7) * 0.35;

    const angleOffset = randSeed(seed, 8) * Math.PI * 2;

    for (let i = 0; i < n; i++) {
        const t = n === 1 ? 0 : i / (n - 1);
        const angle = Math.PI * 2 * turns * t + angleOffset;

        // 轻微透视，不再造成远处严重拥挤
        const perspective = 1.8;
        const scale = perspective / (perspective + (1 - t) * 0.55);

        let x = Math.cos(angle) * radiusX * scale;
        let y = Math.sin(angle) * radiusY * scale + (t - 0.5) * verticalStep;

        const p = rotatePoint(x, y, rotate);

        const point = clampPointToRect(
            {
                x: cx + p.x,
                y: cy + p.y,
                depth: t
            },
            safe,
            4
        );

        raw.push(point);
    }

    return raw;
}

    const rx = safe.w * (0.42 + randSeed(seed, 1) * 0.10);
const ry = safe.h * (0.18 + randSeed(seed, 2) * 0.08);

    const rotate = degToRad(-34 + randSeed(seed, 3) * 68);

    const startAngle = degToRad(-132 + randSeed(seed, 4) * 38);

        const t = n === 1 ? 0 : i / (n - 1);
        const angle = startAngle + span * t;

function buildBorderWrapRawPath(rect, seed = 0.5) {
    const raw = [];
    const n = CALENDAR_PATH_CONFIG.rawPointCount;

    const pad = 34;
    const left = rect.x + pad;
    const right = rect.x + rect.w - pad;
    const top = rect.y + pad;
    const bottom = rect.y + rect.h - pad;
    // 给月份文字预留一个左上角安全区，避免日期和 July / 7月 重叠
const labelSafeW = 230;
const labelSafeH = 150;


const shorten = 0.64;

const safeTopStartX = rect.x + labelSafeW;
const safeLeftStartY = rect.y + labelSafeH;

const midX = rect.x + rect.w / 2;
const midY = rect.y + rect.h / 2;

const bottomShortL = midX - rect.w * shorten / 2;
const bottomShortR = midX + rect.w * shorten / 2;
const rightShortT = midY - rect.h * shorten / 2;
const rightShortB = midY + rect.h * shorten / 2;
const leftShortB = midY + rect.h * shorten / 2;

const variants = [
    // 从月份区右侧开始 → 右边 → 下边
    [
        { x: safeTopStartX, y: top },
        { x: right, y: top },
        { x: right, y: rightShortB },
        { x: bottomShortR, y: bottom },
        { x: bottomShortL, y: bottom }
    ],

    // 右边 → 下边 → 左边下半段
    [
        { x: right, y: top },
        { x: right, y: bottom },
        { x: bottomShortL, y: bottom },
        { x: left, y: leftShortB }
    ],

    // 下边 → 左边下半段 → 顶部从月份右侧开始
    [
        { x: bottomShortR, y: bottom },
        { x: bottomShortL, y: bottom },
        { x: left, y: safeLeftStartY },
        { x: safeTopStartX, y: top }
    ]
];

    const path = variants[Math.floor(randSeed(seed, 9) * variants.length)];

    const segments = [];
    let totalLen = 0;

    for (let i = 0; i < path.length - 1; i++) {
        const a = path[i];
        const b = path[i + 1];
        const len = Math.hypot(b.x - a.x, b.y - a.y);
        segments.push({ a, b, len });
        totalLen += len;
    }

    for (let i = 0; i < n; i++) {
        const d = totalLen * (i / Math.max(1, n - 1));
        const p = getPointAlongPolyline(segments, d);

        raw.push({
            x: p.x,
            y: p.y,
            depth: i / Math.max(1, n - 1)
        });
    }

    return raw;
}

function buildMultiLoopRawPath(rect, seed = 0.5) {

    const cy = safe.y + safe.h * (0.48 + randSeed(seed, 2) * 0.10);

    const maxRx = safe.w * 0.38;
    const maxRy = safe.h * 0.32;

    for (let i = 0; i < n; i++) {
        const t = n === 1 ? 0 : i / (n - 1);

        const angle = Math.PI * 2 * (0.8 + t * 2.15) + seed * 6;

        const rx =
            maxRx * (0.26 + 0.74 * t) *
            (1 + Math.sin(t * Math.PI * 4.0) * 0.18);

        const ry =
            maxRy * (0.24 + 0.76 * t) *
            (1 + Math.cos(t * Math.PI * 3.4) * 0.16);

        let x = Math.cos(angle) * rx + Math.sin(t * Math.PI * 2.2) * safe.w * 0.045;
        let y = Math.sin(angle) * ry + Math.cos(t * Math.PI * 2.0) * safe.h * 0.045;

        const p = rotatePoint(x, y, rotate);

        const point = clampPointToRect(
            {
                x: cx + p.x,

                depth: t
            },

        );
