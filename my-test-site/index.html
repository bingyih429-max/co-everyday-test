<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Co-Everyday | A Participatory Visual System</title>
    <style>
        :root {
            --primary-color: #333;
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --accent-color: #007AFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #ddd;
            padding: 40px 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: var(--accent-color);
            background: #f0f7ff;
        }

        #imagePreview {
            max-width: 100%;
            max-height: 300px;
            display: none;
            margin-top: 10px;
            border-radius: 4px;
        }

        .category-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .cat-btn {
            padding: 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .cat-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
        }

        #generateBtn {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        #generateBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #resultArea {
            margin-top: 40px;
            display: none;
            text-align: center;
        }

        .poster-container {
            position: relative;
            display: inline-block;
            line-height: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 100%;
            background: #000;
        }

        #finalCanvas,
        #finalImage {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .template-overlay {
            display: none;
        }

        .loading {
            display: none;
            margin: 20px 0;
            color: var(--accent-color);
            font-weight: bold;
        }

        footer {
            margin-top: 50px;
            font-size: 12px;
            color: #aaa;
        }

        .poster-container {
            position: relative;
            display: inline-block;
            line-height: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 100%;
            background: #000;
            overflow: hidden;

            user-select: none;
            -webkit-touch-callout: default;

        #resultArea label,

            background: rgba(0,0,0,0.9);

            align-items: center;
            justify-content: center;

            padding: 20px;

        function extractColors(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = 64;
            canvas.height = 64;
            ctx.drawImage(img, 0, 0, 64, 64);

            const data = ctx.getImageData(0, 0, 64, 64).data;
            const colors = [];
            for (let i = 0; i < data.length; i += 16) {
                colors.push({ r: data[i], g: data[i + 1], b: data[i + 2] });
            }

            colors.sort((a, b) => (a.r + a.g + a.b) - (b.r + b.g + b.b));

            const dominant = colors[Math.floor(colors.length * 0.75)];
            const secondary = colors[Math.floor(colors.length * 0.25)];
            const neutral = colors[Math.floor(colors.length * 0.5)];

            return {
                dominant: `rgb(${dominant.r},${dominant.g},${dominant.b})`,
                secondary: `rgb(${secondary.r},${secondary.g},${secondary.b})`,
                neutral: `rgb(${neutral.r},${neutral.g},${neutral.b})`
            };
        }

        function makeAnalysisCanvas(sourceCanvas, maxSide = 420) {
            const ratio = sourceCanvas.width / sourceCanvas.height;
            let w, h;

            if (sourceCanvas.width >= sourceCanvas.height) {
                w = maxSide;
                h = Math.round(maxSide / ratio);
            } else {
                h = maxSide;
                w = Math.round(maxSide * ratio);
            }

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(sourceCanvas, 0, 0, w, h);

            return { canvas, ctx };
        }

        function parseRGB(str) {
            const m = str.match(/\d+/g);
            return {
                r: Number(m[0]),
                g: Number(m[1]),
                b: Number(m[2])
            };
        }

        function blendColor(c1, c2, t) {
            return {
                r: Math.round(c1.r * (1 - t) + c2.r * t),
               g: Math.round(c1.g * (1 - t) + c2.g * t),
                b: Math.round(c1.b * (1 - t) + c2.b * t)
            };
        }

        function clamp(v, min, max) {
            return Math.max(min, Math.min(max, v));
        }

        function lerpColor(c1, c2, t) {
            return {
                r: Math.round(c1.r + (c2.r - c1.r) * t),
                g: Math.round(c1.g + (c2.g - c1.g) * t),
                b: Math.round(c1.b + (c2.b - c1.b) * t)
            };
        }

        function drawHalftoneRegion(ctx, workingCanvas, region, drawX, drawY, mapX, mapY, analysisW, analysisH, inkColor, p) {
    const rx = drawX + region.minX * mapX;
    const ry = drawY + region.minY * mapY;
    const rw = Math.max(8, (region.maxX - region.minX + 1) * mapX);
    const rh = Math.max(8, (region.maxY - region.minY + 1) * mapY);

    // 1. 白底
    ctx.save();
    ctx.beginPath();
    ctx.rect(rx, ry, rw, rh);
    ctx.clip();

    ctx.globalAlpha = p.whiteBaseAlpha;
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(rx, ry, rw, rh);

    // 2. 建一个区域采样小图，专门做半调
    const sampleW = Math.max(40, Math.floor(rw / 1.8));
    const sampleH = Math.max(40, Math.floor(rh / 1.8));

    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
    tempCanvas.width = sampleW;
    tempCanvas.height = sampleH;

    const srcX = (region.minX / analysisW) * workingCanvas.width;
    const srcY = (region.minY / analysisH) * workingCanvas.height;
    const srcW = ((region.maxX - region.minX + 1) / analysisW) * workingCanvas.width;
    const srcH = ((region.maxY - region.minY + 1) / analysisH) * workingCanvas.height;

    tempCtx.drawImage(
        workingCanvas,
        srcX, srcY, srcW, srcH,
        0, 0, sampleW, sampleH
    );

    const imgData = tempCtx.getImageData(0, 0, sampleW, sampleH);
    const data = imgData.data;

    // 3. 半调点阵：越暗点越大，越亮点越小
    const strongInk = blendColor(inkColor, { r: 0, g: 0, b: 0 }, 0.18);
    ctx.fillStyle = `rgb(${strongInk.r},${strongInk.g},${strongInk.b})`;

    for (let y = 0; y < sampleH; y += p.halftoneStep) {
        for (let x = 0; x < sampleW; x += p.halftoneStep) {
            const idx = (y * sampleW + x) * 4;
            const r = data[idx];
            const g = data[idx + 1];
            const b = data[idx + 2];

            const lum = 0.299 * r + 0.587 * g + 0.114 * b;

            // 提高对比，让暗部点明显更大，亮部更小
            const darkness = Math.pow(1 - lum / 255, 0.72);

            const radius =
                p.halftoneMinRadius +
                darkness * (p.halftoneMaxRadius - p.halftoneMinRadius);

            const dx = rx + (x / sampleW) * rw;
            const dy = ry + (y / sampleH) * rh;

            if (radius > 0.15) {
                ctx.beginPath();
                ctx.arc(dx, dy, radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // 4. 轻微噪点，避免太机械
    const dots = Math.floor(region.pixels * p.noiseAmount * 0.08);
    ctx.fillStyle = `rgba(${inkColor.r},${inkColor.g},${inkColor.b},0.35)`;
    for (let i = 0; i < dots; i++) {
        const nx = rx + Math.random() * rw;
        const ny = ry + Math.random() * rh;
        const ns = Math.random() < 0.8 ? 1 : 1.4;
        ctx.fillRect(nx, ny, ns, ns);
    }

    ctx.restore();
}

        function findConnectedRegions(mask, width, height, minArea) {
            const visited = new Uint8Array(width * height);
            const regions = [];
            const dirs = [[1,0],[-1,0],[0,1],[0,-1]];

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const start = y * width + x;
                    if (!mask[start] || visited[start]) continue;

                    const queue = [[x, y]];
                    visited[start] = 1;

                    let minX = x, maxX = x, minY = y, maxY = y;
                    let pixels = 0;
                    const pixelsList = [];

                    while (queue.length) {
                        const [cx, cy] = queue.pop();
                        const flat = cy * width + cx;

                        pixels++;
                        pixelsList.push([cx, cy]);
                        minX = Math.min(minX, cx);
                        maxX = Math.max(maxX, cx);
                        minY = Math.min(minY, cy);
                        maxY = Math.max(maxY, cy);

                        for (const [dx, dy] of dirs) {
                            const nx = cx + dx;
                            const ny = cy + dy;
                            if (nx < 0 || ny < 0 || nx >= width || ny >= height) continue;

                            const nFlat = ny * width + nx;
                            if (!mask[nFlat] || visited[nFlat]) continue;

                           visited[nFlat] = 1;
                            queue.push([nx, ny]);
                        }
                    }

                    if (pixels >= minArea) {
                        regions.push({
                            minX, maxX, minY, maxY, pixels, pixelsList
                        });
                    }
                }
            }

            return regions;
        }

        async function segmentPersonCutout(sourceCanvas) {
    await imageSegmenterReady;

    const result = imageSegmenter.segment(sourceCanvas);

    if (!result) {
        throw new Error("分割失败：没有返回结果");
    }

    const width = sourceCanvas.width;
    const height = sourceCanvas.height;

    const srcCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const srcImage = srcCtx.getImageData(0, 0, width, height);

    const personCanvas = document.createElement('canvas');
    const personCtx = personCanvas.getContext('2d', { willReadFrequently: true });
    personCanvas.width = width;
    personCanvas.height = height;

    const personImage = personCtx.createImageData(width, height);

    // 额外做一个调试画布：把识别到的人物涂成红色
    const debugCanvas = document.createElement('canvas');
    const debugCtx = debugCanvas.getContext('2d', { willReadFrequently: true });
    debugCanvas.width = width;
    debugCanvas.height = height;
    const debugImage = debugCtx.createImageData(width, height);

    let personMask = null;

    // ---------- 优先走 confidenceMasks，并且自动判断哪张才是“人” ----------
    if (result.confidenceMasks && result.confidenceMasks.length > 0) {
        const masks = result.confidenceMasks.map(m => m.getAsFloat32Array());

        // 如果有两张 mask，就选“平均覆盖面积更小”的那张作为人物
        // 因为背景一般占更大面积，人物一般占更小面积
        if (masks.length >= 2) {
            const avg0 = masks[0].reduce((a, b) => a + b, 0) / masks[0].length;
            const avg1 = masks[1].reduce((a, b) => a + b, 0) / masks[1].length;
            personMask = avg0 < avg1 ? masks[0] : masks[1];
            console.log("confidence avg0:", avg0, "avg1:", avg1, "=> 选中较小覆盖率的 mask 作为人物");
        } else {
            personMask = masks[0];
            console.log("只有一张 confidence mask，直接使用");
        }
    }

    // ---------- 如果 confidenceMasks 不可用，再退回 categoryMask ----------
    if (!personMask && result.categoryMask) {
        const catMask = result.categoryMask.getAsUint8Array();

        // 统计每个类别像素数，选“非最大类”作为人物
        const countMap = new Map();
        for (let i = 0; i < catMask.length; i++) {
            const v = catMask[i];
            countMap.set(v, (countMap.get(v) || 0) + 1);
        }

        let majorityClass = null;
        let majorityCount = -1;
        for (const [cls, count] of countMap.entries()) {
            if (count > majorityCount) {
                majorityCount = count;
                majorityClass = cls;
            }
        }

        console.log("categoryMask classes:", [...countMap.entries()], "majorityClass:", majorityClass);

        // 把非最大类当作人物
        personMask = new Float32Array(catMask.length);
        for (let i = 0; i < catMask.length; i++) {
            personMask[i] = catMask[i] === majorityClass ? 0 : 1;
        }
    }

    if (!personMask) {
        throw new Error("分割失败：没有拿到可用的 person mask");
    }

    const threshold = 0.22;
    const feather = 0.12;

    let keptPixels = 0;

    for (let i = 0; i < personMask.length; i++) {
        const conf = personMask[i];
        const p = i * 4;

        let alpha = 0;
        if (conf > threshold) {
            alpha = Math.round(
                Math.max(0, Math.min(1, (conf - threshold) / feather)) * 255
            );
        }

        if (alpha > 8) keptPixels++;

        // 正常人物抠图
        personImage.data[p] = srcImage.data[p];
        personImage.data[p + 1] = srcImage.data[p + 1];
        personImage.data[p + 2] = srcImage.data[p + 2];
        personImage.data[p + 3] = alpha;

        // 红色调试图
        debugImage.data[p] = 255;
        debugImage.data[p + 1] = 0;
        debugImage.data[p + 2] = 0;
        debugImage.data[p + 3] = alpha;
    }

    personCtx.putImageData(personImage, 0, 0);
    debugCtx.putImageData(debugImage, 0, 0);

    const coverage = keptPixels / personMask.length;
    console.log("person coverage:", coverage);

    return { personCanvas, debugCanvas, coverage };
}

function addFilmGrainToCanvas(targetCtx, width, height, amount) {
    const imgData = targetCtx.getImageData(0, 0, width, height);
    const data = imgData.data;

    for (let i = 0; i < data.length; i += 4) {
        const noise = (Math.random() - 0.5) * 255 * amount;

        data[i] = clamp(data[i] + noise, 0, 255);
        data[i + 1] = clamp(data[i + 1] + noise, 0, 255);
        data[i + 2] = clamp(data[i + 2] + noise, 0, 255);
    }

    targetCtx.putImageData(imgData, 0, 0);
}

function createSmoothInsetCutout(sourceCanvas, shrinkPx = 4, blurPx = 5, finalSoftness = 1.6) {
    const w = sourceCanvas.width;
    const h = sourceCanvas.height;

    const srcCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const srcImage = srcCtx.getImageData(0, 0, w, h);
    const srcData = srcImage.data;

    // 1) 提取原始 alpha 做成灰度 mask
    const maskCanvas = document.createElement('canvas');
    maskCanvas.width = w;
    maskCanvas.height = h;
    const maskCtx = maskCanvas.getContext('2d', { willReadFrequently: true });

    const maskImage = maskCtx.createImageData(w, h);
    const maskData = maskImage.data;

    for (let i = 0; i < w * h; i++) {
        const a = srcData[i * 4 + 3];
        const p = i * 4;
        maskData[p] = 255;
        maskData[p + 1] = 255;
        maskData[p + 2] = 255;
        maskData[p + 3] = a;
    }
    maskCtx.putImageData(maskImage, 0, 0);

    // 2) 缩小再放大，让边界先整体顺一遍
    const smallScale = 0.32;
    const sw = Math.max(1, Math.round(w * smallScale));
    const sh = Math.max(1, Math.round(h * smallScale));

    const smallCanvas = document.createElement('canvas');
    smallCanvas.width = sw;
    smallCanvas.height = sh;
    const smallCtx = smallCanvas.getContext('2d');

    smallCtx.clearRect(0, 0, sw, sh);
    smallCtx.imageSmoothingEnabled = true;
    smallCtx.drawImage(maskCanvas, 0, 0, sw, sh);

    const smoothMaskCanvas = document.createElement('canvas');
    smoothMaskCanvas.width = w;
    smoothMaskCanvas.height = h;
    const smoothMaskCtx = smoothMaskCanvas.getContext('2d', { willReadFrequently: true });

    smoothMaskCtx.clearRect(0, 0, w, h);
    smoothMaskCtx.imageSmoothingEnabled = true;
    smoothMaskCtx.drawImage(smallCanvas, 0, 0, sw, sh, 0, 0, w, h);

    // 3) 再做一次较强 blur，让边缘更圆顺
    const blurCanvas = document.createElement('canvas');
    blurCanvas.width = w;
    blurCanvas.height = h;
    const blurCtx = blurCanvas.getContext('2d', { willReadFrequently: true });

    blurCtx.clearRect(0, 0, w, h);
    blurCtx.filter = `blur(${blurPx}px)`;
    blurCtx.drawImage(smoothMaskCanvas, 0, 0);
    blurCtx.filter = 'none';

    const blurImage = blurCtx.getImageData(0, 0, w, h);
    const blurData = blurImage.data;

    // 4) 向内收：做 alpha 腐蚀
    const erodedAlpha = new Uint8ClampedArray(w * h);

    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            let minA = 255;

            for (let oy = -shrinkPx; oy <= shrinkPx; oy++) {
                for (let ox = -shrinkPx; ox <= shrinkPx; ox++) {
                    const nx = x + ox;
                    const ny = y + oy;

                    if (nx < 0 || ny < 0 || nx >= w || ny >= h) {
                        minA = 0;
                        continue;
                    }

                    const a = blurData[(ny * w + nx) * 4 + 3];
                    if (a < minA) minA = a;
                }
            }

            erodedAlpha[y * w + x] = minA;
        }
    }

    // 5) 再轻微 blur 一次，让边缘不要硬切
    const alphaCanvas = document.createElement('canvas');
    alphaCanvas.width = w;
    alphaCanvas.height = h;
    const alphaCtx = alphaCanvas.getContext('2d', { willReadFrequently: true });

    const alphaImage = alphaCtx.createImageData(w, h);
    const alphaData = alphaImage.data;

    for (let i = 0; i < w * h; i++) {
        const a = erodedAlpha[i];
        const p = i * 4;
        alphaData[p] = 255;
        alphaData[p + 1] = 255;
        alphaData[p + 2] = 255;
        alphaData[p + 3] = a;
    }
    alphaCtx.putImageData(alphaImage, 0, 0);

    const finalMaskCanvas = document.createElement('canvas');
    finalMaskCanvas.width = w;
    finalMaskCanvas.height = h;
    const finalMaskCtx = finalMaskCanvas.getContext('2d', { willReadFrequently: true });

    finalMaskCtx.clearRect(0, 0, w, h);
    finalMaskCtx.filter = `blur(${finalSoftness}px)`;
    finalMaskCtx.drawImage(alphaCanvas, 0, 0);
    finalMaskCtx.filter = 'none';

    // 6) 用最终 mask 裁切原始清晰人物
    const outCanvas = document.createElement('canvas');
    outCanvas.width = w;
    outCanvas.height = h;
    const outCtx = outCanvas.getContext('2d', { willReadFrequently: true });

    outCtx.clearRect(0, 0, w, h);
    outCtx.drawImage(sourceCanvas, 0, 0);
    outCtx.globalCompositeOperation = 'destination-in';
    outCtx.drawImage(finalMaskCanvas, 0, 0);
    outCtx.globalCompositeOperation = 'source-over';

    return outCanvas;
}

function createBlockyCutoutFromAlpha(sourceCanvas, blockSize = 6, coverageThreshold = 0.18) {
    const w = sourceCanvas.width;
    const h = sourceCanvas.height;

    const srcCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const srcImage = srcCtx.getImageData(0, 0, w, h);
    const srcData = srcImage.data;

    const outCanvas = document.createElement('canvas');
    const outCtx = outCanvas.getContext('2d', { willReadFrequently: true });
    outCanvas.width = w;
    outCanvas.height = h;

    // 先清空
    outCtx.clearRect(0, 0, w, h);

    for (let by = 0; by < h; by += blockSize) {
        for (let bx = 0; bx < w; bx += blockSize) {
            const bw = Math.min(blockSize, w - bx);
            const bh = Math.min(blockSize, h - by);

            let solidCount = 0;
            const total = bw * bh;

            // 统计这个小方块里有多少像素属于人物
            for (let y = by; y < by + bh; y++) {
                for (let x = bx; x < bx + bw; x++) {
                    const idx = (y * w + x) * 4;
                    const alpha = srcData[idx + 3];
                    if (alpha > 20) solidCount++;
                }
            }

            const coverage = solidCount / total;

            // 如果这个方块里“人物占比”达到阈值，就把整个方块保留
            if (coverage >= coverageThreshold) {
                outCtx.drawImage(
                    sourceCanvas,
                    bx, by, bw, bh,
                    bx, by, bw, bh
                );
            }
        }
    }

    return outCanvas;
}

function buildCopyPathPoints(pathType, startX, startY, stepBase, count) {
    const pts = [];

    if (pathType === 'polyline') {
        // 明显折线：三段大折线，但步距控制得更近一些
        let x = startX;
        let y = startY;

        const seg1 = Math.floor(count * 0.34);
        const seg2 = Math.floor(count * 0.33);
        const seg3 = count - seg1 - seg2;

        for (let i = 0; i < seg1; i++) {
            pts.push({ x, y });
            x -= stepBase * 0.95;
            y -= stepBase * 0.12;
        }
        for (let i = 0; i < seg2; i++) {
            pts.push({ x, y });
            x += stepBase * 0.72;
            y += stepBase * 0.58;
        }
        for (let i = 0; i < seg3; i++) {
            pts.push({ x, y });
            x -= stepBase * 0.92;
            y += stepBase * 0.10;
        }

        return pts;
    }

    // 曲线：用二次贝塞尔采样
    const p0 = { x: startX - stepBase * 2.8, y: startY - stepBase * 0.8 };
    const p1 = { x: startX + stepBase * 2.4, y: startY + stepBase * 2.0 };
    const p2 = { x: startX - stepBase * 3.2, y: startY + stepBase * 3.0 };

    for (let i = 0; i < count; i++) {
        const t = i / Math.max(1, count - 1);
        const omt = 1 - t;

        const x =
            omt * omt * p0.x +
            2 * omt * t * p1.x +
            t * t * p2.x;

        const y =
            omt * omt * p0.y +
            2 * omt * t * p1.y +
            t * t * p2.y;

        pts.push({ x, y });
    }

    return pts;
}

function drawAnchoredPerson(ctx, img, x, y, scale) {

    const h = img.height * scale;

    // 让人物以“底部中点”为锚点缩放
    const drawX = x - w / 2;

    ctx.drawImage(img, drawX, drawY, w, h);
}

function getPathDirection(pts, i) {
    const prev = pts[Math.max(0, i - 1)];
    const next = pts[Math.min(pts.length - 1, i + 1)];

    let dx = next.x - prev.x;
    let dy = next.y - prev.y;

    const len = Math.hypot(dx, dy) || 1;
    return {
        x: dx / len,
        y: dy / len
    };
}

function drawMotionBlurFigure(ctx, img, anchorX, anchorY, dir, p, scale = 1) {
    ctx.save();
    ctx.filter = `blur(${p.motionBlurBlurPx}px)`;

    for (let s = p.motionBlurSamples; s >= 1; s--) {
        const t = s / p.motionBlurSamples;

        const offsetX = dir.x * p.motionBlurStep * s;
        const offsetY = dir.y * p.motionBlurStep * s;

        const blurScale = scale * (1 - p.motionBlurScaleDecay * s);

        ctx.globalAlpha = p.motionBlurAlpha * (0.45 + t * 0.9);
        drawAnchoredPerson(
            ctx,
            img,
            anchorX - offsetX,
            anchorY - offsetY,
            blurScale
        );
    }

    ctx.filter = 'none';
    ctx.restore();
}

                        const lum = 0.299 * r + 0.587 * g + 0.114 * b;

                        if (lum >= p.luminanceMin && lum <= p.luminanceMax) {
                            candidates.push({ x: x0, y: y0, lum });
                        }
                    }
                }

                // 不要只取最亮的，打散一点更自然
                candidates.sort(() => Math.random() - 0.5);
                const chosen = candidates.slice(0, p.sampleCount);

                chosen.forEach(pt => {
                    const stripW = p.stripWidth;
                    const stripH = p.stripHeightMin + Math.random() * (p.stripHeightMax - p.stripHeightMin);

                    const sx = Math.max(0, Math.min(tempCanvas.width - stripW, pt.x));
                    const sy = Math.max(0, Math.min(tempCanvas.height - stripH, pt.y));

                    const dx = drawX + sx * mapX;
                    const dy = drawY + sy * mapY;

                    const stretchLen = (p.stretchLengthMin + Math.random() * (p.stretchLengthMax - p.stretchLengthMin)) * mapX;

                    // 完全不透明，去掉那种半透明糊感
                    ctx.globalAlpha = 1.0;
                    ctx.drawImage(
                        tempCanvas,
                        sx, sy, stripW, stripH,
                        dx,
                        dy,
                        stretchLen,
                        stripH * mapY
                    );
                });

                // 再额外叠一层“更细、更长”的条带，增强线性感
                const fineCount = Math.floor(p.sampleCount * 0.45);

                for (let i = 0; i < fineCount; i++) {
                    const pt = candidates[Math.floor(Math.random() * candidates.length)];
                    if (!pt) continue;

                    const stripW = 1;
                    const stripH = 6 + Math.random() * 14;

                    const sx = Math.max(0, Math.min(tempCanvas.width - stripW, pt.x));
                    const sy = Math.max(0, Math.min(tempCanvas.height - stripH, pt.y));

                    const dx = drawX + sx * mapX;
                    const dy = drawY + sy * mapY;

                    const stretchLen = (280 + Math.random() * 420) * mapX;

                    ctx.globalAlpha = 0.96;
                    ctx.drawImage(
                        tempCanvas,
                        sx, sy, stripW, stripH,
                        dx,
                        dy,
                        stretchLen,
                        stripH * mapY
                    );
                }

                // 不再叠回原图透明层，否则又会变糊
                ctx.globalAlpha = 1.0;

blurTrailCanvas.width = aw;

// 3. 主体

// 4. 前景复制层 + 对应路径模糊
for (let i = Math.ceil(pts.length * 0.55) - 1; i >= 0; i--) {

}

// 5. 给模糊层压一点暗色，避免太亮太飘
darkenCanvasAlphaOnly(

);

// 6. 先把模糊层叠到人物层底下
ghostCtx.save();

// 7. 最后统一加颗粒
addFilmGrainToCanvas(ghostCtx, aw, ah, p.grainAmount);

    ctx.drawImage(ghostCanvas, drawX, drawY, drawW, drawH);



            } else if (type === 'light') {
                ctx.drawImage(workingCanvas, drawX, drawY, drawW, drawH);

                ctx.globalAlpha = 0.08;
                for (let i = 0; i < 20; i++) {
                    const offsetX = (Math.random() - 0.5) * 30;
                    const offsetY = (Math.random() - 0.5) * 30;
                    ctx.drawImage(workingCanvas, drawX + offsetX, drawY + offsetY, drawW, drawH);
                }
                ctx.globalAlpha = 1.0;

                ctx.globalAlpha = 0.12;
                ctx.fillStyle = palette.dominant;
                ctx.fillRect(x, y, w, h);
                ctx.globalAlpha = 1.0;

                const cols = 3;
                const rows = 4;
                const cellW = w / cols;
                const cellH = h / rows;

                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        if (Math.random() > 0.45) continue;

                        const cx = x + col * cellW + cellW / 2;
                        const cy = y + row * cellH + cellH / 2;
                        const radius = Math.min(cellW, cellH) * (0.36 + Math.random() * 0.10);

                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                        ctx.clip();

                        const shiftX = (Math.random() - 0.5) * 70;
                        const shiftY = (Math.random() - 0.5) * 70;
                        ctx.drawImage(workingCanvas, drawX + shiftX, drawY + shiftY, drawW, drawH);

                        ctx.restore();

                        ctx.strokeStyle = "rgba(255,255,255,0.18)";
                        ctx.lineWidth = 1.2;
                        ctx.beginPath();
                        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }

                ctx.globalAlpha = 0.14;
                for (let i = 0; i < 3; i++) {
                    const bandY = y + Math.random() * h;
                    const bandH = 22 + Math.random() * 28;
                    ctx.fillStyle = "rgba(255,255,255,0.30)";
                    ctx.fillRect(x, bandY, w, bandH);
                }
                ctx.globalAlpha = 1.0;
            }

            ctx.restore();

        generateBtn.addEventListener('click', async function() {
            if (!uploadedImage) return;

            loadingMsg.style.display = 'block';
            generateBtn.disabled = true;

            try {
                const workingCanvas = document.createElement('canvas');
                const wCtx = workingCanvas.getContext('2d');

                let workW = uploadedImage.width;
                let workH = uploadedImage.height;
                const maxWorkDim = 800;

                if (workW > maxWorkDim || workH > maxWorkDim) {
                    const ratio = Math.min(maxWorkDim / workW, maxWorkDim / workH);
                    workW = Math.round(workW * ratio);
                    workH = Math.round(workH * ratio);
                }

                workingCanvas.width = workW;
                workingCanvas.height = workH;
                wCtx.drawImage(uploadedImage, 0, 0, workW, workH);

                const palette = extractColors(workingCanvas);
                const userText = document.getElementById('userText').value.trim();

                currentFragmentNumber = await reserveFragmentNumber();
                const indexNumber = currentFragmentNumber;

                const canvas = document.getElementById('finalCanvas');
                const ctx = canvas.getContext('2d');

                const imageRatio = workW / workH;
                let layoutType;

                if (imageRatio <= 1) {
                    layoutType = 'vertical';
                } else if (imageRatio >= 1.55) {
                    layoutType = 'horizontal';
                } else {
                    layoutType = 'horizontal2';
                }

                let baseW, baseH;

                if (layoutType === 'vertical') {
                    baseW = 750;
                    baseH = 1200;
                } else if (layoutType === 'horizontal') {
                    baseW = 2419;
                    baseH = 1000;
                } else {
                    baseW = 1679;
                    baseH = 1000;
                }

                canvas.width = baseW;
                canvas.height = baseH;

                let blueRect, blackRect, redRect;
                let imageRegion;

                if (layoutType === 'vertical') {
                    const totalH = 207.92 + 490.716 + 133.226;
                    const blueH = 207.92 / totalH;
                    const blackH = 490.716 / totalH;
                    const redH = 133.226 / totalH;

                    blueRect = { x: 0, y: 0, w: baseW, h: baseH * blueH };
                    blackRect = { x: 0, y: baseH * blueH, w: baseW, h: baseH * blackH };
                    redRect = { x: 0, y: baseH * (blueH + blackH), w: baseW, h: baseH * redH };

                } else if (layoutType === 'horizontal') {
                    const totalW = 108.164 + 688.65 + 168.808;
                    const blueW = 108.164 / totalW;
                    const blackW = 688.65 / totalW;
                    const redW = 168.808 / totalW;

                    blueRect = { x: 0, y: 0, w: baseW * blueW, h: baseH };
                    blackRect = { x: baseW * blueW, y: 0, w: baseW * blackW, h: baseH };
                    redRect = { x: baseW * (blueW + blackW), y: 0, w: baseW * redW, h: baseH };

                } else {
                    const totalW = 169.483 + 394.116 + 108.399;
                    const blueW = 169.483 / totalW;
                    const blackW = 394.116 / totalW;
                    const redW = 108.399 / totalW;

                    blueRect = { x: 0, y: 0, w: baseW * blueW, h: baseH };
                    blackRect = { x: baseW * blueW, y: 0, w: baseW * blackW, h: baseH };
                    redRect = { x: baseW * (blueW + blackW), y: 0, w: baseW * redW, h: baseH };
                }

                imageRegion = {
                    x: blackRect.x,
                    y: blackRect.y,
                    w: blackRect.w,
                    h: blackRect.h
                };

                ctx.fillStyle = palette.dominant;
                ctx.fillRect(blueRect.x, blueRect.y, blueRect.w, blueRect.h);

                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(blackRect.x, blackRect.y, blackRect.w, blackRect.h);

                ctx.fillStyle = palette.secondary;
                ctx.fillRect(redRect.x, redRect.y, redRect.w, redRect.h);

                await processImage(ctx, workingCanvas, imageRegion, selectedCategory, palette);
                drawDynamicText(ctx, layoutType, baseW, baseH, userText, indexNumber);

                const templateUrl = TEMPLATES[layoutType];
                const templateImg = new Image();

                templateImg.onload = function() {
                    ctx.drawImage(templateImg, 0, 0, baseW, baseH);

                    const finalDataUrl = canvas.toDataURL("image/png");
                    finalImage.src = finalDataUrl;
                    modalImage.src = finalDataUrl;
                    saveImageBtn.onclick = function(){
                        const link = document.createElement("a");
                        link.href = finalDataUrl;
                        link.download = `Fragment-${currentFragmentNumber}.png`;
                        link.click();
                    };

                    canvas.style.display = 'none';
                    finalImage.style.display = 'block';

                    document.getElementById('inputPage').style.display = 'none';
                    document.getElementById('resultArea').style.display = 'block';
                    loadingMsg.style.display = 'none';
                    window.scrollTo(0, 0);
                };

                templateImg.onerror = function() {
                    alert('模板图片没有加载成功，请检查 images 文件夹路径和文件名');
                    loadingMsg.style.display = 'none';
                    generateBtn.disabled = false;
                };

                templateImg.src = templateUrl;

            } catch (err) {
                console.error(err);
                alert('生成失败：' + err.message);
                loadingMsg.style.display = 'none';
                generateBtn.disabled = false;
            }
        });

        document.addEventListener("click", function(e){

            if(e.target && e.target.id === "submitBtn"){
                if(!currentFragmentNumber){
                    alert("请先生成海报");
                    return;
                }

                const canvas = document.getElementById("finalCanvas");
                const fragmentNumber = currentFragmentNumber;

                uploadToSupabase(canvas, fragmentNumber);

            }

        });
        
        finalImage.addEventListener("click", function() {
            if (!finalImage.src) return;
            imageModal.classList.add("active");
        });

        imageModal.addEventListener("click", function() {
            imageModal.classList.remove("active");
        });
reloadBtn.addEventListener("click", function() {
    location.reload();
});
